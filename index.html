  { level: 7, word: "Fungible", pronunciation: "/ˈfʌndʒɪb(ə)l/", partOfSpeech: "adjective", category: "Intelligence", definition: "Interchangeable; (of goods or people) able to replace or be replaced by another identical item.", etymology: "Latin fungi (to perform, to enjoy) → fungibilis → fungible. Root fung- means 'to perform/discharge'. Also in: function, defunct (no longer functioning), perfunctory (performed merely as duty), fungicide.", example: "In his view, employees were fungible — each person just a replaceable unit performing a defined task." },
  { level: 7, word: "Persiflage", pronunciation: "/ˈpɜːsɪflɑːʒ/", partOfSpeech: "noun", category: "Social", definition: "Light and slightly contemptuous mockery or banter; frivolous, empty talk.", etymology: "French persifler (to banter, to mock) from per- (through) + siffler (to whistle, to hiss) from Latin sibilare (to hiss) → persiflage. Root sibil- means 'to hiss'. Also in: sibilant (a hissing sound), sibilance.", example: "The dinner was enjoyable enough, though two hours of persiflage left her slightly empty — not a serious thought all evening." },
  { level: 7, word: "Divagate", pronunciation: "/ˈdʌɪvəɡeɪt/", partOfSpeech: "verb", category: "Intelligence", definition: "To stray from a subject; to wander or digress; to roam mentally.", etymology: "Latin di- (apart) + vagari (to wander) → divagatus → divagate. Root vag- means 'to wander'. Also in: vagrant, vague (wandering without fixity), extravagant (wandering beyond bounds), vagabond.", example: "The lecture had a tendency to divagate into unrelated anecdote — delightful, but the reading list remained uncovered." },
  { level: 7, word: "Recherché", pronunciation: "/rəˈʃɛʃeɪ/", partOfSpeech: "adjective", category: "Intelligence", definition: "Rare, exotic, or obscure; overly far-fetched or unusual to be of wide interest.", etymology: "French recherché (carefully sought out) from re- (again) + chercher (to seek) from Latin circare (to go round) → recherché. Root circum-/charch- means 'to go around/seek'. Also in: circle, search, research.", example: "His tastes ran to the recherché — wines from a single Slovenian hillside, operas performed once per decade." },
  { level: 7, word: "Fulgent", pronunciation: "/ˈfʌldʒ(ə)nt/", partOfSpeech: "adjective", category: "Perception", definition: "Gleaming brilliantly; radiantly and dazzlingly bright.", etymology: "Latin fulgere (to flash, to shine) → fulgens → fulgent. Root fulg- means 'to flash/shine'. Also in: fulgurant (lightning-like), effulge (to shine out), refulgent (shining back), fulguration.", example: "The fulgent dome caught the last sun of the day and blazed above the darkening rooftops like a second star." },

  // ── ORIGINAL LEVEL 8 ─────────────────────────────────────────────────────
  { level: 8, word: "Panegyric", pronunciation: "/ˌpænɪˈdʒɪrɪk/", partOfSpeech: "noun", category: "Social", definition: "A public speech or text in praise of someone or something; an elaborate compliment.", etymology: "Greek pan- (all) + agyris (assembly) → panegyris (a public festival) → panegyrikos (speech for a public assembly) → panegyric. Root pan- means 'all'. Also in: pandemic, panorama, panacea, pantheon.", example: "The retirement dinner was pleasant, but the panegyric from his deputy went on for forty-five uncomfortable minutes." },
  { level: 8, word: "Parsimonious", pronunciation: "/ˌpɑːsɪˈməʊniəs/", partOfSpeech: "adjective", category: "Character", definition: "Unwilling to spend money or use resources; extremely frugal to the point of meanness.", etymology: "Latin parcere (to spare, be sparing) → parsimonia (economy, frugality) → parsimonious. Root parc-/pars- means 'to spare'. Also in: parse (to spare apart/analyse), sparingly. In logic, 'parsimony' is economy of explanation.", example: "He was so parsimonious that he reused tea bags and turned off light switches before leaving the room." },
  { level: 8, word: "Mnemonic", pronunciation: "/nɪˈmɒnɪk/", partOfSpeech: "adjective/noun", category: "Intelligence", definition: "A system or pattern intended to assist memory; assisting or intended to assist the memory.", etymology: "Greek mnemonikos (of memory) from mnemon (mindful) from mnasthai (to remember) → mnemonic. Root mne- means 'memory'. Also in: amnesia (a- = without + mnesia = memory), Mnemosyne (Greek goddess of memory).", example: "'Every Good Boy Deserves Football' is a mnemonic for the lines of the treble clef." },
  { level: 8, word: "Sesquipedalian", pronunciation: "/ˌsɛskwɪpɪˈdeɪliən/", partOfSpeech: "adjective", category: "Intelligence", definition: "Relating to or characterised by long words; given to using long words.", etymology: "Latin sesqui- (one and a half) + pedalis (of a foot) → sesquipedalis (a foot and a half long) → sesquipedalian. Root sesqui- is a precise fraction; ped- means 'foot'. Also in: pedal, pedestrian, expedite (to free the feet), impede.", example: "His academic papers were famously sesquipedalian — students joked that you needed a dictionary just to read the abstract." },
  { level: 8, word: "Threnody", pronunciation: "/ˈθrɛnədi/", partOfSpeech: "noun", category: "Emotions", definition: "A lament; a song or poem of mourning.", etymology: "Greek threnos (lament, wailing) + oide (song) → threnodia → threnody. Root oid- means 'song'. Also in: ode, melody (melos + oide), comedy (komos + oide = revel-song), tragedy (tragos + oide = goat-song), rhapsody.", example: "The string quartet played a threnody for the victims — spare, bleak, and devastatingly right." },
  { level: 8, word: "Acumen", pronunciation: "/ˈækjʊmɛn/", partOfSpeech: "noun", category: "Intelligence", definition: "The ability to make good judgments and take quick decisions; sharpness of mind.", etymology: "Latin acuere (to sharpen) → acumen (a point, sharpness). Root acu- means 'sharp'. Also in: acute, acupuncture, acid, acrimony, exacerbate — all from the same 'sharp' sense.", example: "Her business acumen was evident from the first meeting — she saw the gap in the market instantly." },
  { level: 8, word: "Palliative", pronunciation: "/ˈpæliətɪv/", partOfSpeech: "adjective/noun", category: "Character", definition: "Relieving pain without treating the cause; (noun) a medicine or measure that relieves without curing.", etymology: "Latin pallium (a cloak) → palliare (to cloak, to conceal) → palliativus → palliative. Root palli- means 'cloak'. Also in: palliate, pallium. The word captures the idea of 'covering over' pain without removing it.", example: "The committee offered palliative measures — enough to quiet the protests but not to fix the underlying problem." },
  { level: 8, word: "Crepitate", pronunciation: "/ˈkrɛpɪteɪt/", partOfSpeech: "verb", category: "Nature", definition: "To make a crackling or rattling sound; to crackle.", etymology: "Latin crepare (to crack, rattle, creak) → crepitare → crepitate. Root crep- means 'to crack/rattle'. Also in: decrepit (worn down, crackling with age).", example: "The dry logs crepitated satisfyingly in the hearth as the room slowly warmed." },
  { level: 8, word: "Solecism", pronunciation: "/ˈsɒlɪsɪz(ə)m/", partOfSpeech: "noun", category: "Social", definition: "A grammatical mistake; an error in etiquette or a social blunder.", etymology: "Greek Soloi — a city in Cilicia (modern Turkey) whose inhabitants were thought to speak corrupt Greek → soloikismos → solecism. A place-name that became a category of error. Like 'malapropism' (from Mrs Malaprop).", example: "Using 'literally' to mean 'figuratively' has gone from solecism to accepted usage in a single generation." },
  { level: 8, word: "Apothegm", pronunciation: "/ˈæpəθɛm/", partOfSpeech: "noun", category: "Intelligence", definition: "A short, pithy, and instructive saying or formulation; a maxim.", etymology: "Greek apo- (from) + phthengesthai (to speak out) → apophthegma → apothegm. Root phtheg- means 'to utter clearly'. Also in: diphthong (di = two + phthong = sound). The apo- prefix means 'away from'.", example: "Franklin's apothegms — 'time is money', 'an ounce of prevention' — have outlasted most of his longer writings." },
  // ── NEW LEVEL 8 ──────────────────────────────────────────────────────────
  { level: 8, word: "Apocope", pronunciation: "/əˈpɒkəpi/", partOfSpeech: "noun", category: "Intelligence", definition: "The loss or omission of one or more sounds or letters at the end of a word.", etymology: "Greek apo- (away from) + koptein (to cut) → apokopē → apocope. Root kop-/cop- means 'to cut'. Also in: syncope (cutting in the middle of a word), apostrophe (cutting away).", example: "'Gym' for 'gymnasium' and 'ad' for 'advertisement' are apocope — the word trimmed from the tail." },
  { level: 8, word: "Eponymous", pronunciation: "/ɪˈpɒnɪməs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Of or relating to the person after whom something is named; giving one's own name to something.", etymology: "Greek epi- (upon) + onyma/onoma (name) → eponymos → eponymous. Root onom-/onym- means 'name'. Also in: anonymous (without a name), synonym (same name), pseudonym (false name), patronymic.", example: "The eponymous hero of the novel appears only on page one and page four hundred — a ghost in his own story." },
  { level: 8, word: "Hyperbole", pronunciation: "/hʌɪˈpɜːbəli/", partOfSpeech: "noun", category: "Art", definition: "Exaggerated statements not meant to be taken literally; deliberate overstatement for rhetorical effect.", etymology: "Greek hyper- (over, beyond) + ballein (to throw) → hyperbolē → hyperbole. Root bol-/bal- means 'to throw'. Also in: parabola (thrown alongside), symbol (thrown together), metabolism (thrown beyond), problem (thrown before).", example: "Saying the queue at the post office was 'a thousand years long' is hyperbole, but she wasn't entirely wrong." },
  { level: 8, word: "Hiraeth", pronunciation: "/ˈhɪraɪθ/", partOfSpeech: "noun", category: "Emotions", definition: "A Welsh concept: homesickness for a home one cannot return to, or which may never have existed; grief for lost places.", etymology: "Welsh hir (long) + aeth (pain, grief, departure) → hiraeth. Root hir- means 'long'; aeth suggests departure or loss. A Welsh loanword adopted into English for a particular quality of longing without exact equivalent.", example: "The emigrant felt hiraeth so acutely that every landscape reminded him of the one he had left behind." },
  { level: 8, word: "Frangible", pronunciation: "/ˈfrandʒɪb(ə)l/", partOfSpeech: "adjective", category: "Perception", definition: "Fragile; easily broken; capable of being shattered or destroyed.", etymology: "Latin frangere (to break) → frangibilis → frangible. Root frang-/fract- means 'to break'. Also in: fragment, fracture, fraction, infraction (a breaking of a rule), refractory (breaking back against control), refraction.", example: "The frangible bone china was packed in so much tissue that the box weighed more than its contents." },
  { level: 8, word: "Diapason", pronunciation: "/ˌdʌɪəˈpeɪz(ə)n/", partOfSpeech: "noun", category: "Art", definition: "The full compass of a musical instrument or voice; a rich, swelling burst of harmonious sound.", etymology: "Greek dia (through) + pason (all, feminine genitive plural of pas) → dia pason chordon (through all the strings) → diapason. Root pas-/pan- means 'all'. Also in: pandemic, panorama, panacea.", example: "When the organ reached full diapason, the stone walls of the cathedral seemed to vibrate in sympathetic resonance." },
  { level: 8, word: "Vellichor", pronunciation: "/ˈvɛlɪkɔː/", partOfSpeech: "noun", category: "Emotions", definition: "The strange wistfulness of used bookshops; the sense that a book contains a whole life that will outlast its reader.", etymology: "Coined by John Koenig (Dictionary of Obscure Sorrows). Possibly from vellum (scraped sheepskin — writing material) + ichor (the fluid of the gods in Greek myth). Root vell- relates to skin and writing.", example: "She spent three hours in the shop suffering vellichor — every spine a life she could enter, none of them hers." },
  { level: 8, word: "Heterodoxy", pronunciation: "/ˈhɛtərədɒksi/", partOfSpeech: "noun", category: "Intelligence", definition: "The holding of opinions at variance with accepted or established doctrine; the state of being unorthodox.", etymology: "Greek heteros (other, different) + doxa (opinion, glory) → heterodoxia → heterodoxy. Root heter- means 'other'. Also in: heterogeneous, heterodox. Root dox- means 'opinion'. Also in: orthodox (right opinion), paradox, doxology.", example: "Her heterodoxy on urban planning was mocked at conferences and implemented in five cities a decade later." },

  // ── ORIGINAL LEVEL 9 ─────────────────────────────────────────────────────
  { level: 9, word: "Pleonasm", pronunciation: "/ˈpliːəˌnæz(ə)m/", partOfSpeech: "noun", category: "Intelligence", definition: "The use of more words than necessary to convey meaning; redundancy of expression.", etymology: "Greek pleon (more) + nasmós (the act of filling) from pleonazein (to be excessive) → pleonasmus → pleonasm. Root ple-/pleo- means 'more/full'. Also in: plethora (over-fullness), plenum, plenty, complement, complete.", example: "'A free gift' and 'end result' are classic pleonasms — one word in each phrase does all the work." },
  { level: 9, word: "Apophenia", pronunciation: "/ˌæpəˈfiːniə/", partOfSpeech: "noun", category: "Intelligence", definition: "The tendency to perceive meaningful connections between unrelated things.", etymology: "Greek apo- (away from) + phainein (to show) + -ia (condition) → apophenia. Coined by Klaus Conrad (1958). Root phain- means 'to show/appear'. Also in: phenomenon, fantasy, emphasis, diaphanous, sycophant.", example: "Seeing faces in clouds or patterns in random noise is apophenia — the brain hunting for signal in static." },
  { level: 9, word: "Desiderata", pronunciation: "/dɪˌzɪdəˈrɑːtə/", partOfSpeech: "noun (plural)", category: "Character", definition: "Things that are needed or wanted; essential requirements.", etymology: "Latin desiderare (to long for, to miss) → desideratum (thing desired) → desiderata (plural). Root desider- means 'to long for'. Possibly from de- + sidus, sideris (star) — 'to long for one's lost star'. Also in: consider, desire.", example: "The job listing ran to two pages of desiderata, most of which contradicted the others." },
  { level: 9, word: "Kakistocracy", pronunciation: "/ˌkækɪˈstɒkrəsi/", partOfSpeech: "noun", category: "Social", definition: "Government by the worst or least qualified citizens.", etymology: "Greek kakistos (worst, superlative of kakos = bad) + kratos (rule, power) → kakistocracy. Root kak- means 'bad'. Also in: cacophony (kak + phone = bad sound). Root krat- means 'power/rule'. Also in: democracy, aristocracy.", example: "Critics called it a kakistocracy — every competent official had been replaced with loyalists of no relevant experience." },
  { level: 9, word: "Logomachy", pronunciation: "/lɒˈɡɒməki/", partOfSpeech: "noun", category: "Social", definition: "An argument about words; a dispute turning on a point of terminology rather than substance.", etymology: "Greek logos (word, reason) + makhē (battle, fight) → logomachy. Root log- means 'word/reason'. Also in: logic, logarithm, monologue, prologue. Root makh- means 'battle'.", example: "The committee's debate about whether the document was a 'policy' or a 'framework' was pure logomachy." },
  { level: 9, word: "Otiose", pronunciation: "/ˈəʊʃiəʊs/", partOfSpeech: "adjective", category: "Character", definition: "Serving no practical purpose; pointless; or (of a person) idle and indolent.", etymology: "Latin otium (leisure, idleness) → otiosus → otiose. Root oti- means 'leisure'. Also in: negotium (neg- = not + otium = not-leisure = business) → negotiate. Otium was the Romans' word for leisure.", example: "Three of the report's recommendations were otiose — they described what was already happening." },
  { level: 9, word: "Anamnesis", pronunciation: "/ˌænæmˈniːsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "Recollection, especially of a supposed previous existence; the medical history of a patient.", etymology: "Greek ana- (again, back) + mnesis (memory) from mnasthai (to remember) → anamnesis. Root mne- means 'memory' (same root as mnemonic). Also in: amnesia (a- = without + mnesia).", example: "The philosopher argued that great art works by anamnesis — not teaching us new things but revealing what we already knew." },
  { level: 9, word: "Casuistry", pronunciation: "/ˈkæʒjʊɪstri/", partOfSpeech: "noun", category: "Intelligence", definition: "The use of clever but false reasoning to justify actions; moral hair-splitting.", etymology: "Latin casus (a case, a falling, an event) from cadere (to fall) → casus + -istry → casuistry. Root cad-/cas- means 'to fall'. Also in: case, casual, occasion, accident, cadence, chance.", example: "The memo was a masterpiece of casuistry — technically correct and morally bankrupt in every line." },
  { level: 9, word: "Tmesis", pronunciation: "/ˈtmiːsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "The insertion of a word or words into the middle of another word, as in 'abso-bloody-lutely'.", etymology: "Greek tmesis (cutting) from temnein (to cut) → tmesis. Root tem-/tom- means 'to cut'. Also in: anatomy (ana + tomy = cutting up), appendectomy, atom (a- + tomos = un-cuttable), epitome.", example: "The footballer's post-match interview was famous for its creative tmesis — unprintable but linguistically fascinating." },
  { level: 9, word: "Noctilucent", pronunciation: "/ˌnɒktɪˈluːs(ə)nt/", partOfSpeech: "adjective", category: "Nature", definition: "Shining or luminous at night; specifically of the highest-altitude clouds visible in deep twilight.", etymology: "Latin nox, noctis (night) + lucere (to shine) → noctilucent. Root noct- means 'night'. Also in: nocturnal, equinox (aequi + nox = equal night). Root luc- means 'light' (see lucid, pellucid, elucidate).", example: "On summer nights at high latitudes, noctilucent clouds glow electric blue long after the sun has set." },
  { level: 9, word: "Synecdoche", pronunciation: "/sɪˈnɛkdəki/", partOfSpeech: "noun", category: "Intelligence", definition: "A figure of speech in which a part is used to represent the whole, or vice versa.", etymology: "Greek syn- (together) + ekdoche (interpretation) from ek- (out) + dekhesthai (to receive) → synekdoche → synecdoche. Root dech-/doc- means 'to receive/understand'. Also in: orthodox (right-receiving), paradox.", example: "'All hands on deck' uses synecdoche — 'hands' for the sailors to whom those hands belong." },
  // ── NEW LEVEL 9 ──────────────────────────────────────────────────────────
  { level: 9, word: "Pareidolia", pronunciation: "/ˌpærɪˈdəʊliə/", partOfSpeech: "noun", category: "Intelligence", definition: "The tendency to perceive a specific, often meaningful image in a random or ambiguous visual pattern.", etymology: "Greek para- (beside, alongside) + eidolon (image, form) from eidos (form) → pareidolia. Root eid-/id- means 'form/image'. Also in: idol, eidetic (relating to memory images), kaleidoscope (beautiful form-viewer).", example: "Pareidolia explains the Virgin Mary in toast, the man in the moon, and every face glimpsed in a wood-grain panel." },
  { level: 9, word: "Quiddity", pronunciation: "/ˈkwɪdɪti/", partOfSpeech: "noun", category: "Intelligence", definition: "The essential nature of something; what makes a thing what it is; a trifling point or quibble.", etymology: "Medieval Latin quidditas (whatness) from Latin quid (what) → quiddity. Root quid means 'what'. Also in: quid pro quo (what for what), quibble (an evasion), quodlibet (what pleases — a philosophical disputation).", example: "The philosopher spent a career on the quiddity of redness — what makes a thing red rather than seeming red." },

// ═══════════════════════════════════════════════════════
//  CONFIG — level labels and colours
// ═══════════════════════════════════════════════════════
const COLORS = {1:"#6B9E78",2:"#5B8FA8",3:"#A67C52",4:"#7B6FA0",5:"#C97B4B",6:"#3D7A6A",7:"#7A3D5C",8:"#4D6FA8",9:"#8A4D3D",10:"#2E2E2E"};
const LABELS = {1:"Foundational",2:"Developing",3:"Expanding",4:"Intermediate",5:"Proficient",6:"Advanced",7:"Scholarly",8:"Erudite",9:"Arcane",10:"Lexical Mastery"};

// ═══════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════
let S = {
  level:"All", mode:"browse",
  cards:[], idx:0, flipped:false, etymOpen:false,
  qPhase:"q", qOpts:[], qAns:null,
  score:{c:0,t:0}, streak:0, best:0, done:false
};

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const $  = id => document.getElementById(id);
const sh = (id, v) => $(id).classList.toggle("hidden", !v);
function shuffle(a){ return [...a].sort(()=>Math.random()-.5) }
function pool(){ return S.level==="All" ? WORDS : WORDS.filter(w=>w.level===+S.level) }
function col(){ return S.level==="All" ? "#2E2E2E" : (COLORS[+S.level]||"#2E2E2E") }
function cardCol(w){ return COLORS[w.level]||"#999" }

// ═══════════════════════════════════════════════════════
//  BUILD HOME
// ═══════════════════════════════════════════════════════
function buildHome(){
  $("hdr-count").textContent = WORDS.length + " Words · 10 Levels · Etymology";
  const list = $("lvl-list");
  list.innerHTML = "";
  const levels = [...new Set(WORDS.map(w=>w.level))].sort((a,b)=>a-b);
  // Show all 10 level slots; grey out empty ones
  for(let lvl=1;lvl<=10;lvl++){
    const c   = COLORS[lvl];
    const cnt = WORDS.filter(w=>w.level===lvl).length;
    const empty = cnt===0;
    const card = document.createElement("div");
    card.className = "lvl-card";
    card.style.borderLeft = `4px solid ${empty?"#DDD":c}`;
    card.innerHTML = `
      <div class="lvl-top">
        <div>
          <div class="lvl-eye" style="color:${empty?"#CCC":c}">Level ${lvl}</div>
          <div class="lvl-name" style="color:${empty?"#CCC":"inherit"}">${LABELS[lvl]}</div>
        </div>
        <span class="lvl-cnt">${cnt} word${cnt!==1?"s":""}</span>
      </div>
      <div class="row">
        <button class="btn-fl" style="border-color:${empty?"#DDD":c+"33"};color:${empty?"#CCC":c};background:${empty?"transparent":c+"11"}"
          ${empty?"disabled":""} onclick="start(${lvl},'browse')">📖 Flashcards</button>
        <button class="btn-qz" style="background:${empty?"#DDD":c};${empty?"cursor:not-allowed":""}"
          ${empty?"disabled":""} onclick="start(${lvl},'quiz')">⚡ Quiz</button>
      </div>`;
    list.appendChild(card);
  }
}

// ═══════════════════════════════════════════════════════
//  SESSION CONTROL
// ═══════════════════════════════════════════════════════
function start(lvl, mode){
  if(lvl!=="All" && WORDS.filter(w=>w.level===+lvl).length===0) return;
  S.level=lvl; S.mode=mode; S.best=0;
  reset();
  show("learn");
}

function reset(){
  S.cards=shuffle(pool());
  S.idx=0; S.flipped=false; S.etymOpen=false;
  S.qPhase="q"; S.qOpts=[]; S.qAns=null;
  S.score={c:0,t:0}; S.streak=0; S.done=false;
  render();
}

function switchMode(m){
  if(S.mode===m) return;
  S.mode=m; reset();
}

function goHome(){ show("home"); buildHome(); }

// ═══════════════════════════════════════════════════════
//  SCREEN SWITCH
// ═══════════════════════════════════════════════════════
function show(name){
  sh("s-home",  name==="home");
  sh("s-learn", name==="learn");
  if(name==="learn") render();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  // header
  $("l-title").textContent = S.level==="All"
    ? `All Words` : `Level ${S.level} — ${LABELS[+S.level]}`;
  $("st-streak").textContent = S.streak;
  $("st-best").textContent   = S.best;

  // mode buttons
  $("mb-browse").classList.toggle("on", S.mode==="browse");
  $("mb-quiz").classList.toggle("on",   S.mode==="quiz");

  // panels
  sh("score-screen", S.done);
  sh("prog",         !S.done);
  sh("fc-area",  !S.done && S.mode==="browse");
  sh("qz-area",  !S.done && S.mode==="quiz");

  if(S.done){ renderScore(); return; }

  // progress
  const n = S.cards.length, i = S.idx+1;
  $("prog-lbl").textContent  = `${i} / ${n}`;
  $("prog-fill").style.width = (i/n*100)+"%";
  $("prog-fill").style.background = col();
  const ps = $("prog-score");
  if(S.mode==="quiz"){
    ps.classList.remove("hidden");
    ps.textContent  = `${S.score.c}/${S.score.t} correct`;
    ps.style.color  = col();
  } else {
    ps.classList.add("hidden");
  }

  if(S.mode==="browse") renderFC();
  else                  renderQZ();
}

// ─── FLASHCARD ───────────────────────────────────────
function renderFC(){
  const w   = S.cards[S.idx];
  if(!w) return;
  const c   = cardCol(w);

  // colour bars + badges
  ["fc-front-bar","fc-back-bar"].forEach(id=>$(id).style.background=c);
  ["fc-badge","fc-badge2"].forEach(id=>{
    $(id).textContent = `Lv ${w.level}`;
    $(id).style.background = c+"22";
    $(id).style.color = c;
  });

  // front
  $("fc-word").textContent = w.word;
  $("fc-pron").textContent = w.pronunciation;
  $("fc-pos").textContent  = w.partOfSpeech;

  // back
  $("fc-bword").textContent = w.word;
  $("fc-def").textContent   = w.definition;
  $("fc-ex").textContent    = `"${w.example}"`;
  $("fc-ex").style.borderLeftColor = c;

  // flip
  $("card-inner").classList.toggle("flipped", S.flipped);

  // etymology
  sh("etym-wrap", S.flipped);
  if(S.flipped){
    $("etym-btn").textContent = S.etymOpen ? "▲ Hide Etymology" : "🌱 Show Etymology & Roots";
    $("etym-btn").style.borderColor = c+"55";
    $("etym-btn").style.color       = c;
    $("etym-btn").style.background  = c+"0D";
    $("etym-eye").style.color       = c;
    $("etym-txt").textContent       = w.etymology;
    sh("etym-panel", S.etymOpen);
    if(S.etymOpen){
      $("etym-panel").style.background  = c+"0D";
      $("etym-panel").style.borderColor = c+"44";
    }
  }

  // nav
  $("btn-prev").disabled   = S.idx===0;
  $("btn-next").textContent = S.idx+1<S.cards.length ? "Next →" : "Finish";
}

function flip(){
  if(S.mode!=="browse") return;
  S.flipped = !S.flipped;
  if(!S.flipped) S.etymOpen=false;
  render();
}
function toggleEtym(){ S.etymOpen=!S.etymOpen; render(); }
function prev(){ if(S.idx>0){S.idx--;S.flipped=false;S.etymOpen=false;render();} }
function next(){
  if(S.idx+1>=S.cards.length){ S.done=true; render(); }
  else{ S.idx++;S.flipped=false;S.etymOpen=false;S.qPhase="q";S.qOpts=[];S.qAns=null;render(); }
}

// ─── QUIZ ────────────────────────────────────────────
function renderQZ(){
  const w = S.cards[S.idx];
  if(!w) return;
  const c = cardCol(w);

  $("qprompt-bar").style.background = c;
  $("q-def").textContent = w.definition;

  // generate options once per card
  if(S.qPhase==="q" && S.qOpts.length===0){
    const p  = pool();
    const others = shuffle(p.filter(x=>x.word!==w.word)).slice(0,3);
    S.qOpts = shuffle([w,...others]);
  }

  // render options
  const container = $("qopts");
  container.innerHTML = "";
  const letters = ["A","B","C","D"];
  S.qOpts.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "qopt";
    if(S.qPhase==="result"){
      btn.classList.add("answered");
      if(opt.word===w.word)               btn.classList.add("correct");
      else if(S.qAns&&opt.word===S.qAns.word) btn.classList.add("wrong");
    }
    btn.innerHTML=`<span class="qletter">${letters[i]}</span>${opt.word}`;
    btn.addEventListener("click",()=>answer(opt));
    container.appendChild(btn);
  });

  // result panel
  sh("qresult", S.qPhase==="result");
  if(S.qPhase==="result"){
    const ok = S.qAns && S.qAns.word===w.word;
    $("qfb").className    = "qfb "+(ok?"correct":"wrong");
    $("qfb-lbl").textContent = ok ? "✓ Correct!" : `✗ The answer was "${w.word}"`;
    $("qfb-ex").textContent  = `"${w.example}"`;
    $("qetym").style.background  = c+"0D";
    $("qetym").style.borderColor = c+"44";
    $("qetym-lbl").style.color   = c;
    $("qetym-txt").textContent   = w.etymology;
    $("btn-nw").textContent = S.idx+1<S.cards.length ? "Next Word →" : "See Results";
  }
}

function answer(opt){
  if(S.qPhase==="result") return;
  S.qAns   = opt;
  S.qPhase = "result";
  const ok = opt.word===S.cards[S.idx].word;
  S.streak = ok ? S.streak+1 : 0;
  S.best   = Math.max(S.best, S.streak);
  S.score.t++;
  if(ok) S.score.c++;
  render();
}

// ─── SCORE ───────────────────────────────────────────
function renderScore(){
  const {c,t} = S.score;
  const ratio  = t>0 ? c/t : 0;
  const browse = S.mode==="browse";
  $("sc-emoji").textContent = browse ? "✨" : (ratio>=.8 ? "🏆" : "📚");
  $("sc-num").textContent   = browse ? "All Done!" : `${c} / ${t}`;
  $("sc-msg").textContent   = browse
    ? `You reviewed ${S.cards.length} words.`
    : (ratio>=.8 ? "Excellent — your lexicon is growing." : "Keep reviewing and the patterns will stick.");
  const sl = $("sc-streak");
  if(!browse && S.best>1){
    sl.classList.remove("hidden");
    sl.textContent  = `Best streak: ${S.best} in a row 🔥`;
    sl.style.color  = col();
  } else { sl.classList.add("hidden"); }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
buildHome();
</script>
