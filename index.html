<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--dark:#1A1A1A;--gold:#F7C873;--green:#7EC8A4;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --l1:#6B9E78;--l2:#5B8FA8;--l3:#A67C52;--l4:#7B6FA0;--l5:#C97B4B;
  --l6:#3D7A6A;--l7:#7A3D5C;--l8:#4D6FA8;--l9:#8A4D3D;--l10:#2E2E2E;
}
body{background:var(--bg);font-family:Georgia,serif;color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── UTILS ── */
.hidden{display:none!important}

/* ── HEADER ── */
.hdr{background:var(--dark);padding:18px 16px 14px;position:sticky;top:0;z-index:99}
.hdr-title{color:#F7F4EF;font-size:24px;font-weight:bold}
.hdr-sub{color:#888;font-family:sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.lhdr{background:var(--dark);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:99}
.back-btn{background:none;border:none;color:#888;cursor:pointer;font-family:sans-serif;font-size:13px;padding:4px 0;white-space:nowrap}
.back-btn:hover{color:#F7F4EF}
.lhdr-title{color:#F7F4EF;font-size:14px;font-weight:bold;text-align:center;flex:1}
.stats{display:flex;gap:14px;flex-shrink:0}
.stat{text-align:center}
.stat-n{font-family:sans-serif;font-size:16px;font-weight:bold}
.stat-l{color:#888;font-family:sans-serif;font-size:9px;text-transform:uppercase}
.s-streak{color:var(--gold)}.s-best{color:var(--green)}

/* ── CONTENT ── */
.wrap{max-width:520px;margin:0 auto;padding:20px 16px}

/* ── HOME ── */
.quick{background:var(--dark);border-radius:14px;padding:20px;margin-bottom:20px}
.q-eye{color:var(--gold);font-family:sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.q-ttl{color:#F7F4EF;font-size:18px;font-weight:bold;margin-bottom:12px}
.row{display:flex;gap:8px}
.btn-flash-dk{flex:1;padding:11px;border:2px solid #444;border-radius:9px;background:transparent;color:#F7F4EF;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:600}
.btn-flash-dk:hover{border-color:#888}
.btn-quiz-gd{flex:1;padding:11px;border:none;border-radius:9px;background:var(--gold);color:var(--dark);cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:700}
.btn-quiz-gd:hover{background:#e8b85f}
.sec-lbl{font-family:sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:12px}
.lvl-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.lvl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lvl-eye{font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.lvl-name{font-size:15px;font-weight:bold;margin-top:1px}
.lvl-cnt{font-family:sans-serif;font-size:12px;color:#AAA}
.btn-fl{flex:1;padding:8px;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:600;border:2px solid;background:transparent}
.btn-qz{flex:1;padding:8px;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:700;border:none;color:#fff}

/* ── MODE TOGGLE ── */
.mtog{display:flex;background:#E8E3DB;border-radius:8px;padding:3px;margin-bottom:14px;gap:3px}
.mbtn{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:#666}
.mbtn.on{background:var(--dark);color:#F7F4EF}

/* ── PROGRESS ── */
.prog{margin-bottom:14px}
.prog-meta{display:flex;justify-content:space-between;font-family:sans-serif;font-size:11px;color:#888;margin-bottom:5px}
.prog-score{font-weight:600}
.prog-track{height:3px;background:#DDD;border-radius:2px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s ease}

/* ── FLASHCARD ── */
.scene{perspective:1000px;margin-bottom:10px;cursor:pointer}
.inner{position:relative;width:100%;min-height:220px;transform-style:preserve-3d;transition:transform .45s ease;border-radius:16px}
.inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;min-height:220px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;background:#fff;box-shadow:var(--shadow);padding:24px 22px;overflow:hidden}
.face.back{transform:rotateY(180deg)}
.face-top-bar{height:5px;border-radius:16px 16px 0 0;position:absolute;top:0;left:0;right:0}
.badge{position:absolute;top:12px;right:14px;border-radius:10px;padding:2px 9px;font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px}
.front-body{text-align:center;padding-top:24px}
.card-word{font-size:36px;font-weight:bold;margin-bottom:8px;letter-spacing:-.5px}
.card-pron{color:#999;font-family:sans-serif;font-size:13px;margin-bottom:6px}
.card-pos{display:inline-block;color:#888;font-style:italic;font-family:sans-serif;font-size:11px;background:#F5F5F5;padding:3px 10px;border-radius:10px;margin-top:4px}
.tap-hint{margin-top:28px;color:#CCC;font-family:sans-serif;font-size:11px;letter-spacing:1px}
.back-word{font-size:20px;font-weight:bold;margin-bottom:10px}
.back-def{font-size:15px;line-height:1.65;color:#333;margin-bottom:16px}
.back-ex{padding-left:12px;color:#666;font-style:italic;font-size:13px;line-height:1.6;border-left:3px solid #ccc}

/* ── ETYMOLOGY ── */
.etym-btn{width:100%;margin-top:8px;padding:10px;border-radius:10px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:2px solid;background:transparent}
.etym-panel{border-radius:10px;padding:14px 16px;margin-top:4px;border:2px solid}
.etym-eye{font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.etym-txt{font-family:sans-serif;font-size:13px;line-height:1.7;color:#333}

/* ── CARD NAV ── */
.cnav{display:flex;gap:10px;margin-top:10px}
.btn-prev{flex:1;padding:12px;border:2px solid #DDD;border-radius:10px;background:transparent;font-family:sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-prev:disabled{color:#CCC;cursor:not-allowed}
.btn-prev:not(:disabled):hover{border-color:#AAA}
.btn-next{flex:2;padding:12px;border:none;border-radius:10px;background:var(--dark);color:#F7F4EF;font-family:sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-next:hover{background:#333}

/* ── QUIZ ── */
.qprompt{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:var(--shadow);margin-bottom:12px}
.qprompt-top{height:5px;border-radius:16px 16px 0 0;position:absolute;top:0;left:0;right:0}
.qprompt{position:relative;overflow:hidden}
.q-lbl{font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;margin-bottom:10px}
.q-def{font-size:16px;line-height:1.65;font-style:italic}
.qopts{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.qopt{padding:13px 16px;border-radius:10px;cursor:pointer;font-family:Georgia,serif;font-size:15px;font-weight:bold;text-align:left;display:flex;align-items:center;gap:10px;border:2px solid #E0DBD3;background:#fff;color:var(--dark);transition:border-color .15s}
.qopt:hover:not(.answered){border-color:#BBB}
.qopt.correct{background:#EAF7EE;border-color:#4A7C59;color:#2C5F38}
.qopt.wrong{background:#FBE9E7;border-color:#E07A5F;color:#8B2500}
.qopt.answered{cursor:default}
.qletter{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#F0EBE3;color:#888;font-family:sans-serif;font-size:10px;font-weight:700;flex-shrink:0}
.qfb{border-radius:10px;padding:12px 14px;margin-bottom:10px}
.qfb.correct{background:#EAF7EE;color:#2C5F38}
.qfb.wrong{background:#FBE9E7;color:#8B2500}
.qfb-lbl{font-family:sans-serif;font-size:13px;font-weight:700}
.qfb-ex{font-style:italic;color:#555;margin-top:5px;font-size:12px;line-height:1.5}
.qetym{border-radius:10px;padding:12px 14px;margin-bottom:10px;border:2px solid}
.qetym-lbl{font-family:sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.qetym-txt{font-family:sans-serif;font-size:12px;line-height:1.65;color:#444}
.btn-nw{width:100%;padding:13px;border:none;border-radius:10px;background:var(--dark);color:#F7F4EF;font-family:sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-nw:hover{background:#333}

/* ── SCORE ── */
.score-card{background:#fff;border-radius:16px;padding:40px 24px;text-align:center;box-shadow:var(--shadow)}
.sc-emoji{font-size:48px;margin-bottom:12px}
.sc-num{font-size:26px;font-weight:bold;margin-bottom:6px}
.sc-msg{color:#666;font-family:sans-serif;font-size:14px;margin-bottom:20px}
.sc-streak{font-family:sans-serif;font-size:13px;margin-bottom:16px}
.sc-btns{display:flex;gap:10px}
.btn-again{flex:1;padding:12px;background:var(--dark);color:#F7F4EF;border:none;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:14px;font-weight:600}
.btn-home{flex:1;padding:12px;background:transparent;color:#444;border:2px solid #DDD;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:14px;font-weight:600}
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div id="s-home">
  <div class="hdr">
    <div class="hdr-title">Lexicon</div>
    <div class="hdr-sub" id="hdr-count">— Words · 10 Levels · Etymology</div>
  </div>
  <div class="wrap">
    <div class="quick">
      <div class="q-eye">Quick Start</div>
      <div class="q-ttl">All Words</div>
      <div class="row">
        <button class="btn-flash-dk" onclick="start('All','browse')">📖 Flashcards</button>
        <button class="btn-quiz-gd"  onclick="start('All','quiz')">⚡ Quiz</button>
      </div>
    </div>
    <div class="sec-lbl">Choose a Level</div>
    <div id="lvl-list"></div>
  </div>
</div>

<!-- ══════════ LEARN ══════════ -->
<div id="s-learn" class="hidden">
  <div class="lhdr">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="lhdr-title" id="l-title"></div>
    <div class="stats">
      <div class="stat"><div class="stat-n s-streak" id="st-streak">0</div><div class="stat-l">Streak</div></div>
      <div class="stat"><div class="stat-n s-best"   id="st-best">0</div><div class="stat-l">Best</div></div>
    </div>
  </div>
  <div class="wrap">

    <!-- mode toggle -->
    <div class="mtog">
      <button class="mbtn" id="mb-browse" onclick="switchMode('browse')">📖 Flashcards</button>
      <button class="mbtn" id="mb-quiz"   onclick="switchMode('quiz')">⚡ Quiz</button>
    </div>

    <!-- progress -->
    <div class="prog" id="prog">
      <div class="prog-meta">
        <span id="prog-lbl">1 / 1</span>
        <span class="prog-score hidden" id="prog-score"></span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>

    <!-- score screen -->
    <div class="score-card hidden" id="score-screen">
      <div class="sc-emoji" id="sc-emoji"></div>
      <div class="sc-num"   id="sc-num"></div>
      <div class="sc-msg"   id="sc-msg"></div>
      <div class="sc-streak hidden" id="sc-streak"></div>
      <div class="sc-btns">
        <button class="btn-again" onclick="reset()">Go Again</button>
        <button class="btn-home"  onclick="goHome()">Home</button>
      </div>
    </div>

    <!-- flashcard area -->
    <div id="fc-area" class="hidden">
      <div class="scene" onclick="flip()">
        <div class="inner" id="card-inner">
          <!-- front -->
          <div class="face front" id="fc-front">
            <div class="face-top-bar" id="fc-front-bar"></div>
            <div class="badge" id="fc-badge"></div>
            <div class="front-body">
              <div class="card-word" id="fc-word"></div>
              <div class="card-pron" id="fc-pron"></div>
              <div class="card-pos"  id="fc-pos"></div>
              <div class="tap-hint">TAP TO REVEAL</div>
            </div>
          </div>
          <!-- back -->
          <div class="face back" id="fc-back">
            <div class="face-top-bar" id="fc-back-bar"></div>
            <div class="badge" id="fc-badge2"></div>
            <div class="back-word" id="fc-bword"></div>
            <div class="back-def"  id="fc-def"></div>
            <div class="back-ex"   id="fc-ex"></div>
          </div>
        </div>
      </div>
      <!-- etymology -->
      <div id="etym-wrap" class="hidden">
        <button class="etym-btn" id="etym-btn" onclick="toggleEtym()"></button>
        <div class="etym-panel hidden" id="etym-panel">
          <div class="etym-eye" id="etym-eye">Etymology &amp; Root Pattern</div>
          <div class="etym-txt" id="etym-txt"></div>
        </div>
      </div>
      <!-- nav -->
      <div class="cnav">
        <button class="btn-prev" id="btn-prev" onclick="prev()">← Prev</button>
        <button class="btn-next" id="btn-next" onclick="next()">Next →</button>
      </div>
    </div>

    <!-- quiz area -->
    <div id="qz-area" class="hidden">
      <div class="qprompt" id="qprompt">
        <div class="qprompt-top" id="qprompt-bar"></div>
        <div class="q-lbl">Which word matches this definition?</div>
        <div class="q-def" id="q-def"></div>
      </div>
      <div class="qopts" id="qopts"></div>
      <div id="qresult" class="hidden">
        <div class="qfb" id="qfb">
          <div class="qfb-lbl" id="qfb-lbl"></div>
          <div class="qfb-ex"  id="qfb-ex"></div>
        </div>
        <div class="qetym" id="qetym">
          <div class="qetym-lbl" id="qetym-lbl">🌱 Etymology</div>
          <div class="qetym-txt" id="qetym-txt"></div>
        </div>
        <button class="btn-nw" id="btn-nw" onclick="next()">Next Word →</button>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  WORD BANK — add your words here following this pattern
//  Required fields: level (1–10), word, pronunciation,
//  partOfSpeech, definition, etymology, example
// ═══════════════════════════════════════════════════════
const WORDS = [
  // ── ORIGINAL LEVEL 1 ─────────────────────────────────────────────────────
  { level: 1, word: "Vivid", pronunciation: "/ˈvɪvɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Producing powerful feelings or strong, clear images in the mind; intensely bright.", etymology: "Latin vivus (alive) → vivid. Root viv- means 'life'. Also in: survive, revive, vivacious.", example: "She had a vivid memory of the morning her father left — the smell of coffee, the creak of the door." },
  { level: 1, word: "Benign", pronunciation: "/bɪˈnaɪn/", partOfSpeech: "adjective", category: "Character", definition: "Gentle and kindly; not harmful or threatening.", etymology: "Latin bene (well) + genus (born, kind) → benign. Root bene- means 'good'. Also in: benefit, benevolent, benefactor.", example: "The old professor had a benign smile that immediately put nervous students at ease." },
  { level: 1, word: "Lucid", pronunciation: "/ˈluːsɪd/", partOfSpeech: "adjective", category: "Intelligence", definition: "Expressed clearly; easy to understand. Also: showing clear thinking.", etymology: "Latin lux, lucis (light) → lucidus → lucid. Root luc- means 'light'. Also in: translucent, elucidate, illuminate.", example: "Even in his final years, his writing remained remarkably lucid and precise." },
  { level: 1, word: "Arid", pronunciation: "/ˈærɪd/", partOfSpeech: "adjective", category: "Nature", definition: "Having little or no rain; too dry or dull.", etymology: "Latin aridus (dry) from arere (to be dry) → arid. Root ar- means 'to burn/dry'. Also in: aridity, ardent (burning).", example: "The travellers crossed an arid plateau where nothing but dust and rock extended to the horizon." },
  { level: 1, word: "Serene", pronunciation: "/səˈriːn/", partOfSpeech: "adjective", category: "Emotions", definition: "Calm, peaceful, and untroubled; tranquil.", etymology: "Latin serenus (clear, cloudless) → serene. The Romans used it of weather first, then of mood. Also in: serenity, serene Highness (a royal title).", example: "The lake at dawn was perfectly serene — a mirror for the pale sky above." },
  { level: 1, word: "Candid", pronunciation: "/ˈkændɪd/", partOfSpeech: "adjective", category: "Character", definition: "Truthful and straightforward; frank.", etymology: "Latin candidus (white, pure, sincere) from candere (to shine) → candid. Root cand- means 'to glow white'. Also in: candidate (Romans wore white togas), incandescent, candour.", example: "She gave a candid account of her mistakes, which won her more respect than any polished excuse." },
  { level: 1, word: "Mundane", pronunciation: "/mʌnˈdeɪn/", partOfSpeech: "adjective", category: "Time", definition: "Lacking interest or excitement; dull; of this world rather than spiritual.", etymology: "Latin mundus (world) → mundanus → mundane. Root mund- means 'world'. Also in: monde (French: world), demimonde.", example: "He found beauty in the mundane — a cracked pavement, a flickering street lamp, the hiss of a kettle." },
  { level: 1, word: "Temperate", pronunciation: "/ˈtɛmp(ə)rət/", partOfSpeech: "adjective", category: "Nature", definition: "Moderate; not extreme. Showing self-restraint.", etymology: "Latin temperare (to mix in due proportion, restrain) → temperatus → temperate. Root temper- means 'to mix/time'. Also in: temper, temperature, temperament, contemporary.", example: "She kept a temperate tone throughout the argument, which disarmed her opponent completely." },
  { level: 1, word: "Astute", pronunciation: "/əˈstjuːt/", partOfSpeech: "adjective", category: "Intelligence", definition: "Having the ability to assess situations accurately; mentally sharp and shrewd.", etymology: "Latin astutus (crafty) from astus (craft, cunning) → astute. Possibly linked to Greek asty (city) — the 'smart city-dweller' versus the naive rustic.", example: "An astute investor, she spotted the company's potential three years before anyone else did." },
  { level: 1, word: "Pensive", pronunciation: "/ˈpɛnsɪv/", partOfSpeech: "adjective", category: "Emotions", definition: "Engaged in, involving, or reflecting deep or serious thought.", etymology: "Latin pensare (to weigh, consider) → Old French pensif → pensive. Root pens-/pend- means 'to hang/weigh'. Also in: ponder, expend, compensate, pension.", example: "She stood at the window, pensive, watching the rain trace crooked lines down the glass." },
  // ── NEW LEVEL 1 ──────────────────────────────────────────────────────────
  { level: 1, word: "Ardent", pronunciation: "/ˈɑːdənt/", partOfSpeech: "adjective", category: "Emotions", definition: "Very enthusiastic or passionate; burning with feeling.", etymology: "Latin ardere (to burn) → ardens (burning) → ardent. Root ard- means 'to burn'. Also in: ardour, arson, arduous (fiery effort), arid (scorched dry).", example: "She was an ardent reader who went through three books a week and still felt behind." },
  { level: 1, word: "Terse", pronunciation: "/tɜːs/", partOfSpeech: "adjective", category: "Social", definition: "Sparing in words; brief and direct, sometimes to the point of rudeness.", etymology: "Latin tergere (to wipe clean) → tersus (wiped clean, polished) → terse. Root ters- means 'to wipe/polish'. Also in: deterge, detergent (wiping away dirt), terseness.", example: "His reply was terse — just two words — and she spent the rest of the day decoding them." },
  { level: 1, word: "Placid", pronunciation: "/ˈplæsɪd/", partOfSpeech: "adjective", category: "Emotions", definition: "Not easily upset or excited; calm and peaceful.", etymology: "Latin placere (to please) → placidus (calm, pleasing) → placid. Root plac- means 'to please/calm'. Also in: placate, complacent, implacable, please.", example: "The placid lake reflected the mountains so perfectly it was hard to know which was real." },
  { level: 1, word: "Cogent", pronunciation: "/ˈkəʊdʒənt/", partOfSpeech: "adjective", category: "Intelligence", definition: "Clear, logical, and convincing; powerfully persuasive.", etymology: "Latin cogere (to drive together, compel) from co- (together) + agere (to drive) → cogens → cogent. Root ag- means 'to drive/act'. Also in: agent, agile, cogitate, exact, navigate.", example: "Her cogent argument dismantled three years of policy in a single ten-minute presentation." },
  { level: 1, word: "Pristine", pronunciation: "/ˈprɪstiːn/", partOfSpeech: "adjective", category: "Perception", definition: "In its original condition; unspoiled; immaculately clean.", etymology: "Latin pristinus (former, original) from prior (before) → pristine. Root prist-/prior- means 'before/earlier'. Also in: prior, priority, primeval, primitive.", example: "The cabin had sat empty for a decade yet remained in pristine condition, as if time had forgotten it." },
  { level: 1, word: "Frugal", pronunciation: "/ˈfruːɡ(ə)l/", partOfSpeech: "adjective", category: "Character", definition: "Sparing or economical with money or food; avoiding waste.", etymology: "Latin frux, frugis (fruit, produce, profit) → frugalis (economical) → frugal. Root frug- means 'fruit/produce'. Also in: frugality, fruition, fruit (the productive result).", example: "Her frugal habits in her twenties meant she owned her flat outright before she was forty." },
  { level: 1, word: "Stoic", pronunciation: "/ˈstəʊɪk/", partOfSpeech: "adjective", category: "Character", definition: "Enduring pain or difficulty without complaint or emotional display.", etymology: "Greek Stoa (porch) → Stoikos → Stoic. Named after the painted Stoa in Athens where Zeno taught. Root stoa means 'porch/colonnade'. Also in: stoicism, hypostyle (under pillars).", example: "He accepted the diagnosis with stoic grace, then quietly arranged everything so others wouldn't worry." },
  { level: 1, word: "Garrulous", pronunciation: "/ˈɡærʊləs/", partOfSpeech: "adjective", category: "Social", definition: "Excessively talkative, especially on trivial matters.", etymology: "Latin garrire (to chatter, to twitter like birds) + -ulous → garrulus → garrulous. Root garr- is onomatopoeic — the chattering sound itself. Also in: garrulity, garble (to distort speech).", example: "The garrulous barber turned every haircut into a two-hour lecture on his nephew's football ambitions." },
  { level: 1, word: "Sullen", pronunciation: "/ˈsʌlən/", partOfSpeech: "adjective", category: "Emotions", definition: "Bad-tempered and silently resentful; moody and withdrawn.", etymology: "Anglo-French solein (alone, singular) from Latin solus (alone) → sullen. Root sol- means 'alone'. Also in: solo, solitary, sole, desolate, solitude — all suggesting aloneness.", example: "He arrived sullen and sat in the corner, resisting every attempt at conversation until the cake appeared." },
  { level: 1, word: "Dauntless", pronunciation: "/ˈdɔːntləs/", partOfSpeech: "adjective", category: "Character", definition: "Showing fearlessness and determination; impossible to intimidate.", etymology: "Old French danter (to tame, subdue) from Latin domitare (to tame) + -less → dauntless. Root domt-/daunt- means 'to tame'. Also in: daunt, indomitable (unable to be tamed), dominate, domain.", example: "The dauntless climber pressed on through the whiteout, certain the summit was just an hour ahead." },

  // ── ORIGINAL LEVEL 2 ─────────────────────────────────────────────────────
  { level: 2, word: "Ebullient", pronunciation: "/ɪˈbʌliənt/", partOfSpeech: "adjective", category: "Emotions", definition: "Cheerful and full of energy; overflowing with enthusiasm.", etymology: "Latin ebullire (to bubble up) from ex- (out) + bullire (to boil) → ebullient. Root bull- means 'bubble/boil'. Also in: bulletin, bull (seal), boil.", example: "Her ebullient personality lit up every room she entered." },
  { level: 2, word: "Petrichor", pronunciation: "/ˈpɛtrɪkɔːr/", partOfSpeech: "noun", category: "Nature", definition: "The pleasant, earthy smell produced when rain falls on dry soil.", etymology: "Greek petra (rock/stone) + ichor (the fluid in the veins of the gods) → petrichor. Coined in 1964. Root petr- also in: petroleum, petrify, Peter (the 'rock').", example: "After months of drought, the petrichor rising from the first rainfall was intoxicating." },
  { level: 2, word: "Loquacious", pronunciation: "/ləˈkweɪʃəs/", partOfSpeech: "adjective", category: "Social", definition: "Tending to talk a great deal; talkative.", etymology: "Latin loqui (to speak) + -acious (inclined to) → loquacious. Root loqu-/locu- means 'to speak'. Also in: eloquent, soliloquy, ventriloquist, colloquial.", example: "The loquacious tour guide never paused long enough to let anyone ask a question." },
  { level: 2, word: "Ephemeral", pronunciation: "/ɪˈfɛmərəl/", partOfSpeech: "adjective", category: "Time", definition: "Lasting for a very short time; fleeting.", etymology: "Greek epi (on) + hemera (day) → ephemeros → ephemeral. Root hemer- means 'day'. Also in: ephemeris (daily astronomical tables).", example: "Cherry blossoms are ephemeral — their beauty lasts barely a week." },
  { level: 2, word: "Convivial", pronunciation: "/kənˈvɪviəl/", partOfSpeech: "adjective", category: "Social", definition: "Relating to or fond of feasting and good company; warm and friendly.", etymology: "Latin con- (together) + vivere (to live) → convivialis → convivial. Root viv- means 'life'. Also in: vivid, revive, survive.", example: "The convivial atmosphere of the dinner party made strangers feel like old friends." },
  { level: 2, word: "Liminal", pronunciation: "/ˈlɪmɪnəl/", partOfSpeech: "adjective", category: "Time", definition: "Relating to a transitional or in-between state; occupying a threshold.", etymology: "Latin limen, liminis (threshold, doorway) → liminalis → liminal. Root limin- means 'threshold'. Also in: eliminate (literally 'to push out of the doorway'), subliminal.", example: "Midnight on New Year's Eve is a liminal moment — suspended between what was and what might be." },
  { level: 2, word: "Sylvan", pronunciation: "/ˈsɪlvən/", partOfSpeech: "adjective", category: "Nature", definition: "Relating to or characteristic of woods; pleasantly wooded and rural.", etymology: "Latin silva (forest, woodland) → silvanus → sylvan. Root silv- means 'forest'. Also in: Sylvia (a name meaning 'forest'), Pennsylvania ('Penn's woodland').", example: "They found a sylvan glade where sunlight filtered through ancient oaks." },
  { level: 2, word: "Equanimity", pronunciation: "/ˌɛkwəˈnɪmɪti/", partOfSpeech: "noun", category: "Emotions", definition: "Mental calmness and composure, especially in difficult situations.", etymology: "Latin aequus (equal, even) + animus (mind, spirit) → aequanimitas → equanimity. Root anim- means 'mind/breath'. Also in: aequus → equal, adequate; animus → animate, animal.", example: "He faced the diagnosis with remarkable equanimity, focusing on what he could control." },
  { level: 2, word: "Crepuscular", pronunciation: "/krɪˈpʌskjʊlər/", partOfSpeech: "adjective", category: "Nature", definition: "Relating to or active during twilight; dim and shadowy.", etymology: "Latin crepusculum (twilight, dusk) from creper (dusky, uncertain) → crepuscular. The Romans felt twilight was the 'uncertain' time between day and night.", example: "Deer are crepuscular creatures, most active at dawn and dusk." },
  { level: 2, word: "Mellifluous", pronunciation: "/mɛˈlɪfluəs/", partOfSpeech: "adjective", category: "Perception", definition: "Sweet or musical; pleasant to hear; flowing with honey.", etymology: "Latin mel, mellis (honey) + fluere (to flow) → mellifluus → mellifluous. Root mel- also in: molasses, marmalade; flu- means 'flow' — also in: fluid, flux, influence.", example: "The cellist had a mellifluous tone that made the audience close their eyes and drift." },
  // ── NEW LEVEL 2 ──────────────────────────────────────────────────────────
  { level: 2, word: "Laconic", pronunciation: "/ləˈkɒnɪk/", partOfSpeech: "adjective", category: "Social", definition: "Using very few words; brief to the point of seeming rude or mysterious.", etymology: "Greek Lakon (a Spartan, inhabitant of Laconia) → lakonikos → laconic. Spartans were famous for blunt, minimal speech. A place-name becoming a word-type. Also in: laconism, laconically.", example: "When asked how the battle had gone, the general's laconic reply was a single raised eyebrow." },
  { level: 2, word: "Ennui", pronunciation: "/ˈɒnwiː/", partOfSpeech: "noun", category: "Emotions", definition: "A feeling of listlessness and dissatisfaction arising from lack of occupation or excitement; world-weariness.", etymology: "Old French enui (annoyance) from Latin in odio esse (to be hateful) from odium (hatred) → ennui. Root od- means 'hate'. Also in: odious, odium, annoy (same Latin root via French).", example: "The ennui of her third week in the beachside resort was complete — sun and cocktails had lost all meaning." },
  { level: 2, word: "Wistful", pronunciation: "/ˈwɪstf(ə)l/", partOfSpeech: "adjective", category: "Emotions", definition: "Having or showing a feeling of vague or regretful longing.", etymology: "Possibly from whist (silent, attentive) + -ful, influenced by wishful. Root wist- may relate to Germanic wissen (to know) — the sadness of knowing what's gone. Also in: wishful, listless.", example: "She looked at the photograph with wistful eyes, recognising her younger self without quite claiming her." },
  { level: 2, word: "Blithe", pronunciation: "/blʌɪð/", partOfSpeech: "adjective", category: "Emotions", definition: "Showing a casual and cheerful indifference; carefree and lighthearted.", etymology: "Old English blīþe (joyful, cheerful, kind) from Proto-Germanic blithiz. Root blith- means 'gentle/joyful'. Also in: bliss (same Germanic root), blithely, blissful.", example: "He signed the contract with blithe disregard for the small print, and regretted it thoroughly by Thursday." },
  { level: 2, word: "Tenuous", pronunciation: "/ˈtɛnjʊəs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Very weak or slight; lacking substance; too thin to hold together.", etymology: "Latin tenuis (thin, fine, slight) + -ous → tenuous. Root ten- means 'thin/stretched'. Also in: attenuate (to thin out), extenuate (to stretch out, make thinner), thin (Germanic cognate).", example: "The connection between the two crimes was tenuous at best — a colour, a calendar date, and nothing more." },
  { level: 2, word: "Volition", pronunciation: "/vəˈlɪʃ(ə)n/", partOfSpeech: "noun", category: "Character", definition: "The faculty or power of using one's will; a conscious choice or decision.", etymology: "Latin velle (to wish, to will) → volitio → volition. Root vol- means 'to will/wish'. Also in: volunteer (one who wills), benevolent (well-wishing), malevolent, involuntary.", example: "She left the company entirely of her own volition — no redundancy, no crisis, just a quiet decision to go." },
  { level: 2, word: "Hapless", pronunciation: "/ˈhapləs/", partOfSpeech: "adjective", category: "Emotions", definition: "Unlucky; unfortunate; having no luck.", etymology: "Old Norse happ (luck, chance) + -less → hapless. Root happ- means 'luck/fortune'. Also in: happy (originally 'lucky'), happen (to come by chance), mishap, haphazard, perhaps.", example: "The hapless tourist had lost his passport, his wallet, and his return ticket all in the same afternoon." },
  { level: 2, word: "Verdant", pronunciation: "/ˈvɜːd(ə)nt/", partOfSpeech: "adjective", category: "Nature", definition: "Green with grass or other rich vegetation; lush and growing.", etymology: "Old French verd (green) from Latin viridis (green) → verdant. Root virid-/verd- means 'green'. Also in: verdigris (green of Greece), verdure (lush greenness), vert (heraldic green), viridian.", example: "After a week of rain the valley was astonishingly verdant, every hillside bright as stained glass." },
  { level: 2, word: "Fervent", pronunciation: "/ˈfɜːv(ə)nt/", partOfSpeech: "adjective", category: "Emotions", definition: "Having or displaying passionate intensity of feeling.", etymology: "Latin fervere (to boil, to be hot) → fervens → fervent. Root ferv- means 'to boil'. Also in: fervour, ferment, effervescent (ex + fervere = boiling out), fever (related Germanic root).", example: "His fervent belief in the project carried the whole team through six months of setbacks and budget cuts." },
  { level: 2, word: "Penurious", pronunciation: "/pɪˈnjʊəriəs/", partOfSpeech: "adjective", category: "Character", definition: "Extremely poor; characterized by poverty; excessively unwilling to spend money.", etymology: "Latin penuria (want, scarcity) + -ious → penuriosus → penurious. Root pen-/penu- means 'scarcity'. Also in: penury (extreme poverty), paene (almost) — same prefix as peninsula, penumbra.", example: "The penurious scholar lived on lentils and library books, and considered this a perfectly reasonable arrangement." },

  // ── ORIGINAL LEVEL 3 ─────────────────────────────────────────────────────
  { level: 3, word: "Perspicacious", pronunciation: "/ˌpɜːspɪˈkeɪʃəs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Having a ready insight into things; shrewd and discerning.", etymology: "Latin perspicere (to see through) from per- (through) + specere (to look) → perspicax → perspicacious. Root spec- means 'to look'. Also in: spectacle, inspect, aspect, conspicuous.", example: "Her perspicacious reading of the negotiation saved the deal from collapse." },
  { level: 3, word: "Susurrus", pronunciation: "/suːˈsʌrəs/", partOfSpeech: "noun", category: "Nature", definition: "A whispering or murmuring sound.", etymology: "Latin susurrus (a murmur, hum, whisper) — an onomatopoeic word; the sound mimics the thing it names. Also in: susurrate (to whisper). Compare: buzz, hiss, murmur — all onomatopoeia.", example: "She fell asleep to the susurrus of wind moving through tall grass." },
  { level: 3, word: "Effervescent", pronunciation: "/ˌɛfəˈvɛs(ə)nt/", partOfSpeech: "adjective", category: "Emotions", definition: "Vivacious and enthusiastic; giving off bubbles; fizzing with life.", etymology: "Latin ex- (out) + fervere (to boil, to be hot) → effervescere → effervescent. Root ferv- means 'to boil/glow'. Also in: fervent, fervour, fever.", example: "The crowd was effervescent, cheering and laughing long after the show ended." },
  { level: 3, word: "Recondite", pronunciation: "/ˈrɛkəndaɪt/", partOfSpeech: "adjective", category: "Intelligence", definition: "Not known by many people; abstruse or obscure.", etymology: "Latin recondere (to hide away) from re- (back) + condere (to put, store) → reconditus → recondite. Root cond- means 'to put/build'. Also in: abscond, condition, found (to establish).", example: "The professor's lectures on recondite medieval philosophy attracted only the most dedicated students." },
  { level: 3, word: "Sonder", pronunciation: "/ˈsɒndər/", partOfSpeech: "noun", category: "Emotions", definition: "The realization that each passerby has a life as vivid and complex as your own.", etymology: "Coined by John Koenig (2012) in 'The Dictionary of Obscure Sorrows'. Likely from German sondern (to separate/distinguish) and French sonder (to probe/sound). A neologism built on real roots.", example: "Walking through the airport, she felt a deep sonder — every stranger rushing past carried invisible worlds." },
  { level: 3, word: "Solipsism", pronunciation: "/ˈsɒlɪpsɪz(ə)m/", partOfSpeech: "noun", category: "Intelligence", definition: "The philosophical view that only one's own mind is certain to exist; extreme self-absorption.", etymology: "Latin solus (alone) + ipse (self) + -ism → solipsism. Root sol- means 'alone/only'. Also in: solo, sole, solitary. Root ipse means 'self' — also in: ipso facto ('by the fact itself').", example: "His solipsism made it hard for him to accept that others might see the world differently." },
  { level: 3, word: "Perspicuous", pronunciation: "/pəˈspɪkjuəs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Clearly expressed and easily understood; transparent and lucid.", etymology: "Latin perspicuus (transparent, clear) from perspicere (to see through) → perspicuous. Same root as perspicacious (spec- = to look), but -uous means 'having the quality of'.", example: "The physicist had a gift for perspicuous explanations that made quantum theory feel intuitive." },
  { level: 3, word: "Fugacious", pronunciation: "/fjuːˈɡeɪʃəs/", partOfSpeech: "adjective", category: "Time", definition: "Tending to disappear; fleeting or transitory.", etymology: "Latin fugere (to flee) + -acious → fugacious. Root fug- means 'to flee'. Also in: fugitive, refuge (a place to flee to), centrifugal, febrifuge.", example: "Youth is fugacious — you barely notice it slipping away until it's gone." },
  { level: 3, word: "Numinous", pronunciation: "/ˈnjuːmɪnəs/", partOfSpeech: "adjective", category: "Perception", definition: "Having a strong religious or spiritual quality; indicating the presence of a divinity.", etymology: "Latin numen (divine power, nod of a god's head) + -ous → numinous. From nuere (to nod, give a sign). Popularised by Rudolf Otto in 'The Idea of the Holy' (1917).", example: "Standing inside the ancient cathedral, even the atheists felt something numinous in the stone and light." },
  { level: 3, word: "Veracious", pronunciation: "/vəˈreɪʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Speaking or representing the truth; truthful.", etymology: "Latin verax, veracis (truthful) from verus (true) → veracious. Root ver- means 'true'. Also in: verify, verdict (true saying), aver, verisimilitude. Don't confuse with voracious (vor- = to devour).", example: "She was known as a veracious witness — no embellishment, no omission, just what she saw." },
  // ── NEW LEVEL 3 ──────────────────────────────────────────────────────────
  { level: 3, word: "Mendacious", pronunciation: "/mɛnˈdeɪʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Not telling the truth; lying habitually; given to falsehood.", etymology: "Latin mendax, mendacis (lying) from mendum (fault, error) → mendacious. Root mend- means 'fault/defect'. Also in: mendacity, emend (to correct faults), amend (to remove defects), mend (to fix).", example: "The memoir was exposed as mendacious — the author had placed herself at events she had only read about." },
  { level: 3, word: "Lurid", pronunciation: "/ˈlʊərɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Unpleasantly bright or vivid; sensationally shocking; ghastly in colour.", etymology: "Latin luridus (pale yellow, wan, ghastly) from luror (a yellowish pallor) → lurid. Root lur- suggests sickly or ghastly light. Ancient meaning was pallid; the modern sense shifted toward garish.", example: "The tabloid ran the story under a lurid headline that bore almost no relation to the actual events." },
  { level: 3, word: "Ruminate", pronunciation: "/ˈruːmɪneɪt/", partOfSpeech: "verb", category: "Intelligence", definition: "To think deeply and at length; (of cattle) to chew the cud.", etymology: "Latin rumen (the throat, the first stomach of a cud-chewing animal) → ruminare (to chew the cud) → ruminate. Root rumin- means 'throat/gullet'. Also in: rumination, ruminant (cud-chewing mammal).", example: "She sat ruminating over the letter for an hour before she understood what it was actually saying." },
  { level: 3, word: "Diaphanous", pronunciation: "/dʌɪˈæfənəs/", partOfSpeech: "adjective", category: "Perception", definition: "Light, delicate, and translucent; almost see-through.", etymology: "Greek dia- (through) + phainein (to show, to appear) → diaphanes → diaphanous. Root phain- means 'to show/appear'. Also in: phenomenon, emphasis, phase, fantasy, apophenia.", example: "She wore a diaphanous scarf that floated behind her in the sea breeze like a second shadow." },
  { level: 3, word: "Trepidation", pronunciation: "/ˌtrɛpɪˈdeɪʃ(ə)n/", partOfSpeech: "noun", category: "Emotions", definition: "A feeling of fear or agitation about something that may happen; trembling apprehension.", etymology: "Latin trepidare (to tremble, to be alarmed) + -tion → trepidatio → trepidation. Root trepid- means 'to tremble'. Also in: intrepid (not trembling, hence fearless), trepidatious.", example: "She opened the test results with considerable trepidation, having spent a week imagining every possible outcome." },
  { level: 3, word: "Prodigious", pronunciation: "/prəˈdɪdʒəs/", partOfSpeech: "adjective", category: "Perception", definition: "Remarkably great in extent, size, or degree; impressively enormous.", etymology: "Latin prodigium (a portent, an omen, something unnatural) → prodigiosus → prodigious. Root prodig- means 'an extraordinary sign'. Also in: prodigy (a wondrous person or thing), prodigal.", example: "The young pianist showed prodigious talent — performing Chopin at eight with the memory and feel of a veteran." },
  { level: 3, word: "Incandescent", pronunciation: "/ˌɪnkænˈdɛs(ə)nt/", partOfSpeech: "adjective", category: "Perception", definition: "Emitting bright light as a result of intense heat; or extremely angry or brilliant.", etymology: "Latin in- (in) + candere (to glow, to be white-hot) → incandescere → incandescent. Root cand- means 'to glow white'. Also in: candid (white/sincere), candidate (white toga), candle, candour.", example: "The director was incandescent when she discovered the entire set had been painted the wrong shade of blue." },
  { level: 3, word: "Lassitude", pronunciation: "/ˈlæsɪtjuːd/", partOfSpeech: "noun", category: "Emotions", definition: "Physical or mental weariness; lack of energy; languid fatigue.", etymology: "Latin lassus (weary, tired) + -tudo (state of) → lassitudo → lassitude. Root lass- means 'weary'. Also in: alas (an exclamation of weariness or grief), lax (loose, weary), relax.", example: "A strange lassitude descended after the exam results — weeks of urgency vanished in a single afternoon." },
  { level: 3, word: "Tortuous", pronunciation: "/ˈtɔːtʃʊəs/", partOfSpeech: "adjective", category: "Nature", definition: "Full of twists and turns; complex and indirect; deviously intricate.", etymology: "Latin torquere (to twist) → tortuosus → tortuous. Root tort-/torqu- means 'to twist'. Also in: torture (twisting pain), torque, contort, extort (to twist out of someone), distort, retort.", example: "The tortuous mountain road required full attention — hairpin after hairpin with a sheer drop on one side." },

  // ── ORIGINAL LEVEL 4 ─────────────────────────────────────────────────────
  { level: 4, word: "Sagacious", pronunciation: "/səˈɡeɪʃəs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Having or showing keen mental discernment and good judgment; wise.", etymology: "Latin sagax, sagacis (keen-scented, quick to perceive) from sagire (to perceive keenly) → sagacious. Root sag- means 'to sense/perceive'. Related to: seek (Germanic cognate), presage.", example: "The sagacious investor knew that panic-selling was a mistake — he'd seen this pattern twice before." },
  { level: 4, word: "Propitious", pronunciation: "/prəˈpɪʃəs/", partOfSpeech: "adjective", category: "Time", definition: "Giving or indicating a good chance of success; favourable.", etymology: "Latin propitius (favourable, gracious) from pro- (before/for) + petere (to seek) → propitious. Root pet-/pit- means 'to rush toward'. Also in: petition, compete, perpetual, appetite.", example: "The calm sea and clear sky offered propitious conditions for the crossing." },
  { level: 4, word: "Palimpsest", pronunciation: "/ˈpælɪmpsɛst/", partOfSpeech: "noun", category: "Time", definition: "A manuscript where writing has been erased and overwritten; something altered but still bearing traces of an earlier form.", etymology: "Greek palin (again) + psestos (scraped) from psen (to scrape) → palimpsest. Root palin- means 'again, back'. Also in: palindrome (palin + dromos = running back).", example: "The old city is a palimpsest — Roman walls underpin medieval streets, which carry Georgian facades." },
  { level: 4, word: "Tendentious", pronunciation: "/tɛnˈdɛnʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Expressing a particular point of view; promoting a cause; biased.", etymology: "Medieval Latin tendentia (tendency) from Latin tendere (to stretch, aim toward) → tendentious. Root tend- means 'to stretch'. Also in: tend, tension, extend, contend, attend, tendon.", example: "The documentary was widely criticised as tendentious — the evidence was real, but the framing was one-sided." },
  { level: 4, word: "Lugubrious", pronunciation: "/luːˈɡuːbriəs/", partOfSpeech: "adjective", category: "Emotions", definition: "Looking or sounding sad and dismal; mournful, often to an exaggerated degree.", etymology: "Latin lugere (to mourn) → lugubris → lugubrious. Root lug-/luc- (mourning) is ancient and isolated. Also in: elegy (via Greek elegia, a song of mourning).", example: "The basset hound stared up at him with those lugubrious eyes, as if the world itself were ending." },
  { level: 4, word: "Tenacious", pronunciation: "/tɪˈneɪʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Keeping a firm hold; persistent; not giving up easily.", etymology: "Latin tenere (to hold) + -acious → tenacious. Root ten- means 'to hold'. Also in: tenant, retain, contain, abstain, entertain, lieutenant (literally 'holding in place of').", example: "A tenacious litigator, she pursued justice for her client through seven years of appeals." },
  { level: 4, word: "Vicarious", pronunciation: "/vɪˈkɛːriəs/", partOfSpeech: "adjective", category: "Emotions", definition: "Experienced in the imagination through the feelings or actions of another person.", etymology: "Latin vicarius (substitute, deputy) from vicis (change, turn, place) → vicarious. Root vic- means 'change/substitution'. Also in: vicar, vice (as in vice-president = substitute president), vicissitude.", example: "She lived vicariously through travel blogs during the years she couldn't afford to go anywhere herself." },
  { level: 4, word: "Pellucid", pronunciation: "/pɛˈluːsɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Translucently clear; easily understood; limpid.", etymology: "Latin per- (through) + lucere (to shine) → pellucidus → pellucid. Root luc- means 'light'. Also in: lucid, translucent, elucidate, illuminate. The per- became pel- through sound change.", example: "The mountain stream was pellucid — every pebble on the bed visible from the bank above." },
  { level: 4, word: "Inveterate", pronunciation: "/ɪnˈvɛt(ə)rət/", partOfSpeech: "adjective", category: "Character", definition: "Having a particular habit, activity, or interest deeply established over a long period.", etymology: "Latin inveterare (to make old, to root in) from in- (in) + vetus, veteris (old) → inveteratus → inveterate. Root veter- means 'old'. Also in: veteran, veterinarian (originally treating old/working animals).", example: "An inveterate traveller, he had slept in forty-seven countries and could not imagine stopping." },
  { level: 4, word: "Limpid", pronunciation: "/ˈlɪmpɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Completely clear and transparent; free from complexity.", etymology: "Latin limpidus (clear, pure) → limpid. Possibly related to lympha (clear water, spring) → lymph. Root limpid- suggests transparent purity; lymph shares the water-clarity idea.", example: "Her prose was limpid — not a wasted word, not a cloudy phrase, everything perfectly transparent." },
  // ── NEW LEVEL 4 ──────────────────────────────────────────────────────────
  { level: 4, word: "Ineffable", pronunciation: "/ɪnˈɛfəb(ə)l/", partOfSpeech: "adjective", category: "Perception", definition: "Too great or extreme to be expressed in words; inexpressible and beyond language.", etymology: "Latin in- (not) + effabilis (that can be spoken) from ex- (out) + fari (to speak) → ineffabilis → ineffable. Root fa-/phat- means 'to speak'. Also in: fable, infant (unable to speak), famous, fate.", example: "The view from the ridge at first light produced an ineffable feeling that no photograph could hold." },
  { level: 4, word: "Pernicious", pronunciation: "/pəˈnɪʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Having a harmful effect, especially in a gradual or subtle way; insidiously destructive.", etymology: "Latin pernicies (destruction, ruin) from per- (through) + nex, necis (death) → perniciosus → pernicious. Root nec-/nex- means 'death'. Also in: necromancy, internecine (mutually deadly).", example: "The pernicious rumour spread quietly through the office for months before anyone traced it to its source." },
  { level: 4, word: "Obsequious", pronunciation: "/əbˈsiːkwɪəs/", partOfSpeech: "adjective", category: "Social", definition: "Obedient or attentive to an excessive degree; fawningly compliant.", etymology: "Latin obsequi (to comply with, to follow) from ob- (toward) + sequi (to follow) → obsequiosus → obsequious. Root sequ- means 'to follow'. Also in: sequence, consequence, sequel, subsequent.", example: "The obsequious assistant agreed with everything the boss said, even when the boss contradicted himself twice." },
  { level: 4, word: "Contrite", pronunciation: "/ˈkɒntrʌɪt/", partOfSpeech: "adjective", category: "Emotions", definition: "Feeling or expressing deep remorse; affected by guilt for having done wrong.", etymology: "Latin conterere (to grind, to bruise) from con- (completely) + terere (to rub, grind) → contritus → contrite. Root ter- means 'to rub/grind'. Also in: trite (worn smooth by overuse), attrition, detriment.", example: "He arrived at the door contrite and carrying flowers, which she accepted without comment." },
  { level: 4, word: "Inured", pronunciation: "/ɪˈnjʊəd/", partOfSpeech: "adjective", category: "Character", definition: "Accustomed to something unpleasant through long exposure; hardened or desensitised.", etymology: "Old French en oeuvre (in use, in operation) → ure (use, practice) → inure. Root ure/oper- means 'work/use'. Also in: manure (literally 'hand-work', turning soil), operate, opus, opera.", example: "After two winters on the trawler, he was thoroughly inured to cold — indifferent to weather that stopped others." },
  { level: 4, word: "Paucity", pronunciation: "/ˈpɔːsɪti/", partOfSpeech: "noun", category: "Time", definition: "The presence of something only in small or insufficient quantities; scarcity.", etymology: "Latin paucus (few, little) + -ity → paucitas → paucity. Root pauc- means 'few'. Also in: pauper (one with few resources), few (Germanic cognate), poco (Italian: little).", example: "The report highlighted a paucity of evidence for the claims — three footnotes citing a single discredited study." },
  { level: 4, word: "Munificent", pronunciation: "/mjuːˈnɪfɪs(ə)nt/", partOfSpeech: "adjective", category: "Character", definition: "Very generous; larger or more elaborate than necessary; lavishly bountiful.", etymology: "Latin munus (gift, duty) + facere (to make) → munificus → munificent. Root mun- means 'gift/duty'. Also in: municipal (civic duty), munitions (public supplies), community (shared duty), immune.", example: "The munificent bequest funded the library wing, the scholarship endowment, and the new roof." },
  { level: 4, word: "Dissemble", pronunciation: "/dɪˈsɛmb(ə)l/", partOfSpeech: "verb", category: "Character", definition: "To conceal one's true motives, feelings, or beliefs; to behave hypocritically.", etymology: "Latin dissimulare (to hide, to disguise) from dis- (apart) + simulare (to pretend, make like) → dissemble. Root simul- means 'to copy/make like'. Also in: simulate, simultaneous, semblance, similar.", example: "She managed to dissemble perfectly through the interview, betraying nothing of the fact she had already accepted another offer." },
  { level: 4, word: "Florid", pronunciation: "/ˈflɒrɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Elaborately intricate and ornate; (of a complexion) ruddy; excessively flowery in style.", etymology: "Latin flos, floris (flower) + -id → floridus → florid. Root flor- means 'flower'. Also in: flora, floral, flourish (to flower), Florida (the 'flowery' land), flour (the finest flower of ground wheat).", example: "His prose style was florid to the point of parody — six adjectives where two would have served." },

  // ── ORIGINAL LEVEL 5 ─────────────────────────────────────────────────────
  { level: 5, word: "Sanguine", pronunciation: "/ˈsæŋɡwɪn/", partOfSpeech: "adjective", category: "Emotions", definition: "Optimistic, especially in a difficult situation; blood-red in colour.", etymology: "Latin sanguis, sanguinis (blood) → sanguineus → sanguine. Medieval doctors believed a blood-dominant 'humour' made people cheerful. Root sanguin- means 'blood'. Also in: consanguineous, sanguinary.", example: "Despite the setbacks, she remained sanguine — certain that the right path would reveal itself." },
  { level: 5, word: "Melancholy", pronunciation: "/ˈmɛlənkɒli/", partOfSpeech: "noun/adjective", category: "Emotions", definition: "A feeling of pensive sadness; a deep, reflective gloom.", etymology: "Greek melas (black) + khole (bile) → melankolia. Medieval humour theory: too much 'black bile' caused sadness. Root melan- means 'black'. Also in: melanin, melanoma. Khole also in: cholera, cholesterol.", example: "There was a beautiful melancholy to the last days of autumn — everything releasing its colour at once." },
  { level: 5, word: "Acrimony", pronunciation: "/ˈækrɪməni/", partOfSpeech: "noun", category: "Social", definition: "Bitterness or ill-feeling, especially in speech or manner.", etymology: "Latin acer, acris (sharp, keen, bitter) → acrimonia → acrimony. Root acr-/ac- means 'sharp'. Also in: acid, acerbic, acumen, exacerbate, acute (all sharing the 'sharp' sense).", example: "The divorce was settled, but the acrimony between them lingered for years in every custody exchange." },
  { level: 5, word: "Phlegmatic", pronunciation: "/flɛɡˈmætɪk/", partOfSpeech: "adjective", category: "Character", definition: "Having an unemotional and stolidly calm disposition; not easily excited.", etymology: "Greek phlegma (inflammation, the 'cool, moist' humour) from phlegein (to burn). Paradoxically, the 'cool' humour made people calm. Root phleg- means 'to burn'. Also in: phlegm, phlogiston.", example: "A phlegmatic man by nature, he received both good news and bad with the same measured nod." },
  { level: 5, word: "Penumbra", pronunciation: "/pɪˈnʌmbrə/", partOfSpeech: "noun", category: "Perception", definition: "The partially shaded outer region of a shadow; the area of partial illumination at the edge.", etymology: "Latin paene (almost) + umbra (shadow) → penumbra. Root paen- means 'almost'. Also in: peninsula (paene + insula = 'almost an island'). Umbra also in: umbrella, adumbrate, sombrero.", example: "The eclipse cast the city into penumbra — not dark, not light, but an eerie in-between dusk." },
  { level: 5, word: "Inimical", pronunciation: "/ɪˈnɪmɪk(ə)l/", partOfSpeech: "adjective", category: "Character", definition: "Tending to obstruct or harm; hostile and unfavourable.", etymology: "Latin inimicus (enemy) from in- (not) + amicus (friend) → inimicalis → inimical. Root amic- means 'friend'. Also in: amicable, amity, amiable, enemy (via French ennemi from inimicus).", example: "The damp, cold conditions were inimical to recovery — the hospital had to move the patients." },
  { level: 5, word: "Truculent", pronunciation: "/ˈtrʌkjʊlənt/", partOfSpeech: "adjective", category: "Character", definition: "Eager or quick to argue or fight; aggressively defiant.", etymology: "Latin trux, trucis (fierce, grim) → truculentus → truculent. Root truc- means 'savage'. A rare root found mainly in this word. Related mood: atrocious (atrox from ater 'black' + trux).", example: "The truculent toddler refused every suggestion and met each new idea with a theatrical scowl." },
  { level: 5, word: "Voluble", pronunciation: "/ˈvɒljʊb(ə)l/", partOfSpeech: "adjective", category: "Social", definition: "Speaking or spoken incessantly and fluently; easy and unrestrained in speech.", etymology: "Latin volvere (to roll, turn) → volubilis → voluble. Root volv-/volu- means 'to roll'. Also in: revolve, involve, evolve, volume (a scroll that rolls), vault, waltz.", example: "Her grandmother was wonderfully voluble — you came for a cup of tea and stayed for three hours." },
  { level: 5, word: "Insouciant", pronunciation: "/ɪnˈsuːsiənt/", partOfSpeech: "adjective", category: "Emotions", definition: "Showing a casual lack of concern; carefree and nonchalant.", etymology: "French in- (not) + soucier (to worry) from Latin sollicitare (to agitate) → insouciant. Root sollicit- means 'to stir up'. Also in: solicit, solicitor, solicitude — all suggest worry or care.", example: "He shrugged with insouciant grace, as if the whole catastrophe were someone else's problem." },
  { level: 5, word: "Evanescent", pronunciation: "/ˌɛvəˈnɛs(ə)nt/", partOfSpeech: "adjective", category: "Time", definition: "Soon passing out of sight, memory, or existence; quickly fading.", etymology: "Latin evanescere (to vanish) from ex- (out) + vanescere (to become empty) from vanus (empty, vain) → evanescent. Root van- means 'empty'. Also in: vain, vanity, vanish, evanish.", example: "The morning mist was evanescent, burning off the moment the first real sun hit the valley." },
  // ── NEW LEVEL 5 ──────────────────────────────────────────────────────────
  { level: 5, word: "Immutable", pronunciation: "/ɪˈmjuːtəb(ə)l/", partOfSpeech: "adjective", category: "Time", definition: "Unchanging over time or unable to be changed; fixed and permanent.", etymology: "Latin in- (not) + mutare (to change) → immutabilis → immutable. Root mut- means 'to change'. Also in: mutate, mutation, permutation (a thorough change), commute (to change one thing for another), transmute.", example: "She treated the lunchtime seating arrangement as immutable law, and woe to anyone who tried to rearrange it." },
  { level: 5, word: "Taciturn", pronunciation: "/ˈtæsɪtɜːn/", partOfSpeech: "adjective", category: "Social", definition: "Reserved or uncommunicative in speech; saying little; habitually silent.", etymology: "Latin tacere (to be silent) → taciturnus → taciturn. Root tac- means 'to be silent'. Also in: tacit (implied without being stated), reticent (keeping silence back), taciturnity.", example: "The new partner was profoundly taciturn in meetings but always submitted the clearest written analysis by Friday." },
  { level: 5, word: "Abstruse", pronunciation: "/əbˈstruːs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Difficult to understand; obscure and hard to follow; requiring deep study.", etymology: "Latin abstrudere (to thrust away, to conceal) from abs- (away) + trudere (to push) → abstrusus → abstruse. Root trud-/trus- means 'to push'. Also in: intrude (push in), extrude (push out), protrude, obtrude.", example: "The lecture was so abstruse that only three of the forty attendees could follow it past the introduction." },
  { level: 5, word: "Inimitable", pronunciation: "/ɪˈnɪmɪtəb(ə)l/", partOfSpeech: "adjective", category: "Perception", definition: "So good or unusual as to be impossible to copy; unique and matchless.", etymology: "Latin in- (not) + imitari (to imitate, to copy) → inimitabilis → inimitable. Root imit- means 'to copy'. Also in: imitate, imitation, imitative, mime (Greek cognate: mimos = imitator).", example: "She had an inimitable way of summarising a three-hour meeting in one sentence that everyone immediately agreed was correct." },
  { level: 5, word: "Cadence", pronunciation: "/ˈkeɪd(ə)ns/", partOfSpeech: "noun", category: "Art", definition: "A modulation or inflection of the voice; the beat or measure of something rhythmic; a falling close.", etymology: "Latin cadere (to fall) → cadentia (a falling) → cadence. Root cad-/cas- means 'to fall'. Also in: case, casual, occasion, accident, decadence (a falling down), cascade.", example: "There was a cadence to her speech — a rise and fall that made even bus directions sound like poetry." },
  { level: 5, word: "Morbid", pronunciation: "/ˈmɔːbɪd/", partOfSpeech: "adjective", category: "Emotions", definition: "Having an unusual interest in disturbing or gloomy subjects; relating to disease.", etymology: "Latin morbus (disease, sickness) + -id → morbidus → morbid. Root morb- means 'disease'. Also in: morbidity, morbific (causing disease), comorbid (simultaneous conditions).", example: "She had a cheerfully morbid streak — planning her own funeral playlist and finding it a calming exercise." },
  { level: 5, word: "Surreptitious", pronunciation: "/ˌsʌrəpˈtɪʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Kept secret, especially because it would not be approved; done by stealth.", etymology: "Latin sub- (under) + rapere (to seize) → surripere (to seize secretly) → surreptitius → surreptitious. Root rap-/rept- means 'to seize'. Also in: rapacious, rapture, rapid (seizing speed), enrapture.", example: "He took a surreptitious photograph of the document and forwarded it to a journalist before anyone noticed." },
  { level: 5, word: "Hypnagogic", pronunciation: "/ˌhɪpnəˈɡɒdʒɪk/", partOfSpeech: "adjective", category: "Perception", definition: "Relating to the transitional state immediately before falling asleep; of the threshold between waking and sleep.", etymology: "Greek hypnos (sleep) + agogos (leading) from agein (to lead) → hypnagogic. Root hypn- means 'sleep'. Also in: hypnosis, hypnotic, Hypnos (Greek god of sleep). Root agog-/ag- means 'to lead'.", example: "In the hypnagogic moments before sleep, whole symphonies sometimes played themselves out in his head." },
  { level: 5, word: "Nugatory", pronunciation: "/ˈnjuːɡətəri/", partOfSpeech: "adjective", category: "Intelligence", definition: "Of no value or importance; useless and trifling; legally invalid.", etymology: "Latin nugari (to trifle, to play the fool) from nugae (trifles, jokes) → nugatorius → nugatory. Root nug- means 'trifle/nonsense'. Also in: nugacity (futility), nugacious (trivial). A vivid, rare root family.", example: "Three of the bill's seven clauses were struck down as nugatory — unenforceable and contradicting existing statutes." },

  // ── ORIGINAL LEVEL 6 ─────────────────────────────────────────────────────
  { level: 6, word: "Ossified", pronunciation: "/ˈɒsɪfaɪd/", partOfSpeech: "adjective", category: "Character", definition: "Turned into bone; or (figuratively) rigid and unable to change.", etymology: "Latin os, ossis (bone) + facere (to make) → ossificare → ossified. Root oss- means 'bone'. Also in: osseous, ossuary (a bone repository). Root fac- also in: fact, manufacture, affect.", example: "The committee's thinking had ossified over decades — new ideas bounced off it like stones off marble." },
  { level: 6, word: "Pusillanimous", pronunciation: "/ˌpjuːsɪˈlænɪməs/", partOfSpeech: "adjective", category: "Character", definition: "Showing a lack of courage or determination; timid and cowardly.", etymology: "Latin pusillus (very small, petty) + animus (mind, spirit) → pusillanimis → pusillanimous. Root pusill- means 'tiny'; anim- means 'spirit'. Also in: animosity, magnanimous (magn- = great + anim- = spirit).", example: "A pusillanimous refusal to take sides in the crisis cost the minister every ally he had." },
  { level: 6, word: "Perfidious", pronunciation: "/pəˈfɪdiəs/", partOfSpeech: "adjective", category: "Character", definition: "Deceitful and untrustworthy; guilty of betrayal.", etymology: "Latin per- (through, wrongly) + fides (faith, trust) → perfidiosus → perfidious. Root fid- means 'faith/trust'. Also in: fidelity, fiancé (betrothed in faith), confide, diffident, infidel.", example: "History remembers him as a perfidious ally — smiling at summits while supplying the enemy." },
  { level: 6, word: "Pulchritude", pronunciation: "/ˈpʌlkrɪtjuːd/", partOfSpeech: "noun", category: "Perception", definition: "Beauty, especially of a person; physical attractiveness.", etymology: "Latin pulcher (beautiful) + -tudo (state of) → pulchritudo → pulchritude. Root pulchr- means 'beautiful'. A rare root, mainly surviving in this word and the adjective pulchritudinous.", example: "The portrait celebrated not just the subject's pulchritude but the intelligence behind her eyes." },
  { level: 6, word: "Expiate", pronunciation: "/ˈɛkspiɛɪt/", partOfSpeech: "verb", category: "Character", definition: "To atone for (guilt or sin); to make amends.", etymology: "Latin ex- (out) + piare (to appease, atone) from pius (dutiful, pious) → expiare → expiate. Root pi- means 'dutiful/religious'. Also in: pious, piety, pity (via compassion), impious.", example: "He spent years volunteering in the neighbourhood he'd once robbed, quietly trying to expiate his past." },
  { level: 6, word: "Nefarious", pronunciation: "/nɪˈfɛːriəs/", partOfSpeech: "adjective", category: "Character", definition: "Wicked or criminal; flagrantly evil.", etymology: "Latin ne- (not) + fas (divine law, that which is right) → nefarius → nefarious. Root fas means 'divinely permitted'. Also in: nefas (a sin against divine law). The opposite: fas est (it is lawful/right).", example: "The scheme was nefarious in every detail — false identities, forged documents, and stolen charity funds." },
  { level: 6, word: "Torpid", pronunciation: "/ˈtɔːpɪd/", partOfSpeech: "adjective", category: "Emotions", definition: "Mentally or physically inactive; lethargic; sluggish.", etymology: "Latin torpere (to be numb, stiff) → torpidus → torpid. Root torp- means 'to be numb'. Also in: torpedo (originally a 'numbfish' or electric ray), torpor.", example: "The long winter and grey skies left him torpid — days vanished without a single completed task." },
  { level: 6, word: "Mellisonant", pronunciation: "/mɛˈlɪsənənt/", partOfSpeech: "adjective", category: "Perception", definition: "Pleasing and sweet to the ear; sweetly sounding.", etymology: "Latin mel, mellis (honey) + sonare (to sound) → mellisonant. Root mel- means 'honey'; son- means 'sound'. Also in: sonata, sonic, resonant, consonant, dissonant.", example: "The choir's mellisonant harmonies drifted through the stone corridor and into the courtyard beyond." },
  { level: 6, word: "Querulous", pronunciation: "/ˈkwɛrʊləs/", partOfSpeech: "adjective", category: "Social", definition: "Complaining in a whining or petulant manner; habitually finding fault.", etymology: "Latin queri (to complain, to lament) + -ulous (tending to) → querulosus → querulous. Root quer- means 'to complain'. Also in: quarrel, query, querulent, inquest (an inquiry into complaints).", example: "A querulous editor, he returned every draft with margins thick with grievances." },
  { level: 6, word: "Vituperate", pronunciation: "/vɪˈtjuːpəreɪt/", partOfSpeech: "verb", category: "Social", definition: "To blame or insult in strong or violent language; to berate savagely.", etymology: "Latin vituperare from vitium (fault, vice) + parare (to prepare/arrange) → to find fault → vituperate. Root viti- means 'fault/flaw'. Also in: vitiate, vice, vicious. Root par- also in: prepare, repair.", example: "The critic vituperated the production with such ferocity that the theatre company's publicist wept." },
  // ── NEW LEVEL 6 ──────────────────────────────────────────────────────────
  { level: 6, word: "Philippic", pronunciation: "/fɪˈlɪpɪk/", partOfSpeech: "noun", category: "Social", definition: "A bitter verbal attack or denunciation; an impassioned invective speech.", etymology: "Greek Philippos (Philip, father of Alexander the Great) → Philippika (Demosthenes' orations against Philip of Macedon). A proper name become a common noun. Root phil- means 'love'; hippos means 'horse'.", example: "The departing editor published a philippic against press ownership that named every proprietor by name." },
  { level: 6, word: "Obstreperous", pronunciation: "/əbˈstrɛpərəs/", partOfSpeech: "adjective", category: "Social", definition: "Noisy and difficult to control; loudly and stubbornly unruly.", etymology: "Latin ob- (against) + strepere (to make noise, to rattle) → obstreperus → obstreperous. Root strep- means 'to make a noise'. Also in: strepitous (noisy), strepitus (a clatter or din), strepitation.", example: "The obstreperous toddler refused all restraint, pulling her hand free and sprinting toward the ornamental pond." },
  { level: 6, word: "Vertiginous", pronunciation: "/vɜːˈtɪdʒɪnəs/", partOfSpeech: "adjective", category: "Perception", definition: "Causing or suffering from dizziness; extremely high or steep; whirling.", etymology: "Latin vertere (to turn) → vertigo (a spinning, dizziness) → vertiginosus → vertiginous. Root vert-/vers- means 'to turn'. Also in: verse (a turning of a line), university, convert, divert, subvert, revert.", example: "The vertiginous drop from the cliff path made even the most experienced walker hug the inner wall." },
  { level: 6, word: "Lachrymose", pronunciation: "/ˈlækrɪməʊs/", partOfSpeech: "adjective", category: "Emotions", definition: "Tearful or given to weeping; inducing tears; mournfully sentimental.", etymology: "Latin lacrima (a tear) + -ose → lacrimosus → lachrymose. Root lacrima means 'tear'. Also in: lacrimation (the production of tears), lachrymatory (a vessel for tears, found in Roman tombs).", example: "The film was lachrymose in the extreme — she used her entire travel packet of tissues before the credits." },
  { level: 6, word: "Denouement", pronunciation: "/deɪˈnuːmɒ̃/", partOfSpeech: "noun", category: "Art", definition: "The final part of a narrative in which things are resolved; the outcome of a complex sequence of events.", etymology: "French dénouer (to unknot) from dé- (un-) + nouer (to knot) from Latin nodus (knot) → dénouement. Root nod- means 'knot'. Also in: node, nodule, connect, annex (a knotting-on).", example: "The novel's denouement arrived in a single paragraph — understated and devastating in equal measure." },
  { level: 6, word: "Recidivism", pronunciation: "/rɪˈsɪdɪvɪz(ə)m/", partOfSpeech: "noun", category: "Character", definition: "The tendency of a convicted criminal to reoffend; relapse into undesirable behaviour.", etymology: "Latin recidivus (falling back) from re- (back) + cadere (to fall) → recidivist → recidivism. Root cad-/cid- means 'to fall'. Also in: accident (falling toward), incident, coincide, cascade, cadence.", example: "The charity tackled the root causes of crime rather than incarceration alone, which did little to reduce recidivism." },
  { level: 6, word: "Dilatory", pronunciation: "/ˈdɪlət(ə)ri/", partOfSpeech: "adjective", category: "Time", definition: "Slow to act; intended to cause delay; habitually behind; procrastinating.", etymology: "Latin dilatus (deferred) from dis- (apart) + latus (carried, past participle of tollere/ferre) → dilatorius → dilatory. Root lat-/latus means 'carried'. Also in: legislate (to carry laws), translate, relate, collate.", example: "His dilatory approach to replying to emails meant that several opportunities simply expired while he deliberated." },
  { level: 6, word: "Mutable", pronunciation: "/ˈmjuːtəb(ə)l/", partOfSpeech: "adjective", category: "Time", definition: "Liable to change; inconsistent and fickle; subject to alteration.", etymology: "Latin mutare (to change) → mutabilis → mutable. Root mut- means 'to change'. Also in: mutate, mutation, commute, permute, transmute, immutable (unchanging).", example: "His opinions were famously mutable — strong one Tuesday and entirely reversed by the following Monday." },
  { level: 6, word: "Execrable", pronunciation: "/ˈɛksɪkrəb(ə)l/", partOfSpeech: "adjective", category: "Perception", definition: "Extremely bad or unpleasant; deserving to be cursed; detestably poor in quality.", etymology: "Latin ex- (out) + sacrare (to curse, to make sacred) → exsecrari (to curse) → execrabilis → execrable. Root sacr- means 'sacred/holy'. Also in: sacred, consecrate, desecrate, execrate (to curse), sacrament.", example: "The wine was execrable — thin, vinegary, and served at a temperature appropriate for consommé." },

  // ── ORIGINAL LEVEL 7 ─────────────────────────────────────────────────────
  { level: 7, word: "Apocryphal", pronunciation: "/əˈpɒkrɪf(ə)l/", partOfSpeech: "adjective", category: "Intelligence", definition: "Of doubtful authenticity; fictitious but widely circulated.", etymology: "Greek apo- (away, from) + kryptein (to hide) → apokryphos (hidden) → apocryphal. Root krypt- means 'hidden'. Also in: crypt, cryptic, cryptography, encrypt. The Apocrypha were 'hidden' books excluded from the Bible.", example: "The story of Newton's apple may be apocryphal, but it captures something true about sudden insight." },
  { level: 7, word: "Enervate", pronunciation: "/ˈɛnəveɪt/", partOfSpeech: "verb", category: "Emotions", definition: "To make (someone) feel drained of energy or vitality; to weaken.", etymology: "Latin e- (out of) + nervus (sinew, nerve) → enervare → enervate. Root nerv- means 'sinew/strength'. Also in: nerve, nervous, innervate (to supply with nerves), enervation. Note: enervate means to drain energy, not to energize.", example: "The relentless heat enervated the whole team; by noon, no one could make a decision." },
  { level: 7, word: "Sycophant", pronunciation: "/ˈsɪkəfant/", partOfSpeech: "noun", category: "Social", definition: "A person who acts obsequiously to gain advantage; a flatterer or toady.", etymology: "Greek sykon (fig) + phainein (to show) → sykophantes. Origin debated: possibly 'one who shows the fig' (an obscene gesture used by informers). Root phain- means 'to show'. Also in: phenomenon, fantasy, emphasis, phase.", example: "The board room was full of sycophants — no one dared tell the CEO that the strategy was failing." },
  { level: 7, word: "Inscrutable", pronunciation: "/ɪnˈskruːtəb(ə)l/", partOfSpeech: "adjective", category: "Intelligence", definition: "Impossible to understand or interpret; impenetrably mysterious.", etymology: "Latin in- (not) + scrutari (to examine, to search through rubbish) → inscrutabilis → inscrutable. Root scrut- means 'to sort through'. Also in: scrutiny, scrutinise (to look carefully through, like sorting rags).", example: "His expression was inscrutable — you could never tell if you'd impressed him or offended him." },
  { level: 7, word: "Meretricious", pronunciation: "/ˌmɛrɪˈtrɪʃəs/", partOfSpeech: "adjective", category: "Perception", definition: "Apparently attractive but having in reality no value or integrity; showy.", etymology: "Latin meretrix, meretricis (a prostitute, literally 'one who earns') from merere (to earn) → meretricius → meretricious. Root mer- means 'to earn/deserve'. Also in: merit, mercenary, commerce.", example: "The awards ceremony was meretricious spectacle — all glitter and no substance." },
  { level: 7, word: "Opprobrium", pronunciation: "/əˈprəʊbriəm/", partOfSpeech: "noun", category: "Social", definition: "Harsh criticism or censure; public disgrace arising from shameful conduct.", etymology: "Latin ob- (against) + probrum (shameful act, reproach) → opprobrium. Root probr- means 'reproach/shame'. Also in: opprobrious (shameful). Contrast with probity (honesty), from probus (upright).", example: "The banker faced the opprobrium of an entire city after the fund collapsed and wiped out savings." },
  { level: 7, word: "Palaver", pronunciation: "/pəˈlɑːvə/", partOfSpeech: "noun/verb", category: "Social", definition: "Prolonged and idle discussion; tedious fuss; to talk excessively.", etymology: "Portuguese palavra (word, speech) from Latin parabola (comparison, parable) from Greek parabolē → palaver. Root parabol- means 'throwing alongside' (para = beside + ballein = to throw). Also in: parable, parabola, parlour.", example: "After an hour of palaver about the font choice, the designer quietly saved the file and went home." },
  { level: 7, word: "Ineluctable", pronunciation: "/ˌɪnɪˈlʌktəb(ə)l/", partOfSpeech: "adjective", category: "Time", definition: "Unable to be resisted or avoided; inescapable.", etymology: "Latin in- (not) + eluctari (to struggle free) from ex- (out) + luctari (to wrestle) → ineluctabilis → ineluctable. Root luct- means 'to wrestle/struggle'. Also in: reluctant (re- = back + luct- = to struggle against).", example: "The tide of change felt ineluctable — no policy, no protest, no nostalgia could hold it back." },
  { level: 7, word: "Weltanschauung", pronunciation: "/ˈvɛltanʃaʊʊŋ/", partOfSpeech: "noun", category: "Intelligence", definition: "A particular philosophy or view of life; a comprehensive world view.", etymology: "German Welt (world) + Anschauung (view, perception) from anschauen (to look at). German compound meaning 'world-viewing'. Entered English through 19th-century philosophy. Compare: weltschmerz (world-pain).", example: "His entire political career expressed a single Weltanschauung — the belief that freedom and order were inseparable." },
  // ── NEW LEVEL 7 ──────────────────────────────────────────────────────────
  { level: 7, word: "Atavistic", pronunciation: "/ˌætəˈvɪstɪk/", partOfSpeech: "adjective", category: "Nature", definition: "Relating to reversion to something ancient or ancestral; of primitive instincts resurfacing.", etymology: "Latin atavus (great-great-great-grandfather, ancestor) from at- (beyond) + avus (grandfather) → atavism → atavistic. Root av- means 'grandfather/ancestor'. Also in: avuncular (of an uncle — from avus).", example: "There was something atavistic in the way the crowd fell silent at the cliff edge — a very old fear." },
  { level: 7, word: "Uxorious", pronunciation: "/ʌkˈsɔːriəs/", partOfSpeech: "adjective", category: "Social", definition: "Having or showing an excessive or submissive fondness for one's wife.", etymology: "Latin uxor (wife) + -ious → uxorius → uxorious. Root uxor- means 'wife'. Also in: uxoricide (killing of a wife), uxorial (of or relating to a wife), uxoriously.", example: "His uxorious devotion was touching until it became apparent that he couldn't make any decision without her approval." },
  { level: 7, word: "Ignominious", pronunciation: "/ˌɪɡnəˈmɪniəs/", partOfSpeech: "adjective", category: "Social", definition: "Deserving or causing public disgrace or shame; deeply humiliating.", etymology: "Latin in- (not) + gnomen/nomen (name, reputation) → ignominia → ignominious. Root nomin-/gnomen- means 'name'. Also in: nominal, nominate, nomenclature, ignominy, misnomer.", example: "The team's ignominious defeat — six goals, no possession — was replayed on sports shows for weeks." },
  { level: 7, word: "Capricious", pronunciation: "/kəˈprɪʃəs/", partOfSpeech: "adjective", category: "Emotions", definition: "Given to sudden, unpredictable changes of mood or behaviour; impulsive and arbitrary.", etymology: "Italian capriccio (a sudden start, a whim) possibly from capo (head) + riccio (hedgehog) — 'hair standing on end like a hedgehog' → capricious. Root capric- suggests a startled image. Also in: caprice, capriole.", example: "The weather was capricious — sunshine, hail, and warm drizzle all within a single afternoon." },
