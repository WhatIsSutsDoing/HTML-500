<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--dark:#1A1A1A;--gold:#F7C873;--green:#7EC8A4;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
  --l1:#6B9E78;--l2:#5B8FA8;--l3:#A67C52;--l4:#7B6FA0;--l5:#C97B4B;
  --l6:#3D7A6A;--l7:#7A3D5C;--l8:#4D6FA8;--l9:#8A4D3D;--l10:#2E2E2E;
}
body{background:var(--bg);font-family:Georgia,serif;color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── UTILS ── */
.hidden{display:none!important}

/* ── HEADER ── */
.hdr{background:var(--dark);padding:18px 16px 14px;position:sticky;top:0;z-index:99}
.hdr-title{color:#F7F4EF;font-size:24px;font-weight:bold}
.hdr-sub{color:#888;font-family:sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.lhdr{background:var(--dark);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:99}
.back-btn{background:none;border:none;color:#888;cursor:pointer;font-family:sans-serif;font-size:13px;padding:4px 0;white-space:nowrap}
.back-btn:hover{color:#F7F4EF}
.lhdr-title{color:#F7F4EF;font-size:14px;font-weight:bold;text-align:center;flex:1}
.stats{display:flex;gap:14px;flex-shrink:0}
.stat{text-align:center}
.stat-n{font-family:sans-serif;font-size:16px;font-weight:bold}
.stat-l{color:#888;font-family:sans-serif;font-size:9px;text-transform:uppercase}
.s-streak{color:var(--gold)}.s-best{color:var(--green)}

/* ── CONTENT ── */
.wrap{max-width:520px;margin:0 auto;padding:20px 16px}

/* ── HOME ── */
.quick{background:var(--dark);border-radius:14px;padding:20px;margin-bottom:20px}
.q-eye{color:var(--gold);font-family:sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.q-ttl{color:#F7F4EF;font-size:18px;font-weight:bold;margin-bottom:12px}
.row{display:flex;gap:8px}
.btn-flash-dk{flex:1;padding:11px;border:2px solid #444;border-radius:9px;background:transparent;color:#F7F4EF;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:600}
.btn-flash-dk:hover{border-color:#888}
.btn-quiz-gd{flex:1;padding:11px;border:none;border-radius:9px;background:var(--gold);color:var(--dark);cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:700}
.btn-quiz-gd:hover{background:#e8b85f}
.sec-lbl{font-family:sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-bottom:12px}
.lvl-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.lvl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lvl-eye{font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.lvl-name{font-size:15px;font-weight:bold;margin-top:1px}
.lvl-cnt{font-family:sans-serif;font-size:12px;color:#AAA}
.btn-fl{flex:1;padding:8px;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:600;border:2px solid;background:transparent}
.btn-qz{flex:1;padding:8px;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:700;border:none;color:#fff}

/* ── MODE TOGGLE ── */
.mtog{display:flex;background:#E8E3DB;border-radius:8px;padding:3px;margin-bottom:14px;gap:3px}
.mbtn{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-family:sans-serif;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:#666}
.mbtn.on{background:var(--dark);color:#F7F4EF}

/* ── PROGRESS ── */
.prog{margin-bottom:14px}
.prog-meta{display:flex;justify-content:space-between;font-family:sans-serif;font-size:11px;color:#888;margin-bottom:5px}
.prog-score{font-weight:600}
.prog-track{height:3px;background:#DDD;border-radius:2px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s ease}

/* ── FLASHCARD ── */
.scene{perspective:1000px;margin-bottom:10px;cursor:pointer}
.inner{position:relative;width:100%;min-height:220px;transform-style:preserve-3d;transition:transform .45s ease;border-radius:16px}
.inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;min-height:220px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;background:#fff;box-shadow:var(--shadow);padding:24px 22px;overflow:hidden}
.face.back{transform:rotateY(180deg)}
.face-top-bar{height:5px;border-radius:16px 16px 0 0;position:absolute;top:0;left:0;right:0}
.badge{position:absolute;top:12px;right:14px;border-radius:10px;padding:2px 9px;font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px}
.front-body{text-align:center;padding-top:24px}
.card-word{font-size:36px;font-weight:bold;margin-bottom:8px;letter-spacing:-.5px}
.card-pron{color:#999;font-family:sans-serif;font-size:13px;margin-bottom:6px}
.card-pos{display:inline-block;color:#888;font-style:italic;font-family:sans-serif;font-size:11px;background:#F5F5F5;padding:3px 10px;border-radius:10px;margin-top:4px}
.tap-hint{margin-top:28px;color:#CCC;font-family:sans-serif;font-size:11px;letter-spacing:1px}
.back-word{font-size:20px;font-weight:bold;margin-bottom:10px}
.back-def{font-size:15px;line-height:1.65;color:#333;margin-bottom:16px}
.back-ex{padding-left:12px;color:#666;font-style:italic;font-size:13px;line-height:1.6;border-left:3px solid #ccc}

/* ── ETYMOLOGY ── */
.etym-btn{width:100%;margin-top:8px;padding:10px;border-radius:10px;cursor:pointer;font-family:sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:2px solid}
.etym-panel{border-radius:10px;padding:14px 16px;margin-top:4px;border:2px solid}
.etym-eye{font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.etym-txt{font-family:sans-serif;font-size:13px;line-height:1.7;color:#333}

/* ── CARD NAV ── */
.cnav{display:flex;gap:10px;margin-top:10px}
.btn-prev{flex:1;padding:12px;border:2px solid #DDD;border-radius:10px;background:transparent;font-family:sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-prev:disabled{color:#CCC;cursor:not-allowed}
.btn-prev:not(:disabled):hover{border-color:#AAA}
.btn-next{flex:2;padding:12px;border:none;border-radius:10px;background:var(--dark);color:#F7F4EF;font-family:sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-next:hover{background:#333}

/* ── QUIZ ── */
.qprompt{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:var(--shadow);margin-bottom:12px}
.qprompt-top{height:5px;border-radius:16px 16px 0 0;position:absolute;top:0;left:0;right:0}
.qprompt{position:relative;overflow:hidden}
.q-lbl{font-family:sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#999;margin-bottom:10px}
.q-def{font-size:16px;line-height:1.65;font-style:italic}
.qopts{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.qopt{padding:13px 16px;border-radius:10px;cursor:pointer;font-family:Georgia,serif;font-size:15px;font-weight:bold;text-align:left;display:flex;align-items:center;gap:10px;border:2px solid #E0DBD3;background:transparent}
.qopt:hover:not(.answered){border-color:#BBB}
.qopt.correct{background:#EAF7EE;border-color:#4A7C59;color:#2C5F38}
.qopt.wrong{background:#FBE9E7;border-color:#E07A5F;color:#8B2500}
.qopt.answered{cursor:default}
.qletter{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#F0EBE3;color:#888;font-family:sans-serif;font-size:10px;font-weight:700;flex-shrink:0}
.qfb{border-radius:10px;padding:12px 14px;margin-bottom:10px}
.qfb.correct{background:#EAF7EE;color:#2C5F38}
.qfb.wrong{background:#FBE9E7;color:#8B2500}
.qfb-lbl{font-family:sans-serif;font-size:13px;font-weight:700}
.qfb-ex{font-style:italic;color:#555;margin-top:5px;font-size:12px;line-height:1.5}
.qetym{border-radius:10px;padding:12px 14px;margin-bottom:10px;border:2px solid}
.qetym-lbl{font-family:sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.qetym-txt{font-family:sans-serif;font-size:12px;line-height:1.65;color:#444}
.btn-nw{width:100%;padding:13px;border:none;border-radius:10px;background:var(--dark);color:#F7F4EF;font-family:sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-nw:hover{background:#333}

/* ── SCORE ── */
.score-card{background:#fff;border-radius:16px;padding:40px 24px;text-align:center;box-shadow:var(--shadow)}
.sc-emoji{font-size:48px;margin-bottom:12px}
.sc-num{font-size:26px;font-weight:bold;margin-bottom:6px}
.sc-msg{color:#666;font-family:sans-serif;font-size:14px;margin-bottom:20px}
.sc-streak{font-family:sans-serif;font-size:13px;margin-bottom:16px}
.sc-btns{display:flex;gap:10px}
.btn-again{flex:1;padding:12px;background:var(--dark);color:#F7F4EF;border:none;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:14px;font-weight:600}
.btn-home{flex:1;padding:12px;background:transparent;color:#444;border:2px solid #DDD;border-radius:8px;cursor:pointer;font-family:sans-serif;font-size:14px;font-weight:600}
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div id="s-home">
  <div class="hdr">
    <div class="hdr-title">Lexicon</div>
    <div class="hdr-sub" id="hdr-count">— Words · 10 Levels · Etymology</div>
  </div>
  <div class="wrap">
    <div class="quick">
      <div class="q-eye">Quick Start</div>
      <div class="q-ttl">All Words</div>
      <div class="row">
        <button class="btn-flash-dk" onclick="start('All','browse')">📖 Flashcards</button>
        <button class="btn-quiz-gd"  onclick="start('All','quiz')">⚡ Quiz</button>
      </div>
    </div>
    <div class="sec-lbl">Choose a Level</div>
    <div id="lvl-list"></div>
  </div>
</div>

<!-- ══════════ LEARN ══════════ -->
<div id="s-learn" class="hidden">
  <div class="lhdr">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div class="lhdr-title" id="l-title"></div>
    <div class="stats">
      <div class="stat"><div class="stat-n s-streak" id="st-streak">0</div><div class="stat-l">Streak</div></div>
      <div class="stat"><div class="stat-n s-best"   id="st-best">0</div><div class="stat-l">Best</div></div>
    </div>
  </div>
  <div class="wrap">

    <!-- mode toggle -->
    <div class="mtog">
      <button class="mbtn" id="mb-browse" onclick="switchMode('browse')">📖 Flashcards</button>
      <button class="mbtn" id="mb-quiz"   onclick="switchMode('quiz')">⚡ Quiz</button>
    </div>

    <!-- progress -->
    <div class="prog" id="prog">
      <div class="prog-meta">
        <span id="prog-lbl">1 / 1</span>
        <span class="prog-score hidden" id="prog-score"></span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>

    <!-- score screen -->
    <div class="score-card hidden" id="score-screen">
      <div class="sc-emoji" id="sc-emoji"></div>
      <div class="sc-num"   id="sc-num"></div>
      <div class="sc-msg"   id="sc-msg"></div>
      <div class="sc-streak hidden" id="sc-streak"></div>
      <div class="sc-btns">
        <button class="btn-again" onclick="reset()">Go Again</button>
        <button class="btn-home"  onclick="goHome()">Home</button>
      </div>
    </div>

    <!-- flashcard area -->
    <div id="fc-area" class="hidden">
      <div class="scene" onclick="flip()">
        <div class="inner" id="card-inner">
          <!-- front -->
          <div class="face front" id="fc-front">
            <div class="face-top-bar" id="fc-front-bar"></div>
            <div class="badge" id="fc-badge"></div>
            <div class="front-body">
              <div class="card-word" id="fc-word"></div>
              <div class="card-pron" id="fc-pron"></div>
              <div class="card-pos"  id="fc-pos"></div>
              <div class="tap-hint">TAP TO REVEAL</div>
            </div>
          </div>
          <!-- back -->
          <div class="face back" id="fc-back">
            <div class="face-top-bar" id="fc-back-bar"></div>
            <div class="badge" id="fc-badge2"></div>
            <div class="back-word" id="fc-bword"></div>
            <div class="back-def"  id="fc-def"></div>
            <div class="back-ex"   id="fc-ex"></div>
          </div>
        </div>
      </div>
      <!-- etymology -->
      <div id="etym-wrap" class="hidden">
        <button class="etym-btn" id="etym-btn" onclick="toggleEtym()"></button>
        <div class="etym-panel hidden" id="etym-panel">
          <div class="etym-eye" id="etym-eye">Etymology &amp; Root Pattern</div>
          <div class="etym-txt" id="etym-txt"></div>
        </div>
      </div>
      <!-- nav -->
      <div class="cnav">
        <button class="btn-prev" id="btn-prev" onclick="prev()">← Prev</button>
        <button class="btn-next" id="btn-next" onclick="next()">Next →</button>
      </div>
    </div>

    <!-- quiz area -->
    <div id="qz-area" class="hidden">
      <div class="qprompt" id="qprompt">
        <div class="qprompt-top" id="qprompt-bar"></div>
        <div class="q-lbl">Which word matches this definition?</div>
        <div class="q-def" id="q-def"></div>
      </div>
      <div class="qopts" id="qopts"></div>
      <div id="qresult" class="hidden">
        <div class="qfb" id="qfb">
          <div class="qfb-lbl" id="qfb-lbl"></div>
          <div class="qfb-ex"  id="qfb-ex"></div>
        </div>
        <div class="qetym" id="qetym">
          <div class="qetym-lbl" id="qetym-lbl">🌱 Etymology</div>
          <div class="qetym-txt" id="qetym-txt"></div>
        </div>
        <button class="btn-nw" id="btn-nw" onclick="next()">Next Word →</button>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  WORD BANK — Vocabulary sorted by difficulty (Levels 1-10)
//  Required fields: level, word, pronunciation, partOfSpeech, 
//                   category, definition, etymology, example
// ═══════════════════════════════════════════════════════════════════════

const WORDS = [
  // ──────── LEVEL 1 ────────
  { level: 1, word: "Vivid", pronunciation: "/ˈvɪvɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Producing powerful, clear images in the mind; intensely bright.", etymology: "Latin vividus (lively).", example: "The sunset painted a vivid orange across the horizon." },
  { level: 1, word: "Benign", pronunciation: "/bɪˈnaɪn/", partOfSpeech: "adjective", category: "Character", definition: "Gentle and kindly; not harmful or threatening.", etymology: "Latin bene (well).", example: "The doctor said the tumor was benign." },
  { level: 1, word: "Lucid", pronunciation: "/ˈluːsɪd/", partOfSpeech: "adjective", category: "Intelligence", definition: "Expressed clearly; easy to understand.", etymology: "Latin lucidus (clear, bright).", example: "Her lucid explanation made the complex topic simple." },
  { level: 1, word: "Arid", pronunciation: "/ˈærɪd/", partOfSpeech: "adjective", category: "Nature", definition: "Having little or no rain; dry and dull.", etymology: "Latin aridus (dry).", example: "The arid desert stretched endlessly." },
  { level: 1, word: "Serene", pronunciation: "/səˈriːn/", partOfSpeech: "adjective", category: "Emotions", definition: "Calm, peaceful, and untroubled.", etymology: "Latin serenus (clear, calm).", example: "The serene lake reflected the mountains." },
  { level: 1, word: "Candid", pronunciation: "/ˈkændɪd/", partOfSpeech: "adjective", category: "Character", definition: "Truthful and straightforward; frank.", etymology: "Latin candidus (white, pure).", example: "She gave a candid assessment of his performance." },
  { level: 1, word: "Mundane", pronunciation: "/mʌnˈdeɪn/", partOfSpeech: "adjective", category: "Time", definition: "Lacking interest or excitement; dull.", etymology: "Latin mundanus (of this world).", example: "Doing laundry is a mundane task." },
  { level: 1, word: "Temperate", pronunciation: "/ˈtɛmpərət/", partOfSpeech: "adjective", category: "Nature", definition: "Moderate; not extreme.", etymology: "Latin temperatus (controlled).", example: "The temperate climate was ideal for farming." },
  { level: 1, word: "Astute", pronunciation: "/əˈstjuːt/", partOfSpeech: "adjective", category: "Intelligence", definition: "Able to assess situations accurately; mentally sharp.", etymology: "Latin astutus (clever).", example: "Her astute observations helped solve the mystery." },
  { level: 1, word: "Pensive", pronunciation: "/ˈpɛnsɪv/", partOfSpeech: "adjective", category: "Emotions", definition: "Engaged in deep or serious thought.", etymology: "Latin pensivus (thoughtful).", example: "She had a pensive expression while reading." },

  // ──────── LEVEL 2 ────────
  { level: 2, word: "Ebullient", pronunciation: "/ɪˈbʌliənt/", partOfSpeech: "adjective", category: "Emotions", definition: "Cheerful and full of energy; overflowing with enthusiasm.", etymology: "Latin ebullire (to boil over).", example: "Her ebullient personality lit up every room." },
  { level: 2, word: "Ephemeral", pronunciation: "/ɪˈfɛmərəl/", partOfSpeech: "adjective", category: "Time", definition: "Lasting for a very short time; fleeting.", etymology: "Greek ephemeros (lasting one day).", example: "The beauty of cherry blossoms is ephemeral." },
  { level: 2, word: "Loquacious", pronunciation: "/ləˈkweɪʃəs/", partOfSpeech: "adjective", category: "Social", definition: "Tending to talk a great deal; talkative.", etymology: "Latin loquax (talkative).", example: "The loquacious storyteller captivated the audience." },
  { level: 2, word: "Mellifluous", pronunciation: "/mɛˈlɪfluəs/", partOfSpeech: "adjective", category: "Perception", definition: "Sweet or musical; pleasant to hear.", etymology: "Latin mel (honey) + fluere (to flow).", example: "The mellifluous sound of the violin was enchanting." },
  { level: 2, word: "Equanimity", pronunciation: "/ˌɛkwəˈnɪmɪti/", partOfSpeech: "noun", category: "Emotions", definition: "Mental calmness and composure, especially in difficult situations.", etymology: "Latin aequanimus (even-tempered).", example: "She faced the crisis with remarkable equanimity." },
  { level: 2, word: "Laconic", pronunciation: "/ləˈkɒnɪk/", partOfSpeech: "adjective", category: "Social", definition: "Using very few words; brief to the point of seeming rude.", etymology: "Latin Laconicus (from Sparta).", example: "His laconic response suggested disinterest." },
  { level: 2, word: "Wistful", pronunciation: "/ˈwɪstf(ə)l/", partOfSpeech: "adjective", category: "Emotions", definition: "Having or showing a feeling of vague or regretful longing.", etymology: "From 'wist' (archaic for know/suppose).", example: "He gazed wistfully at old photographs." },
  { level: 2, word: "Tenuous", pronunciation: "/ˈtɛnjʊəs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Very weak or slight; lacking substance.", etymology: "Latin tenuis (thin).", example: "The tenuous link between the two theories was tenuous." },
  { level: 2, word: "Verdant", pronunciation: "/ˈvɜːdənt/", partOfSpeech: "adjective", category: "Nature", definition: "Green with grass or other rich vegetation; lush.", etymology: "Latin viridis (green).", example: "The verdant hillsides were beautiful in spring." },
  { level: 2, word: "Fervent", pronunciation: "/ˈfɜːvənt/", partOfSpeech: "adjective", category: "Emotions", definition: "Having or displaying passionate intensity of feeling.", etymology: "Latin fervent (glowing, burning).", example: "Her fervent belief in justice drove her work." },

  // ──────── LEVEL 3 ────────
  { level: 3, word: "Perspicacious", pronunciation: "/ˌpɜːspɪˈkeɪʃəs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Having keen insight and discernment.", etymology: "Latin perspicax (sharp-sighted).", example: "Her perspicacious analysis revealed hidden patterns." },
  { level: 3, word: "Recondite", pronunciation: "/ˈrɛkəndaɪt/", partOfSpeech: "adjective", category: "Intelligence", definition: "Not known by many people; abstruse or obscure.", etymology: "Latin reconditus (hidden away).", example: "He wrote about recondite medieval philosophy." },
  { level: 3, word: "Mendacious", pronunciation: "/mɛnˈdeɪʃəs/", partOfSpeech: "adjective", category: "Character", definition: "Not telling the truth; given to falsehood.", etymology: "Latin mendacious (lying).", example: "His mendacious claims were eventually exposed." },
  { level: 3, word: "Lurid", pronunciation: "/ˈlʊərɪd/", partOfSpeech: "adjective", category: "Perception", definition: "Unpleasantly bright or vivid; sensationally shocking.", etymology: "Latin luridus (ghastly yellow).", example: "The lurid headlines exaggerated the scandal." },

// ─────────────────────────────────────────────────────────────────────

let currentLevel = 'All';
let currentMode = 'browse';
let currentIndex = 0;
let levelWords = [];
let streak = 0;
let best = 0;
let cardFlipped = false;

function getWordsForLevel(level) {
  if (level === 'All') {
    return WORDS;
  }
  return WORDS.filter(w => w.level === parseInt(level));
}

function init() {
  updateLevelList();
}

function updateLevelList() {
  const lvlList = document.getElementById('lvl-list');
  let html = '';
  
  for (let i = 1; i <= 10; i++) {
    const words = getWordsForLevel(String(i));
    const count = words.length;
    
    html += `
      <div class="lvl-card">
        <div class="lvl-top">
          <div>
            <div class="lvl-eye">Level ${i}</div>
            <div class="lvl-name">Advanced Vocabulary</div>
          </div>
          <div class="lvl-cnt">${count} words</div>
        </div>
        <div class="row">
          <button class="btn-fl" style="border-color:var(--l${i})" onclick="start('${i}','browse')">📖 Cards</button>
          <button class="btn-qz" style="background-color:var(--l${i})" onclick="start('${i}','quiz')">⚡ Quiz</button>
        </div>
      </div>
    `;
  }
  
  lvlList.innerHTML = html;
  updateHeaderCount();
}

function updateHeaderCount() {
  document.getElementById('hdr-count').textContent = `${WORDS.length} Words · 10 Levels · Etymology`;
}

function start(level, mode) {
  currentLevel = level;
  currentMode = mode;
  currentIndex = 0;
  streak = 0;
  cardFlipped = false;
  
  levelWords = getWordsForLevel(level);
  
  if (levelWords.length === 0) {
    alert('No words available for this level.');
    return;
  }
  
  document.getElementById('s-home').classList.add('hidden');
  document.getElementById('s-learn').classList.remove('hidden');
  document.getElementById('l-title').textContent = level === 'All' ? 'All Words' : `Level ${level}`;
  
  switchMode(mode);
}

function switchMode(mode) {
  currentMode = mode;
  currentIndex = 0;
  cardFlipped = false;
  document.getElementById('mb-browse').classList.toggle('on', mode === 'browse');
  document.getElementById('mb-quiz').classList.toggle('on', mode === 'quiz');
  document.getElementById('fc-area').classList.toggle('hidden', mode !== 'browse');
  document.getElementById('qz-area').classList.toggle('hidden', mode !== 'quiz');
  document.getElementById('score-screen').classList.add('hidden');
  
  if (mode === 'browse') {
    showFlashcard();
  } else {
    showQuestion();
  }
}

function showFlashcard() {
  if (currentIndex >= levelWords.length) {
    showScore(streak);
    return;
  }
  
  const word = levelWords[currentIndex];
  cardFlipped = false;
  
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('fc-word').textContent = word.word;
  document.getElementById('fc-pron').textContent = word.pronunciation;
  document.getElementById('fc-pos').textContent = word.partOfSpeech;
  document.getElementById('fc-badge').textContent = `L${word.level}`;
  
  document.getElementById('fc-front-bar').style.backgroundColor = `var(--l${word.level})`;
  document.getElementById('fc-back-bar').style.backgroundColor = `var(--l${word.level})`;
  
  document.getElementById('fc-bword').textContent = word.word;
  document.getElementById('fc-def').textContent = word.definition;
  document.getElementById('fc-ex').textContent = `"${word.example}"`;
  
  document.getElementById('etym-txt').textContent = word.etymology;
  document.getElementById('etym-btn').textContent = '📖 Show Etymology';
  document.getElementById('etym-panel').classList.add('hidden');
  
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('prog-lbl').textContent = `${currentIndex + 1} / ${levelWords.length}`;
  document.getElementById('prog-fill').style.width = ((currentIndex + 1) / levelWords.length * 100) + '%';
}

function flip() {
  cardFlipped = !cardFlipped;
  document.getElementById('card-inner').classList.toggle('flipped');
}

function toggleEtym() {
  document.getElementById('etym-panel').classList.toggle('hidden');
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    showFlashcard();
  }
}

function next() {
  if (currentMode === 'browse') {
    if (currentIndex < levelWords.length - 1) {
      currentIndex++;
      streak++;
      showFlashcard();
    } else {
      showScore(streak);
    }
  } else {
    if (currentIndex < levelWords.length - 1) {
      currentIndex++;
      streak++;
      showQuestion();
    } else {
      showScore(streak);
    }
  }
}

function showQuestion() {
  if (currentIndex >= levelWords.length) {
    showScore(streak);
    return;
  }
  
  const word = levelWords[currentIndex];
  
  document.getElementById('q-def').textContent = word.definition;
  document.getElementById('qprompt-bar').style.backgroundColor = `var(--l${word.level})`;
  
  // Generate options
  const correctAnswer = word.word;
  const wrongAnswers = levelWords
    .filter(w => w.word !== correctAnswer)
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(w => w.word);
  
  const options = [correctAnswer, ...wrongAnswers].sort(() => Math.random() - 0.5);
  
  let optionsHTML = '';
  options.forEach((opt, idx) => {
    optionsHTML += `
      <div class="qopt" onclick="answerQuestion(this, '${opt}', '${correctAnswer}')">
        <div class="qletter">${String.fromCharCode(65 + idx)}</div>
        <div>${opt}</div>
      </div>
    `;
  });
  
  document.getElementById('qopts').innerHTML = optionsHTML;
  document.getElementById('qresult').classList.add('hidden');
  
  document.getElementById('prog-lbl').textContent = `${currentIndex + 1} / ${levelWords.length}`;
  document.getElementById('prog-fill').style.width = ((currentIndex + 1) / levelWords.length * 100) + '%';
}

function answerQuestion(el, selected, correct) {
  const word = levelWords[currentIndex];
  const isCorrect = selected === correct;
  
  document.querySelectorAll('.qopt').forEach(opt => opt.classList.add('answered'));
  
  if (isCorrect) {
    el.classList.add('correct');
    streak++;
    document.getElementById('qfb-lbl').textContent = '✓ Correct!';
    document.getElementById('qfb').classList.remove('wrong');
    document.getElementById('qfb').classList.add('correct');
  } else {
    el.classList.add('wrong');
    document.querySelector(`[onclick*="${correct}"]`)?.classList.add('correct');
    streak = 0;
    document.getElementById('qfb-lbl').textContent = '✗ Incorrect';
    document.getElementById('qfb').classList.remove('correct');
    document.getElementById('qfb').classList.add('wrong');
  }
  
  document.getElementById('qfb-ex').textContent = `"${word.example}"`;
  document.getElementById('qetym-txt').textContent = word.etymology;
  document.getElementById('qetym').style.borderColor = `var(--l${word.level})`;
  document.getElementById('qresult').classList.remove('hidden');
}

function showScore(finalStreak) {
  if (finalStreak > best) best = finalStreak;
  
  document.getElementById('st-streak').textContent = streak;
  document.getElementById('st-best').textContent = best;
  
  document.getElementById('sc-emoji').textContent = streak >= 8 ? '🎉' : streak >= 5 ? '👏' : '✨';
  document.getElementById('sc-num').textContent = streak;
  document.getElementById('sc-msg').textContent = streak === levelWords.length ? 'Perfect!' : `${streak} / ${levelWords.length} correct`;
  
  document.getElementById('fc-area').classList.add('hidden');
  document.getElementById('qz-area').classList.add('hidden');
  document.getElementById('score-screen').classList.remove('hidden');
}

function reset() {
  currentIndex = 0;
  cardFlipped = false;
  
  if (currentMode === 'browse') {
    showFlashcard();
  } else {
    showQuestion();
  }
  
  document.getElementById('score-screen').classList.add('hidden');
  document.getElementById('fc-area').classList.toggle('hidden', currentMode !== 'browse');
  document.getElementById('qz-area').classList.toggle('hidden', currentMode !== 'quiz');
}

function goHome() {
  document.getElementById('s-learn').classList.add('hidden');
  document.getElementById('s-home').classList.remove('hidden');
}

init();
</script>
</body>
</html>
