{ level: 7, word: "Disseminate", pronunciation: "/dɪˈsɛmɪneɪt/", partOfSpeech: "verb", category: "Literary & Cultural Theory", definition: "To spread or distribute widely, especially information or ideas.", etymology: "Latin dis- (apart) + seminare (to sow), from semen (seed) → disseminare, 'to scatter seed'. Root sem- means 'seed'. Also in: seed, semen, seminar.", example: "The findings were quickly disseminated across academic journals and popular media alike." },
{ level: 7, word: "Extrapolate", pronunciation: "/ɪkˈstræpəleɪt/", partOfSpeech: "verb", category: "Literary & Cultural Theory", definition: "To estimate or infer unknown information by extending known data or trends beyond their observed range.", etymology: "Latin extra- (outside) + polare (to polish, refine, from polus, pole) → extrapolate, coined in the 19th century by analogy with interpolate. Root pol- relates to 'pole/axis'.", example: "From three data points, the analyst tried to extrapolate a trend that may not actually hold." },
{ level: 7, word: "Interpolate", pronunciation: "/ɪnˈtɜːrpəleɪt/", partOfSpeech: "verb", category: "Literary & Cultural Theory", definition: "To insert something, especially additional words or values, between existing elements; in mathematics, to estimate a value within a known range.", etymology: "Latin inter- (between) + polare (to polish, alter), from polire (to polish) → interpolare, 'to furbish up, alter'. Root pol- means 'to polish'. Also in: extrapolate, polish.", example: "Later scribes appear to have interpolate additional verses into the original manuscript." },
{ level: 8, word: "Instantiate", pronunciation: "/ɪnˈstænʃieɪt/", partOfSpeech: "verb", category: "Literary & Cultural Theory", definition: "To represent an abstract concept by a concrete example or instance.", etymology: "Latin instantia (presence, urgency), from instare (to stand near) → instantiate. Root sta- means 'to stand'. Also in: instant, instance, distance.", example: "This particular sculpture seems to instantiate everything the movement's manifesto only described in the abstract." },
{ level: 8, word: "Bifurcation", pronunciation: "/ˌbaɪfərˈkeɪʃən/", partOfSpeech: "noun", category: "Literary & Cultural Theory", definition: "A division into two distinct branches, parts, or paths.", etymology: "Latin bi- (two) + furca (fork) → bifurcare, 'to fork into two' → bifurcation. Root furc- means 'fork'. Also in: furcate, trifurcate.", example: "The plot reaches a bifurcation where the two protagonists' paths diverge for the rest of the novel." },
{ level: 8, word: "Conflation", pronunciation: "/kənˈfleɪʃən/", partOfSpeech: "noun", category: "Literary & Cultural Theory", definition: "The merging of two or more distinct ideas, texts, or things into one, often mistakenly.", etymology: "Latin con- (together) + flare (to blow) → conflare, 'to blow together, fuse' → conflation. Root fla- means 'to blow'. Also in: inflate, deflate, flatulent.", example: "The article suffers from a conflation of correlation with causation throughout its central argument." },
{ level: 8, word: "Disambiguation", pronunciation: "/dɪsæmˌbɪɡjuˈeɪʃən/", partOfSpeech: "noun", category: "Literary & Cultural Theory", definition: "The process of removing ambiguity by clarifying which of several possible meanings is intended.", etymology: "Latin dis- (removal) + ambiguus (doubtful, ambiguous), from ambi- (both ways) + agere (to drive) → disambiguation. Root ag- means 'to drive/do'. Also in: ambiguous, agent, agile.", example: "The encyclopedia includes a disambiguation page listing every notable person who shares that surname." },
{ level: 8, word: "Equivocation", pronunciation: "/ɪˌkwɪvəˈkeɪʃən/", partOfSpeech: "noun", category: "Literary & Cultural Theory", definition: "The use of ambiguous or unclear language, intentionally or not, to mislead or avoid commitment to a clear position.", etymology: "Latin aequus (equal) + vox/vocare (voice, to call) → aequivocus (of equal voice, ambiguous) → equivocation. Root voc- means 'voice'. Also in: vocal, vocation, advocate.", example: "Pressed for a direct answer, the spokesperson resorted to equivocation rather than confirming or denying the report." },
{ level: 8, word: "Prevarication", pronunciation: "/prɪˌværɪˈkeɪʃən/", partOfSpeech: "noun", category: "Literary & Cultural Theory", definition: "The act of speaking evasively or misleadingly in order to avoid telling the direct truth.", etymology: "Latin prae- (before) + varicare (to straddle), from varus (bent, knock-kneed) → praevaricari, 'to walk crookedly' → prevarication. Root var- means 'bent/crooked'. Also in: variation, varicose.", example: "The committee grew impatient with the witness's evident prevarication, demanding a straight answer at last." },
{ level: 8, word: "Obfuscation", pronunciation: "/ˌɒbfʌˈskeɪʃən/", partOfSpeech: "noun", category: "Literary & Cultural Theory", definition: "The deliberate act of making something unclear, confusing, or difficult to understand.", etymology: "Latin ob- (over) + fuscare (to darken), from fuscus (dark) → obfuscare, 'to darken over' → obfuscation. Root fusc- means 'dark'. Also in: fuscous (rare).", example: "Critics accused the contract's dense legal jargon of being deliberate obfuscation rather than necessary precision." },

{ level: 9, word: "Scholasticism", pronunciation: "/skəˈlæstɪsɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A medieval method of philosophical and theological inquiry combining logical analysis with traditional Christian doctrine, taught in schools.", etymology: "Latin schola (school), from Greek skhole (leisure, school) → scholasticus → scholasticism. Root skhol- means 'leisure/school'. Also in: scholar, school, scholarly.", example: "Thomas Aquinas's Summa Theologica is the towering achievement of medieval scholasticism." },
{ level: 9, word: "Casuistry", pronunciation: "/ˈkæʒuɪstri/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The application of general ethical principles to resolve specific moral cases, sometimes used pejoratively to mean overly subtle or specious reasoning.", etymology: "Latin casus (case, fall), from cadere (to fall) → casuistry. Root cad-/cas- means 'to fall'. Also in: case, cadence, accident.", example: "Jesuit casuistry sought to weigh competing moral obligations carefully, though critics dismissed it as a tool for excusing wrongdoing." },
{ level: 9, word: "Soteriology", pronunciation: "/soʊˌtɪəriˈɒlədʒi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The branch of theology concerned with the doctrine of salvation.", etymology: "Greek soter (savior) + logos (study) → soteriologia. Root so- means 'to save'. Also in: savior (different root, Latin salvare), soteriological.", example: "Soteriology in Reformed theology emphasizes salvation by grace alone, apart from human merit." },
{ level: 9, word: "Eschatology", pronunciation: "/ˌɛskəˈtɒlədʒi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The branch of theology concerned with final events, such as death, judgment, and the ultimate destiny of humanity.", etymology: "Greek eskhatos (last, furthest) + logos (study) → eschatologia. Root eskha- means 'last/furthest'. Rare root largely confined to this term.", example: "Christian eschatology centers on the Second Coming, the resurrection of the dead, and the final judgment." },
{ level: 9, word: "Pneumatology", pronunciation: "/ˌnjuːməˈtɒlədʒi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The branch of theology concerned with the nature and work of the Holy Spirit, or more broadly with spiritual beings.", etymology: "Greek pneuma (breath, spirit) + logos (study) → pneumatologia. Root pneu- means 'breath/spirit'. Also in: pneumonia, pneumatic.", example: "Pentecostal theology places special emphasis on pneumatology, exploring the gifts and active presence of the Holy Spirit." },
{ level: 9, word: "Theodicy", pronunciation: "/θiˈɒdɪsi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "An attempt to defend God's goodness and omnipotence in the face of the existence of evil and suffering.", etymology: "Greek theos (god) + dike (justice) → theodicy, coined by Leibniz as théodicée, 'justice of God'. Root the- means 'god'; dik- means 'justice'. Also in: theology, jurisdiction.", example: "Leibniz's theodicy argued that this is the best of all possible worlds, despite the suffering it contains." },
{ level: 9, word: "Perichoresis", pronunciation: "/ˌpɛrɪkɔːˈriːsɪs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "In Trinitarian theology, the mutual indwelling and interpenetration of the three persons of the Trinity without loss of distinct identity.", etymology: "Greek peri- (around) + khoresis (a making room, dance), from khora (space) → perichoresis. Root chor- means 'space/dance'. Also in: choreography.", example: "Perichoresis describes how Father, Son, and Spirit fully indwell one another while each remains a distinct person." },
{ level: 9, word: "Consubstantial", pronunciation: "/ˌkɒnsəbˈstænʃəl/", partOfSpeech: "adjective", category: "Religion, Theology & Ethics", definition: "Sharing the same substance or essential nature, especially as used of the Son and Father in Trinitarian doctrine.", etymology: "Latin con- (with) + substantia (substance) → consubstantialis, translation of Greek homoousios. Root sta- means 'to stand'. Also in: substance, substantial, homoousios.", example: "The Nicene Creed declares the Son consubstantial with the Father, sharing one identical divine essence." },
{ level: 9, word: "Homoousios", pronunciation: "/ˌhoʊmoʊˈuːsiɒs/", partOfSpeech: "adjective", category: "Religion, Theology & Ethics", definition: "Of the same essence or substance, a term central to the Nicene Creed describing the relationship between the Father and the Son.", etymology: "Greek homos (same) + ousia (being, essence) → homoousios, 'same essence'. Root es-/ous- means 'to be'. Also in: ousia, essence, parousia.", example: "The Council of Nicaea declared the Son homoousios with the Father, rejecting the view that the Son was merely similar in substance." },
{ level: 8, word: "Heterodoxy", pronunciation: "/ˈhɛtərədɒksi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "Beliefs or opinions that depart from accepted or official doctrine.", etymology: "Greek heteros (other) + doxa (opinion, belief) → heterodoxia, 'other opinion'. Root dok-/dox- means 'opinion/belief'. Also in: orthodoxy, paradox, doctrine.", example: "The bishop condemned the new teaching as dangerous heterodoxy, a deviation from established church doctrine." },
{ level: 8, word: "Orthodoxy", pronunciation: "/ˈɔːrθədɒksi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "Adherence to accepted, traditional, or officially sanctioned beliefs, especially in religion.", etymology: "Greek orthos (correct, straight) + doxa (opinion) → orthodoxia, 'correct opinion'. Root orth- means 'straight/correct'. Also in: orthopedic, orthography, heterodoxy.", example: "Maintaining orthodoxy across centuries required careful councils to define precisely which beliefs counted as acceptable." },
{ level: 9, word: "Orthopraxy", pronunciation: "/ˈɔːrθoʊpræksi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "Correctness of practice and action, as distinguished from correctness of belief or doctrine.", etymology: "Greek orthos (correct) + praxis (action, practice) → orthopraxy, 'correct practice'. Root prag-/prax- means 'to do/act'. Also in: practice, pragmatic, praxis.", example: "Many traditions place orthopraxy above orthodoxy, judging faithfulness more by ritual observance than by doctrinal precision." },
{ level: 9, word: "Antinatalism", pronunciation: "/ˌæntiˈneɪtəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The philosophical position that procreation is morally wrong and that bringing new sentient beings into existence should be avoided.", etymology: "Greek anti- (against) + Latin natalis (relating to birth, from nasci, to be born) → antinatalism. Root nat- means 'to be born'. Also in: natal, native, nature.", example: "Philosopher David Benatar's antinatalism argues that coming into existence always entails a net harm to the person who is born." },
{ level: 9, word: "Compatibilism", pronunciation: "/kəmˈpætəbɪlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that free will and determinism are not mutually exclusive, and that meaningful freedom can exist even in a determined universe.", etymology: "Latin com- (together) + pati (to suffer, allow) → compatibilis (capable of coexisting) → compatibilism. Root pat- means 'to suffer/endure'. Also in: compatible, patient, passion.", example: "Compatibilism holds that acting freely simply means acting according to one's own desires, even if those desires were themselves determined." },
{ level: 9, word: "Incompatibilism", pronunciation: "/ˌɪnkəmˈpætəbɪlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that free will and determinism cannot both be true, requiring a choice between them.", etymology: "Latin in- (not) + compatibilis (compatible) → incompatibilism. Root pat- means 'to suffer/endure'. Also in: compatibilism, libertarianism, patient.", example: "Incompatibilism forces a choice: either the universe is determined and free will is an illusion, or genuine indeterminacy must exist somewhere." },
{ level: 8, word: "Libertarianism", pronunciation: "/ˌlɪbərˈtɛəriənɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "In metaphysics, the view that humans possess genuine, undetermined free will; in politics, a philosophy emphasizing minimal state interference with individual liberty.", etymology: "Latin liber (free) → libertas (liberty) → libertarian + -ism. Root liber- means 'free'. Also in: liberty, liberal, deliver.", example: "Metaphysical libertarianism insists that some human choices are not fully caused by prior states of the universe." },
{ level: 7, word: "Consequentialism", pronunciation: "/ˌkɒnsɪˈkwɛnʃəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "An ethical theory holding that the morality of an action is determined solely by its outcomes or consequences.", etymology: "Latin con- (together) + sequi (to follow) → consequi (to follow logically) → consequence + -ism. Root sequ- means 'to follow'. Also in: sequence, sequel, subsequent.", example: "Under consequentialism, a lie told to prevent a greater harm could be morally justified by its beneficial outcome." },
{ level: 7, word: "Utilitarianism", pronunciation: "/juːˌtɪlɪˈtɛəriənɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A consequentialist ethical theory holding that the best action is the one that maximizes overall happiness or well-being.", etymology: "Latin utilis (useful), from uti (to use) → utility + -arian + -ism → utilitarianism. Root ut- means 'to use'. Also in: utilize, utensil, abuse.", example: "Bentham's utilitarianism judged laws and actions by a single standard: do they increase the greatest happiness for the greatest number?" },
{ level: 9, word: "Contractualism", pronunciation: "/kənˈtræktʃuəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "An ethical theory holding that moral principles are those that could be justified to all affected parties under fair conditions of agreement.", etymology: "Latin con- (together) + trahere (to draw) → contractus (a drawing together, agreement) → contractualism. Root trah-/tract- means 'to draw/pull'. Also in: contract, attract, extract.", example: "Contractualism asks whether a moral principle is one that no one could reasonably reject under fair terms of agreement." },
{ level: 9, word: "Particularism", pronunciation: "/pərˈtɪkjʊlərɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "In ethics, the view that moral judgments depend on the specific features of individual situations rather than universal general principles.", etymology: "Latin particula (small part) → particularis → particularism. Root part- means 'part'. Also in: particle, partial, universal.", example: "Moral particularism denies that any fixed rule can substitute for sensitive judgment of each situation's unique details." },
{ level: 9, word: "Foundationalism", pronunciation: "/faʊnˈdeɪʃənəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The epistemological view that justified beliefs rest ultimately on a foundation of basic beliefs that require no further justification.", etymology: "Latin fundus (bottom) → fundare (to found) → foundation + -alism. Root fund- means 'bottom/base'. Also in: found, fundamental, profound.", example: "Classical foundationalism treats sense-perception as a basic source of belief, needing no further justification of its own." },
{ level: 9, word: "Coherentism", pronunciation: "/koʊˈhɪərəntɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The epistemological view that beliefs are justified by their mutual coherence within a broader web of belief, rather than by a foundational starting point.", etymology: "Latin co- (together) + haerere (to stick) → cohaerere (to stick together) → coherent + -ism. Root haer- means 'to stick/cling'. Also in: cohere, adhere, inherent.", example: "Coherentism rejects the need for foundational beliefs, holding that justification comes from how well beliefs fit together as a system." },
{ level: 9, word: "Reliabilism", pronunciation: "/rɪˈlaɪəbɪlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The epistemological view that a belief is justified if it is produced by a cognitive process that reliably yields true beliefs.", etymology: "Old French relier (to bind again), from Latin re- + ligare (to bind) → rely + -able + -ism. Root lig- means 'to bind'. Also in: rely, ligament, religion.", example: "Reliabilism holds that perception counts as a justified source of belief simply because it reliably tracks the truth, regardless of conscious reasoning." },
{ level: 9, word: "Infinitism", pronunciation: "/ɪnˈfɪnɪtɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The epistemological view that justification for a belief requires an endless, non-repeating chain of further justifying reasons.", etymology: "Latin in- (not) + finitus (finished, bounded) → infinitus (unbounded) → infinitism. Root fin- means 'end/boundary'. Also in: finite, infinite, finish.", example: "Infinitism accepts the unsettling consequence that fully justifying any belief requires an infinite regress of further reasons." },
{ level: 9, word: "Contextualism", pronunciation: "/kənˈtɛkstʃuəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The epistemological view that the standards for knowledge or justified belief shift depending on the context in which a claim is made.", etymology: "Latin con- (together) + texere (to weave) → contextus (a weaving together) → context + -ualism. Root tex- means 'to weave'. Also in: text, textile, pretext.", example: "Epistemic contextualism explains why 'I know it's a zebra' seems true in casual conversation but false when skeptical scenarios are raised." },
{ level: 9, word: "Externalism", pronunciation: "/ɪkˈstɜːrnəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that factors external to the mind, such as the environment or causal history, partly determine the content or justification of mental states.", etymology: "Latin externus (outward), from exter (outside) → external + -ism. Root ex- means 'out'. Also in: exterior, extraneous, internalism.", example: "Semantic externalism holds that the meaning of 'water' depends on the actual chemical substance in one's environment, not just on what's in one's head." },
{ level: 9, word: "Internalism", pronunciation: "/ɪnˈtɜːrnəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that the justification or content of mental states depends entirely on factors internal to the mind, accessible through introspection.", etymology: "Latin internus (inward), from inter (within) → internal + -ism. Root inter- means 'within/between'. Also in: interior, internalize, externalism.", example: "Internalism insists that two people in identical mental states must be equally justified, regardless of differences in their external environment." },
{ level: 9, word: "Dispositionalism", pronunciation: "/dɪˌspəʊzɪʃəˈnəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that properties, such as fragility or solubility, are best understood as dispositions to behave in certain ways under certain conditions.", etymology: "Latin dis- (apart) + ponere (to place) → disponere (to arrange) → disposition + -alism. Root pon-/posit- means 'to place'. Also in: dispose, position, compose.", example: "Dispositionalism explains 'fragile' not as a hidden inner essence but as the tendency to break easily when struck." },
{ level: 9, word: "Emergentism", pronunciation: "/ɪˈmɜːrdʒəntɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that complex systems give rise to genuinely new properties that cannot be fully explained by or reduced to their individual parts.", etymology: "Latin e- (out) + mergere (to dip, plunge) → emergere (to rise up, emerge) → emergentism. Root merg- means 'to dip/plunge'. Also in: emerge, submerge, merge.", example: "Emergentism suggests that consciousness arises from neural activity yet possesses properties no single neuron could account for alone." },
{ level: 8, word: "Reductionism", pronunciation: "/rɪˈdʌkʃənɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that complex systems or phenomena can be fully explained in terms of their simpler, more fundamental constituent parts.", etymology: "Latin re- (back) + ducere (to lead) → reducere (to lead back) → reduction + -ism. Root duc- means 'to lead'. Also in: reduce, induce, deduce.", example: "Strict reductionism claims that psychology will eventually be fully explained by, and reduced to, the laws of neuroscience and physics." },
{ level: 9, word: "Expressivism", pronunciation: "/ɪkˈsprɛsɪvɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A metaethical view holding that moral statements express attitudes or emotions rather than describing objective facts.", etymology: "Latin ex- (out) + premere (to press) → exprimere (to press out, express) → expressivism. Root prem-/press- means 'to press'. Also in: express, impress, depress.", example: "Expressivism holds that saying 'lying is wrong' expresses disapproval of lying rather than stating a fact about the world." },
{ level: 9, word: "Representationalism", pronunciation: "/ˌrɛprɪzɛnˈteɪʃənəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that mental states represent the world, and that their content can be explained in terms of what they represent.", etymology: "Latin re- (again) + praesentare (to present) → representation + -alism. Root sent- means 'to be present'. Also in: present, represent, absent.", example: "Representationalism explains the felt quality of seeing red in terms of the mental state's representing a particular property of the object." },
{ level: 9, word: "Inferentialism", pronunciation: "/ˌɪnfəˈrɛnʃəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A philosophical view holding that the meaning and content of concepts are determined by their role in inference rather than by reference to objects.", etymology: "Latin in- (into) + ferre (to carry) → inferre (to bring in) → inferential + -ism. Root fer- means 'to carry'. Also in: infer, transfer, prefer.", example: "Inferentialism, associated with philosopher Robert Brandom, explains a concept's meaning through the web of inferences it licenses." },
{ level: 8, word: "Nominalism", pronunciation: "/ˈnɒmɪnəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The metaphysical view that abstract universal properties do not really exist, and that only individual, particular things are real.", etymology: "Latin nomen (name) → nominalis (of names) → nominalism. Root nom- means 'name'. Also in: nominate, noun, denomination.", example: "Nominalism holds that 'redness' is just a name we apply to many particular red things, not a real, separately existing entity." },
{ level: 7, word: "Realism", pronunciation: "/ˈriːəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The philosophical view that universals, abstract entities, or the external world exist independently of human thought or perception.", etymology: "Latin realis (actual), from res (thing) → realism. Root res- means 'thing'. Also in: real, reify, reality.", example: "Medieval realism, opposed to nominalism, held that universals like 'humanity' genuinely exist apart from particular humans." },
{ level: 8, word: "Conceptualism", pronunciation: "/kənˈsɛptʃuəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that universals exist only as concepts within the mind, occupying a middle ground between realism and nominalism.", etymology: "Latin con- (together) + capere (to take, seize) → conceptus (a conceiving) → concept + -ualism. Root cap-/cep- means 'to take/seize'. Also in: concept, capture, accept.", example: "Conceptualism agrees with nominalists that universals aren't independent things, but insists they are genuine mental concepts, not mere names." },
{ level: 7, word: "Pluralism", pronunciation: "/ˈplʊərəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that reality, truth, or value consists of multiple independent kinds or sources, rather than being reducible to a single fundamental principle.", etymology: "Latin plus/pluris (more) → pluralis (plural) → pluralism. Root plu- means 'more/many'. Also in: plural, plus, plurality.", example: "Value pluralism denies that all good things, like liberty and equality, can always be ranked on a single common scale." },
{ level: 8, word: "Monism", pronunciation: "/ˈmoʊnɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The metaphysical view that reality consists ultimately of a single kind of substance or principle.", etymology: "Greek monos (alone, single) + -ism → monism. Root mon- means 'one/alone'. Also in: monarch, monastery, monotone.", example: "Spinoza's monism holds that mind and matter are merely two aspects of a single underlying substance, which he called God or Nature." },
{ level: 8, word: "Dualism", pronunciation: "/ˈdjuːəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The metaphysical view that reality consists of two fundamentally distinct kinds of substance, typically mind and matter.", etymology: "Latin duo (two) → dualis (containing two) → dualism. Root du- means 'two'. Also in: duo, dual, duet.", example: "Descartes's dualism treats mind and body as two entirely distinct substances, raising the puzzle of how they interact." },
{ level: 9, word: "Trialism", pronunciation: "/ˈtraɪəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The metaphysical or political view that reality, or a system, is composed of three fundamentally distinct elements or parts.", etymology: "Latin tres/tri- (three) → trialism, by analogy with dualism. Root tri- means 'three'. Also in: triangle, trinity, triad.", example: "Some philosophers have proposed a trialism of mind, body, and a distinct soul, rejecting both monism and simple dualism." },
{ level: 9, word: "Panentheism", pronunciation: "/pænˈɛnθiɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The theological view that the divine permeates and includes the universe but also extends beyond it.", etymology: "Greek pan- (all) + en (in) + theos (god) → panentheism, 'all in god'. Root the- means 'god'. Also in: pantheism, theology, atheism.", example: "Panentheism differs from pantheism by holding that God is present within the universe yet also transcends it." },
{ level: 8, word: "Transcendentalism", pronunciation: "/ˌtrænsɛnˈdɛntəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A philosophical and literary movement emphasizing the inherent goodness of nature and individuals, and the limits of empirical reason in grasping ultimate truth.", etymology: "Latin trans- (beyond) + scandere (to climb) → transcendere → transcendental + -ism. Root scand- means 'to climb'. Also in: transcend, ascend, descend.", example: "Emerson and Thoreau's transcendentalism championed intuition and a spiritual connection with nature over rigid institutional doctrine." },
{ level: 8, word: "Historicism", pronunciation: "/hɪˈstɒrɪsɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that social and cultural phenomena are determined by, and can only be understood through, their specific historical context.", etymology: "Greek historia (inquiry, narrative) → historikos (historical) → historicism. Root id-/hist- means 'to know/see'. Also in: history, historicity, narrator.", example: "Historicism cautions against judging past societies by today's moral standards, insisting they be understood on their own historical terms." },
{ level: 8, word: "Positivism", pronunciation: "/ˈpɒzɪtɪvɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The philosophical position that genuine knowledge is based only on observable, empirical fact verified through scientific method.", etymology: "Latin ponere (to place) → positus (placed, established) → positive (certain, given) + -ism. Root pon-/posit- means 'to place'. Also in: position, deposit, compose.", example: "Logical positivism held that any statement unverifiable by observation or logic, including most of traditional metaphysics, was literally meaningless." },
{ level: 7, word: "Pragmatism", pronunciation: "/ˈpræɡmətɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A philosophical tradition holding that the truth or meaning of an idea is determined by its practical consequences and usefulness.", etymology: "Greek pragma (deed, action), from prassein (to do) → pragmatikos (skilled in business) → pragmatism. Root prag- means 'to do/act'. Also in: practice, praxis, practical.", example: "William James's pragmatism judged the truth of an idea partly by whether believing it made a meaningful difference in practice." },
{ level: 8, word: "Existentialism", pronunciation: "/ˌɛɡzɪˈstɛnʃəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A philosophical movement emphasizing individual existence, freedom, and the responsibility of self-determination in a universe without inherent meaning.", etymology: "Latin existere (to come into being), from ex- (out) + sistere (to stand) → existentia → existentialism. Root sta-/sist- means 'to stand'. Also in: exist, existence, persist.", example: "Sartre's existentialism insists that humans are condemned to be free, forced to create meaning in a universe that offers none ready-made." },
{ level: 8, word: "Absurdism", pronunciation: "/əbˈsɜːrdɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The philosophical position that human beings exist in a fundamentally meaningless, irrational universe and must confront that absurdity directly.", etymology: "Latin absurdus (out of tune, irrational), from ab- (away) + surdus (deaf, dull) → absurd + -ism. Root surd- means 'deaf/dull'. Also in: absurd, surd (a mathematical term for irrational number).", example: "Camus's absurdism urges us to imagine Sisyphus happy, embracing the meaningless repetition of his task rather than despairing over it." },
{ level: 9, word: "Perennialism", pronunciation: "/pəˈrɛniəlɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The view that certain truths, especially mystical or religious insights, recur universally across all cultures and historical periods.", etymology: "Latin per- (through) + annus (year) → perennis (lasting through the years) → perennial + -ism. Root ann- means 'year'. Also in: annual, anniversary, biennial.", example: "Religious perennialism holds that the mystical core of Buddhism, Christianity, and Sufism all point toward the same underlying truth." },
{ level: 9, word: "Kenosis", pronunciation: "/kɪˈnoʊsɪs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The theological concept of Christ's self-emptying of divine attributes in becoming human.", etymology: "Greek kenoun (to empty), from kenos (empty) → kenosis, 'an emptying'. Root ken- means 'empty'. Rare root largely confined to this theological term.", example: "Philippians 2 describes the kenosis of Christ, who emptied himself of divine glory to take on human form." },
{ level: 8, word: "Kairos", pronunciation: "/ˈkaɪrɒs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A decisive, opportune, or qualitatively significant moment in time, as opposed to mere sequential, measurable time.", etymology: "Greek kairos (the right time, due measure). Root kair- means 'fitting/opportune time'. Contrast with chronos (sequential time).", example: "The preacher distinguished mere chronological time from kairos, the singular moment ripe with decisive meaning." },
{ level: 9, word: "Kerygma", pronunciation: "/kəˈrɪɡmə/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The core proclamation of the Christian gospel message, especially as preached by the apostles.", etymology: "Greek kerygma (proclamation, that which is proclaimed), from kerysein (to proclaim, herald) → kerygma. Root keryx- means 'herald'. Rare root confined to this theological term.", example: "Scholars distinguish the simple early kerygma, the announcement of Christ's resurrection, from later doctrinal elaborations." },
{ level: 9, word: "Eudaimonia", pronunciation: "/juːdaɪˈmoʊniə/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A state of human flourishing or fulfillment achieved through living virtuously, often translated as happiness but distinct from mere pleasure.", etymology: "Greek eu- (good) + daimon (spirit) → eudaimonia, 'good spirit, flourishing'. Root eu- means 'good/well'. Also in: euphoria, eulogy, daemon.", example: "For Aristotle, eudaimonia is achieved not through fleeting pleasure but through a lifetime of virtuous activity in accordance with reason." },
{ level: 9, word: "Phronesis", pronunciation: "/froʊˈniːsɪs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "Practical wisdom, the capacity to deliberate well about how to act virtuously in particular circumstances.", etymology: "Greek phronesis (practical wisdom, prudence), from phren (mind). Root phren- means 'mind/heart'. Also in: phrenology, schizophrenia.", example: "Aristotle distinguished phronesis, practical wisdom about how to act, from sophia, theoretical wisdom about eternal truths." },
{ level: 9, word: "Poiesis", pronunciation: "/pɔɪˈiːsɪs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The act of creative making or production by which something comes into being that did not exist before.", etymology: "Greek poiein (to make) → poiesis, 'a making'. Root poi- means 'to make'. Also in: poem, poet, autopoiesis.", example: "Heidegger speaks of poiesis as a bringing-forth, the way a craftsman or artist coaxes something new into existence." },
{ level: 9, word: "Telos", pronunciation: "/ˈtɛlɒs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "An end, goal, or purpose toward which something is inherently directed.", etymology: "Greek telos (end, purpose, completion). Root tel- means 'end/purpose'. Also in: teleology, entelechy, television (etymologically unrelated tele- 'far').", example: "Aristotle held that the telos of a knife is to cut, and that something is good insofar as it fulfills its proper telos." },
{ level: 9, word: "Tetragrammaton", pronunciation: "/ˌtɛtrəˈɡræmətɒn/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The four-letter Hebrew name of God, YHWH, traditionally considered too sacred to pronounce.", etymology: "Greek tetra- (four) + gramma (letter) → tetragrammaton, 'four letters'. Root gram- means 'letter/writing'. Also in: grammar, diagram, telegram.", example: "Out of reverence, ancient scribes would substitute 'Adonai' aloud whenever they encountered the written Tetragrammaton." },
{ level: 9, word: "Theophany", pronunciation: "/θiˈɒfəni/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A visible or perceptible manifestation of a deity to a human being.", etymology: "Greek theos (god) + phainein (to appear) → theophania, 'a showing of god'. Root the- means 'god'; phain- means 'to appear'. Also in: theology, epiphany, phenomenon.", example: "The burning bush in Exodus is one of the Hebrew Bible's most striking instances of theophany." },
{ level: 8, word: "Theoria", pronunciation: "/θiˈɔːriə/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "Contemplative or theoretical knowledge sought for its own sake, as opposed to knowledge directed toward practical action.", etymology: "Greek theoros (spectator), from thea (a viewing) + horan (to see) → theoria, 'a looking at, contemplation'. Root the(a)- means 'to view'. Also in: theory, theater, theorem.", example: "Aristotle ranked theoria, contemplative philosophical understanding, as the highest and most divine human activity." },
{ level: 9, word: "Epoche", pronunciation: "/ɛˈpɒkeɪ/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "In phenomenology, the suspension of judgment about the existence of the external world in order to examine pure experience.", etymology: "Greek epokhe (a stopping, cessation), from epekhein (to hold back) → epoche. Root ekh- means 'to hold'. Also in: scheme (different root sense of 'holding/form').", example: "Husserl's epoche brackets our ordinary assumptions about the world's existence so consciousness itself can be studied directly." },
{ level: 9, word: "Eristic", pronunciation: "/ɪˈrɪstɪk/", partOfSpeech: "adjective", category: "Religion, Theology & Ethics", definition: "Relating to argument that aims at winning rather than discovering truth, often through specious or contentious reasoning.", etymology: "Greek eris (strife, discord), goddess of conflict → eristikos, 'fond of wrangling'. Root eris- means 'strife'. Rare root, confined mostly to this term.", example: "Plato condemned the eristic style of certain sophists, who argued purely to defeat opponents rather than to seek truth." },
{ level: 9, word: "Exoteric", pronunciation: "/ˌɛksoʊˈtɛrɪk/", partOfSpeech: "adjective", category: "Religion, Theology & Ethics", definition: "Intended for or comprehensible to the general public, as opposed to a select, initiated few.", etymology: "Greek exo (outside) → exoterikos, 'external, outer'. Root ex- means 'outside'. Also in: exotic, esoteric, exit.", example: "Aristotle's exoteric writings, intended for a general audience, are largely lost, unlike his more technical surviving lecture notes." },
{ level: 8, word: "Esoteric", pronunciation: "/ˌɛsoʊˈtɛrɪk/", partOfSpeech: "adjective", category: "Religion, Theology & Ethics", definition: "Intended for or understood by only a small, specially initiated group; obscure to outsiders.", etymology: "Greek eso (within) → esoterikos, 'inner'. Root es- means 'within'. Also in: exoteric, interior.", example: "The cult's esoteric teachings were revealed only gradually, after years of trust had been earned." },
{ level: 9, word: "Apophasis", pronunciation: "/əˈpɒfəsɪs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A rhetorical device in which a speaker raises a topic by claiming to pass over it; in theology, the practice of describing the divine through negation.", etymology: "Greek apo- (from, away) + phanai (to speak) → apophasis, 'a denial'. Root pha- means 'to speak'. Also in: apophatic, phone.", example: "'I won't even mention his disastrous first marriage' is a classic case of apophasis, raising the topic while pretending to avoid it." },
{ level: 9, word: "Adiaphora", pronunciation: "/ˌædiˈæfərə/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "Matters considered morally or doctrinally neutral, neither commanded nor forbidden, and thus left to individual discretion.", etymology: "Greek a- (not) + diaphoros (different, from dia- 'through' + pherein 'to carry') → adiaphora, 'indifferent things'. Root pher- means 'to carry'. Also in: metaphor, periphery.", example: "Reformers debated which church practices counted as essential doctrine and which were mere adiaphora, open to local variation." },
{ level: 9, word: "Anankastic", pronunciation: "/ˌænænˈkæstɪk/", partOfSpeech: "adjective", category: "Religion, Theology & Ethics", definition: "Relating to necessity, especially a conditional necessity expressing what must be done in order to achieve a given end.", etymology: "Greek ananke (necessity, compulsion) → anankastikos. Root anank- means 'necessity/compulsion'. Rare root confined to this technical term.", example: "Logicians distinguish anankastic conditionals, like 'if you want to arrive on time, you must leave now', from straightforward moral obligations." },
{ level: 9, word: "Antilogy", pronunciation: "/ænˈtɪlədʒi/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A contradiction between two statements or arguments, especially within the same text or tradition.", etymology: "Greek anti- (against) + logos (word, speech) → antilogia, 'contradiction'. Root leg-/log- means 'to speak'. Also in: antilogism, dialogue, logic.", example: "Scholars pointed to an apparent antilogy between two passages of scripture, prompting centuries of interpretive effort to reconcile them." },
{ level: 9, word: "Supererogation", pronunciation: "/ˌsuːpərˌɛrəˈɡeɪʃən/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The performance of moral acts that go beyond what duty strictly requires.", etymology: "Latin super- (beyond) + erogare (to pay out, expend) → supererogare, 'to pay out beyond what is required' → supererogation. Root rog- means 'to ask/request'. Also in: prerogative, interrogate, abrogate.", example: "Donating a kidney to a stranger is often cited as an act of supererogation, admirable but not morally obligatory." },
{ level: 9, word: "Supralapsarianism", pronunciation: "/ˌsuːprəlæpˈsɛəriənɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A Calvinist theological position holding that God's decree of election preceded, logically, his decree to permit the Fall of humanity.", etymology: "Latin supra- (above, before) + lapsus (a fall, from labi, to slip) → supralapsarianism, 'before the fall'. Root lab- means 'to slip/fall'. Also in: lapse, collapse, elapse.", example: "Supralapsarianism holds that predestination logically precedes the Fall, while infralapsarianism reverses that order." },
{ level: 9, word: "Voluntarism", pronunciation: "/ˈvɒləntərɪzəm/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The philosophical or theological view that will, rather than reason or intellect, is the fundamental and dominant factor in human nature or divine action.", etymology: "Latin voluntas (will), from velle (to wish) → voluntarius (voluntary) → voluntarism. Root vol- means 'to wish/will'. Also in: voluntary, volition, velleity.", example: "Theological voluntarism holds that an act is good simply because God wills it, not because it conforms to some independent standard of goodness." },
{ level: 8, word: "Voluntariness", pronunciation: "/ˈvɒləntərinəs/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "The quality of being done by free choice rather than under compulsion or coercion.", etymology: "Latin voluntas (will) → voluntarius (voluntary) → voluntariness. Root vol- means 'to will/wish'. Also in: volunteer, volition, involuntary.", example: "Courts often examine the voluntariness of a confession before deciding whether it can be admitted as evidence." },
{ level: 8, word: "Weltanschauung", pronunciation: "/ˈvɛltɑːnˌʃaʊʊŋ/", partOfSpeech: "noun", category: "Religion, Theology & Ethics", definition: "A comprehensive worldview or philosophy of life through which a person or culture interprets reality.", etymology: "German Welt (world) + Anschauung (view, perception) → Weltanschauung, 'world-view'. Germanic roots welt- (world) and schau- (to look). Borrowed directly into English.", example: "The novel's tragic ending reflects the author's broader weltanschauung, in which fate consistently overpowers individual will." },

{ level: 8, word: "Inexorability", pronunciation: "/ɪnˌɛksərəˈbɪlɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The quality of being impossible to stop or persuade; relentless inevitability.", etymology: "Latin in- (not) + exorare (to prevail upon by entreaty), from ex- + orare (to pray, plead) → inexorabilis, 'unmoved by pleading'. Root or- means 'to speak/pray'. Also in: orator, oracle, adore.", example: "There was an inexorability to the glacier's advance, slow but utterly unstoppable." },
{ level: 8, word: "Ineluctability", pronunciation: "/ɪnɪˌlʌktəˈbɪlɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The quality of being unable to be avoided, resisted, or escaped.", etymology: "Latin in- (not) + eluctari (to struggle out), from ex- + luctari (to wrestle) → ineluctabilis, 'unable to be struggled out of'. Root luct- means 'to wrestle/struggle'. Also in: reluctant.", example: "Joyce's narrator broods on 'the ineluctability of the visible', the inescapable fact of perceived reality." },
{ level: 8, word: "Perspicacity", pronunciation: "/ˌpɜːrspɪˈkæsɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Keenness of mental perception and understanding; sharp insight or discernment.", etymology: "Latin per- (through) + specere (to look) → perspicax (sharp-sighted) → perspicacity. Root spec- means 'to look/see'. Also in: spectacle, inspect, perspective.", example: "Her perspicacity allowed her to spot the flaw in the contract that three lawyers had overlooked." },
{ level: 9, word: "Pellucidity", pronunciation: "/pɛˈluːsɪdɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The quality of being transparently clear, whether literally in appearance or figuratively in expression.", etymology: "Latin per- (through) + lucere (to shine) → pellucidus, 'shining through, transparent' → pellucidity. Root luc- means 'light/shine'. Also in: lucid, translucent, illuminate.", example: "The pellucidity of the mountain stream let us count every pebble on its bed." },
{ level: 8, word: "Limpidity", pronunciation: "/lɪmˈpɪdɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Clearness or transparency, especially of water, light, or expression.", etymology: "Latin limpidus (clear, liquid), possibly related to lympha (water, clear liquid) → limpidity. Root lymph- means 'water/clear liquid'. Also in: lymph, lymphatic.", example: "Critics praised the limpidity of her prose, every sentence transparent and unforced." },
{ level: 9, word: "Perspicuity", pronunciation: "/ˌpɜːrspɪˈkjuːɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Clearness of expression or statement; the quality of being easily understood.", etymology: "Latin per- (through) + specere (to look) → perspicuus (transparent, evident) → perspicuity. Root spec- means 'to look'. Also in: perspicacity, spectacle, conspicuous.", example: "The judge praised the brief's perspicuity, noting how rare such plain clarity was in legal writing." },
{ level: 8, word: "Obduracy", pronunciation: "/ˈɒbdjʊrəsi/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Stubborn persistence in wrongdoing or refusal to change one's mind, despite appeals or evidence.", etymology: "Latin ob- (against) + durare (to harden), from durus (hard) → obduratus → obduracy. Root dur- means 'hard'. Also in: endure, durable, during.", example: "The negotiator's obduracy made compromise impossible, even as every other party softened its position." },
{ level: 8, word: "Recalcitrance", pronunciation: "/rɪˈkælsɪtrəns/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Stubborn resistance to authority or guidance; obstinate defiance.", etymology: "Latin re- (back) + calcitrare (to kick), from calx (heel) → recalcitrare, 'to kick back' → recalcitrance. Root calc- means 'heel'. Also in: calcaneus (heel bone), calcitrant.", example: "The committee's recalcitrance derailed every reform proposal brought before it that year." },
{ level: 8, word: "Contumacy", pronunciation: "/ˈkɒntjʊməsi/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Stubborn refusal to obey authority, especially a court order or established rule.", etymology: "Latin con- (intensifier) + tumere (to swell) → contumax, 'swollen with pride, insolent' → contumacy. Root tum- means 'to swell'. Also in: tumor, tumult.", example: "The defendant's continued contumacy in ignoring the court's summons resulted in a default judgment." },
{ level: 8, word: "Obsequiousness", pronunciation: "/əbˈsiːkwiəsnəs/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "Excessive eagerness to please or obey, often in a servile or fawning manner.", etymology: "Latin ob- (toward) + sequi (to follow) → obsequi (to comply with) → obsequiousness. Root sequ- means 'to follow'. Also in: sequel, consequence, subsequent.", example: "The new assistant's obsequiousness toward every executive made his colleagues visibly uncomfortable." },
{ level: 8, word: "Mendacity", pronunciation: "/mɛnˈdæsɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The quality of being untruthful or deceitful; habitual lying.", etymology: "Latin mendax (lying, false), from mendum (fault, blemish) → mendacitas → mendacity. Root mend- means 'fault/lie'. Also in: mendacious, amend (to correct a fault), emend.", example: "Big Daddy's famous accusation of 'mendacity' in Cat on a Hot Tin Roof exposes a family built on lies." },
{ level: 8, word: "Verisimilitude", pronunciation: "/ˌvɛrɪsɪˈmɪlɪtjuːd/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The appearance of being true or real, especially in fiction or representation.", etymology: "Latin verus (true) + similis (like) → verisimilis (probable, true-seeming) → verisimilitude. Root ver- means 'true'; sim- means 'like'. Also in: verify, veracity, similar.", example: "The novelist's deep research into 19th-century shipbuilding gave the seafaring scenes remarkable verisimilitude." },
{ level: 8, word: "Sesquipedalian", pronunciation: "/ˌsɛskwɪpɪˈdeɪliən/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Characterized by the use of long, often unnecessarily complicated words.", etymology: "Latin sesqui- (one and a half) + pes/ped- (foot) → sesquipedalis, 'a foot and a half long' (of words), coined by Horace. Root ped- means 'foot'. Also in: pedal, pedestrian, biped.", example: "His sesquipedalian prose style sent half the audience reaching for a dictionary." },
{ level: 8, word: "Crepuscular", pronunciation: "/krɪˈpʌskjʊlər/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Relating to or resembling twilight; in biology, describing animals active primarily at dawn and dusk.", etymology: "Latin crepusculum (twilight), from creper (dusky, uncertain) → crepuscularis → crepuscular. Root crep- means 'dusky/uncertain'. Rare root confined mostly to this family.", example: "Deer are crepuscular animals, most active in the soft, uncertain light of dawn and dusk." },
{ level: 8, word: "Liminal", pronunciation: "/ˈlɪmɪnəl/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Occupying a transitional or threshold position, between one state, stage, or place and another.", etymology: "Latin limen (threshold) + -al → liminal. Root lim- means 'threshold'. Also in: liminality, preliminary, subliminal.", example: "The empty airport at 3 a.m. has a distinctly liminal quality, belonging to neither night nor day." },
{ level: 8, word: "Chthonic", pronunciation: "/ˈθɒnɪk/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Relating to or dwelling in the underworld or the depths of the earth, often with associations of primal, dark forces.", etymology: "Greek khthon (earth, ground) → khthonios (of the earth) → chthonic. Root chthon- means 'earth/ground'. Also in: autochthonous (sprung from the earth itself).", example: "The play's imagery draws on chthonic deities, ancient powers said to dwell beneath the surface of the world." },
{ level: 8, word: "Numinous", pronunciation: "/ˈnjuːmɪnəs/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Having a strong sense of the spiritual or divine; evoking a feeling of awe and mystery.", etymology: "Latin numen (divine will, nod of approval), from nuere (to nod) → numinosus → numinous, term popularized by theologian Rudolf Otto. Root nu- means 'to nod'.", example: "Standing before the vast cathedral ceiling, she felt something genuinely numinous, beyond ordinary aesthetic pleasure." },
{ level: 8, word: "Ineffable", pronunciation: "/ɪnˈɛfəbəl/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Too great or extreme to be expressed or described in words.", etymology: "Latin in- (not) + effabilis (speakable), from ex- + fari (to speak) → ineffabilis. Root fa- means 'to speak'. Also in: fable, fate, infant (one who cannot yet speak).", example: "Mystics across traditions describe their core experience as ineffable, defying any adequate verbal description." },
{ level: 8, word: "Inchoate", pronunciation: "/ɪnˈkoʊɪt/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Just begun and not fully formed or developed; rudimentary.", etymology: "Latin incohare (to begin), in- + cohum (the strap fastening a plow yoke), with sense of 'to hitch up and begin work' → inchoatus → inchoate. Root coh- relates to 'yoke/strap'.", example: "The committee had only an inchoate plan, a vague sense of direction with no concrete steps yet." },
{ level: 8, word: "Evanescent", pronunciation: "/ˌɛvəˈnɛsənt/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Tending to vanish quickly, like vapor; fleeting or transient.", etymology: "Latin e- (out) + vanescere (to vanish), from vanus (empty) → evanescere, 'to vanish away' → evanescent. Root van- means 'empty'. Also in: vanish, vanity, vain.", example: "The northern lights produced an evanescent display, brilliant for a few minutes before fading into ordinary night sky." },
{ level: 7, word: "Veridical", pronunciation: "/vəˈrɪdɪkəl/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Truthful, genuine, or coinciding with reality; accurately representing fact.", etymology: "Latin verus (true) + dicere (to say) → veridicus, 'speaking truth' → veridical. Root ver- means 'true'; dic- means 'to say'. Also in: verify, verdict, dictate.", example: "The court had to determine whether the eyewitness's account was veridical or simply a confused reconstruction." },
{ level: 8, word: "Veridicality", pronunciation: "/vəˌrɪdɪˈkælɪti/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The quality of being truthful or corresponding accurately to reality.", etymology: "From veridical (Latin verus + dicere) + -ity → veridicality. Root ver- means 'true'; dic- means 'to say'. Also in: veracity, verdict.", example: "Philosophers of perception debate the veridicality of dreams: can they ever count as genuinely accurate representations of anything?" },
{ level: 9, word: "Xenoglossy", pronunciation: "/ˌzɛnəˈɡlɒsi/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The claimed paranormal phenomenon of speaking or writing a language one has never learned.", etymology: "Greek xenos (foreign, stranger) + glossa (tongue, language) → xenoglossy, 'foreign tongue'. Root xen- means 'stranger'; gloss- means 'tongue'. Also in: xenophobia, glossary.", example: "Skeptics have investigated dozens of reported cases of xenoglossy, finding mundane explanations in nearly all of them." },
{ level: 9, word: "Thaumaturgy", pronunciation: "/ˈθɔːmətɜːrdʒi/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The performance of miracles or magical feats; wonder-working.", etymology: "Greek thauma (wonder, miracle) + ergon (work) → thaumatourgia, 'wonder-working'. Root thaum- means 'wonder'; erg- means 'work'. Also in: energy, ergonomics.", example: "Medieval saints' lives are full of thaumaturgy, reporting miraculous healings attributed to relics and holy intercession." },
{ level: 9, word: "Thaumaturgic", pronunciation: "/ˌθɔːməˈtɜːrdʒɪk/", partOfSpeech: "adjective", category: "Abstract Qualities", definition: "Relating to or having the power of working wonders or miracles.", etymology: "From thaumaturgy (see above) + -ic. Root thaum- means 'wonder'.", example: "The icon was said to possess thaumaturgic powers, drawing pilgrims hoping for a miraculous cure." },
{ level: 8, word: "Hierophany", pronunciation: "/haɪˈɛrɒfəni/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "A manifestation of the sacred in an ordinary object, place, or event.", etymology: "Greek hieros (sacred) + phainein (to appear) → hierophania, 'a showing of the sacred', term used by Mircea Eliade. Root hier- means 'sacred'; phain- means 'to appear'. Also in: hierarchy, hieroglyph, epiphany.", example: "Eliade described a sacred tree marking the center of a village as a kind of hierophany, the sacred breaking into ordinary space." },
{ level: 7, word: "Epiphany", pronunciation: "/ɪˈpɪfəni/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "A sudden, striking realization or moment of insight; in Christian tradition, the manifestation of Christ to the Magi.", etymology: "Greek epi- (upon) + phainein (to appear) → epiphaneia, 'a manifestation, striking appearance' → epiphany. Root phain- means 'to appear'. Also in: phenomenon, theophany, diaphanous.", example: "Halfway through the lecture, she had an epiphany that reorganized her entire understanding of the problem." },
{ level: 9, word: "Hypotyposis", pronunciation: "/haɪpəˌtaɪˈpoʊsɪs/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "A vivid rhetorical description that places a scene or event before the listener's eyes as if it were happening in the present.", etymology: "Greek hypo- (under) + typos (impression, type) → hypotyposis, 'a sketching, vivid depiction'. Root typ- means 'impression/type'. Also in: type, typography, prototype.", example: "Cicero's speeches employ hypotyposis to make the courtroom audience feel they are witnessing the crime themselves." },
{ level: 9, word: "Prosopopoeia", pronunciation: "/proʊˌsoʊpəˈpiːə/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "A rhetorical device in which an absent or imaginary person, or an inanimate object, is represented as speaking or acting.", etymology: "Greek prosopon (face, person) + poiein (to make) → prosopopoiia, 'personification'. Root poi- means 'to make'. Also in: poem, poetry, persona.", example: "Having the river itself narrate a stanza is a striking use of prosopopoeia in the poem." },
{ level: 9, word: "Anthimeria", pronunciation: "/ˌænθɪˈmɪəriə/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "The rhetorical use of a word from one grammatical category as if it belonged to another, such as using a noun as a verb.", etymology: "Greek anti- (instead of) + meros (part) → antimereia, 'one part for another'. Root mer- means 'part'. Also in: mereology, polymer.", example: "Shakespeare's line 'he words me' is a famous anthimeria, turning the noun 'words' into a verb." },
{ level: 9, word: "Epanalepsis", pronunciation: "/ˌɛpənəˈlɛpsɪs/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "A rhetorical device in which a word or phrase at the beginning of a clause is repeated at its end.", etymology: "Greek epi- (upon) + analepsis (a taking up again), from lambanein (to take) → epanalepsis. Root lab-/lep- means 'to take'. Also in: catalepsy, syllable.", example: "'The king is dead, long live the king' uses epanalepsis, bookending the sentence with the same word." },
{ level: 8, word: "Stichomythia", pronunciation: "/ˌstɪkoʊˈmɪθiə/", partOfSpeech: "noun", category: "Abstract Qualities", definition: "A dramatic technique, especially in ancient Greek tragedy, in which alternating characters speak single lines in rapid, terse exchange.", etymology: "Greek stikhos (line, row) + mythos (speech, story) → stikhomythia, 'line-speech'. Root stikh- means 'line/row'; myth- means 'story'. Also in: distich, mythology.", example: "The argument between Antigone and Creon erupts into stichomythia, each terse line sharpening the conflict." },

{ level: 8, word: "Archetype", pronunciation: "/ˈɑːrkɪtaɪp/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "An original model or pattern from which other similar things are derived; a recurring universal symbol or character type.", etymology: "Greek arkhe (origin, first) + typos (impression, model) → arkhetypon, 'first-molded'. Root arch- means 'origin/first'; typ- means 'model/impression'. Also in: monarch, architect, prototype.", example: "Jung identified the wise old man as one of the great archetype figures recurring across world mythology." },
{ level: 9, word: "Arche", pronunciation: "/ˈɑːrkeɪ/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The fundamental first principle or originating substance from which all things derive, a central concern of early Greek philosophy.", etymology: "Greek arkhe (beginning, origin, rule). Root arch- means 'beginning/rule'. Also in: archetype, monarchy, anarchy.", example: "Thales proposed water as the arche, the single underlying substance from which everything else is composed." },
{ level: 9, word: "Aretaic", pronunciation: "/ɛrɪˈteɪɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to virtue or excellence of character, especially in ethical theories centered on virtue rather than rules or outcomes.", etymology: "Greek arete (virtue, excellence) → aretaikos. Root aret- means 'virtue/excellence'. Rare root largely confined to virtue ethics terminology.", example: "Virtue ethics offers an aretaic alternative to consequentialism, judging actions by the character they express." },
{ level: 9, word: "Autarky", pronunciation: "/ˈɔːtɑːrki/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "Self-sufficiency, especially the economic or political independence of a state from outside trade or aid; in ethics, self-sufficient contentment.", etymology: "Greek autos (self) + arkein (to suffice) → autarkeia, 'self-sufficiency'. Root ark- means 'to suffice'. Also in: monarchy (different root, arkhein, 'to rule').", example: "The Stoics prized a kind of psychological autarky, contentment that depends on nothing external to oneself." },
{ level: 9, word: "Axiology", pronunciation: "/ˌæksiˈɒlədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The branch of philosophy concerned with the nature and types of value, including ethics and aesthetics.", etymology: "Greek axios (worthy) + logos (study) → axiologia. Root ag- means 'to weigh/lead', underlying 'worth'. Also in: axiom, axiomatic.", example: "Axiology asks not just what is good, but what kinds of things can bear value in the first place." },
{ level: 9, word: "Chrematistics", pronunciation: "/ˌkrɛməˈtɪstɪks/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The study or practice of wealth acquisition, especially as Aristotle distinguished it, often pejoratively, from the natural management of a household.", etymology: "Greek khrema (thing, money), from khresthai (to use) → khrematistike. Root khre- means 'to use/need'. Also in: catachresis.", example: "Aristotle condemned unlimited chrematistics, the pursuit of wealth for its own sake, as distinct from the natural acquisition needed to run a household." },
{ level: 9, word: "Consilience", pronunciation: "/kənˈsɪliəns/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The convergence of evidence from independent, unrelated sources to support a single conclusion or theory.", etymology: "Latin con- (together) + salire (to leap) → consilire, 'to leap together' → consilience, coined by William Whewell. Root sal- means 'to leap'. Also in: resilience, salient, somersault.", example: "Darwin's theory gained strength from consilience, as evidence from geography, anatomy, and fossils all pointed toward the same conclusion." },
{ level: 9, word: "Dereification", pronunciation: "/diːˌriːɪfɪˈkeɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The act of revealing or undoing the false treatment of an abstraction as a concrete, independently existing thing.", etymology: "Latin de- (reversal) + res (thing) + -fication → dereification, reversal of reify. Root res- means 'thing'. Also in: reify, real, reality.", example: "Critical theory aims at the dereification of social categories, showing that what feels natural is in fact historically constructed." },
{ level: 8, word: "Disanalogy", pronunciation: "/ˌdɪsəˈnælədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A relevant point of difference between two things being compared, undermining an argument based on their similarity.", etymology: "Greek dis- (apart, negation) + analogia (proportion, analogy) → disanalogy. Root log- means 'reason/proportion'. Also in: analogy, dialogue, logic.", example: "Critics pointed to a key disanalogy between the two cases: one involved consent and the other did not." },
{ level: 9, word: "Enchiridion", pronunciation: "/ˌɛŋkɪˈrɪdiən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A small handbook or manual, especially one offering practical guidance or condensed instruction.", etymology: "Greek en- (in) + kheir (hand) → enkheiridion, 'a thing held in the hand'. Root kheir- means 'hand'. Also in: chiropractor, surgery (kheirourgia, 'hand-work').", example: "Epictetus's Enchiridion distills Stoic philosophy into a compact handbook of practical ethical advice." },
{ level: 9, word: "Energeia", pronunciation: "/ɛnˈɛrdʒeɪə/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Aristotelian philosophy, actuality or activity in its fullest realized sense, as opposed to mere potentiality.", etymology: "Greek en- (in) + ergon (work) → energeia, 'being-at-work'. Root erg- means 'work'. Also in: energy, ergonomic, synergy.", example: "Aristotle uses energeia to describe seeing as it actually happens, the full actuality of the eye's capacity for sight." },
{ level: 9, word: "Enantiomorphism", pronunciation: "/ɛˌnæntioʊˈmɔːrfɪzəm/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The property of being a mirror image of something else while not being superimposable on it, as a left hand mirrors a right hand.", etymology: "Greek enantios (opposite) + morphe (form) → enantiomorphism, 'opposite form'. Root morph- means 'form'. Also in: enantiomer (chemistry term for mirror-image molecules).", example: "Kant used the enantiomorphism of left and right hands to argue that space has a structure independent of the objects within it." },
{ level: 9, word: "Epagoge", pronunciation: "/ɛˈpæɡədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Aristotelian logic, a form of inductive reasoning that moves from particular instances to a general principle.", etymology: "Greek epi- (toward) + agein (to lead) → epagoge, 'a leading toward, induction'. Root ag- means 'to lead/drive'. Also in: pedagogy, demagogue.", example: "Aristotle treats epagoge as the route by which the mind first grasps universal definitions from repeated particular experiences." },
{ level: 9, word: "Epagomenal", pronunciation: "/ˌɛpəˈɡɒmɪnəl/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Describing days added to a calendar outside the regular months to reconcile the calendar with the solar year.", etymology: "Greek epi- (added) + agomenos (being led/added), from agein (to lead) → epagomenal. Root ag- means 'to lead'. Rare root largely confined to calendrical terminology.", example: "The ancient Egyptian calendar included five epagomenal days at the year's end, set apart from the regular twelve months." },
{ level: 9, word: "Epicycle", pronunciation: "/ˈɛpɪsaɪkəl/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Ptolemaic astronomy, a small circular orbit whose center moves along the circumference of a larger circle; figuratively, an unnecessary complication added to save a failing theory.", etymology: "Greek epi- (upon) + kyklos (circle) → epikyklos, 'circle upon a circle'. Root kykl- means 'circle'. Also in: cycle, bicycle, encyclopedia.", example: "Astronomers kept adding new epicycle upon epicycle to preserve the geocentric model before Copernicus simplified everything." },
{ level: 9, word: "Epinomis", pronunciation: "/ˌɛpɪˈnoʊmɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "An appendix or supplementary work added after a main legal or philosophical text, traditionally the title of a dialogue appended to Plato's Laws.", etymology: "Greek epi- (after, upon) + nomos (law) → epinomis, 'after-law'. Root nom- means 'law/custom'. Also in: autonomy, economy, antinomy.", example: "Scholars dispute whether the Epinomis was actually written by Plato or added later by a student." },
{ level: 9, word: "Episteme", pronunciation: "/ɛpɪˈstiːmeɪ/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "Knowledge or understanding considered scientifically certain, as opposed to mere opinion; in Foucault, the underlying framework of knowledge governing a historical period.", etymology: "Greek epi- (upon) + histanai (to set, stand) → episteme, 'standing upon, sure knowledge'. Root sta- means 'to stand'. Also in: epistemology, stable, exist.", example: "Foucault argued that each historical episteme structures what can even be thought or said as knowledge within that era." },
{ level: 9, word: "Equipollence", pronunciation: "/ˌiːkwɪˈpɒləns/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The state of having equal force, weight, or validity, especially of opposing arguments balanced so evenly that no judgment can be reached between them.", etymology: "Latin aequus (equal) + pollere (to be strong) → aequipollens, 'of equal force' → equipollence. Root poll- means 'to be strong'. Rare root largely confined to skeptical philosophy.", example: "Ancient Skeptics used the equipollence of opposing arguments to argue that one should suspend judgment entirely." },
{ level: 9, word: "Exaptation", pronunciation: "/ˌɛksæpˈteɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The evolutionary process by which a trait shaped for one function comes to serve a different function entirely.", etymology: "Latin ex- (out, from) blended with adaptation, coined by Stephen Jay Gould and Elisabeth Vrba. Root apt- means 'fit'. Also in: adapt, aptitude, apt.", example: "Feathers may have originated for insulation, only later becoming an exaptation that enabled flight." },
{ level: 9, word: "Extensionality", pronunciation: "/ɪkˌstɛnʃəˈnælɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The principle in logic and set theory that two sets are identical if and only if they have exactly the same members.", etymology: "Latin ex- (out) + tendere (to stretch) → extensio (a stretching out) → extensionality. Root tend- means 'to stretch'. Also in: extend, intension, extensionalism.", example: "The axiom of extensionality guarantees that a set is fully determined by its members, regardless of how those members are described." },
{ level: 9, word: "Hyperintension", pronunciation: "/ˌhaɪpərɪnˈtɛnʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A property of meaning that distinguishes expressions even when they are necessarily logically equivalent, finer-grained than ordinary intension.", etymology: "Greek hyper- (beyond) + Latin intensio (a stretching) → hyperintension. Root tend- means 'to stretch'. Also in: intensional, extensional, hyperbole.", example: "Belief contexts are often treated as hyperintension contexts, since believing one necessary truth doesn't entail believing all of them." },
{ level: 9, word: "Hypokeimenon", pronunciation: "/ˌhaɪpoʊˈkiːmɪnɒn/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Aristotelian metaphysics, the underlying substratum or subject in which properties inhere; the bearer of qualities.", etymology: "Greek hypo- (under) + keimenon (that which lies), from keisthai (to lie) → hypokeimenon, 'that which lies under'. Root kei- means 'to lie'. Also in: cemetery (a place of lying down).", example: "Aristotle's hypokeimenon is what remains constant as a thing's properties change, the underlying subject of predication." },
{ level: 8, word: "Idiographic", pronunciation: "/ˌɪdiəˈɡræfɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to the study of individual, unique cases rather than general laws.", etymology: "Greek idios (one's own, particular) + graphein (to write) → idiographic, 'writing about the particular'. Root graph- means 'to write'. Also in: idiosyncrasy, idiom, idiot.", example: "History is often considered an idiographic discipline, concerned with unrepeatable particular events rather than universal laws." },
{ level: 8, word: "Ideographic", pronunciation: "/ˌaɪdiəˈɡræfɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to a system of writing in which symbols represent ideas or concepts directly rather than sounds.", etymology: "Greek idea (idea, form) + graphein (to write) → ideographic, 'writing of ideas'. Root id- means 'idea/form'; graph- means 'to write'. Also in: ideology, ideal, idiographic.", example: "Chinese characters are often loosely described as an ideographic writing system, though linguists note this is an oversimplification." },
{ level: 9, word: "Illocution", pronunciation: "/ˌɪləˈkjuːʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The act performed in saying something, such as promising, warning, or asserting, as opposed to the mere utterance of words.", etymology: "Latin in- (in) + loqui (to speak) → illocution, term coined by J. L. Austin. Root loqu- means 'to speak'. Also in: locution, eloquent, soliloquy.", example: "Saying 'I now pronounce you married' is itself the illocution of marrying the couple, not merely a description of it." },
{ level: 9, word: "Illocutionary", pronunciation: "/ˌɪləˈkjuːʃəneri/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to the act performed by uttering a sentence, such as promising or asserting.", etymology: "From illocution (see above) + -ary. Root loqu- means 'to speak'.", example: "Promising carries genuine illocutionary force only when the speaker actually intends to keep their word." },
{ level: 9, word: "Impredicative", pronunciation: "/ˌɪmprɪˈdɪkətɪv/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Describing a definition that refers to or quantifies over a totality that includes the very thing being defined, risking circularity.", etymology: "Latin in- (not) + prae- (before) + dicare (to proclaim) → impredicative, negation of predicative. Root dic- means 'to say/proclaim'. Also in: predicate, predication.", example: "Russell's paradox emerged partly because of impredicative definitions, sets defined in terms of the totality of all sets, including themselves." },
{ level: 9, word: "Incommensurability", pronunciation: "/ɪnkəˌmɛnʃərəˈbɪlɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The state of being impossible to measure or compare on a common scale, as with rival scientific paradigms or fundamentally different values.", etymology: "Latin in- (not) + com- (together) + mensura (measure) → incommensurabilis. Root mens-/metr- means 'measure'. Also in: measure, commensurate, dimension.", example: "Kuhn argued for the incommensurability of scientific paradigms, claiming rival theories could not always be judged by a shared standard." },
{ level: 9, word: "Inesse", pronunciation: "/ɪˈnɛseɪ/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In medieval logic, the property of inhering or existing in a subject, as an attribute exists in the thing it characterizes.", etymology: "Latin in- (in) + esse (to be) → inesse, 'to be in'. Root es- means 'to be'. Also in: essence, present, absent.", example: "Scholastic logicians distinguished a term's inesse, its inherence in a subject, from its broader use in propositions." },
{ level: 9, word: "Intension", pronunciation: "/ɪnˈtɛnʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The set of defining properties or the sense associated with a concept or term, as distinct from the actual things it refers to.", etymology: "Latin in- (in) + tendere (to stretch) → intensio (a stretching) → intension. Root tend- means 'to stretch'. Also in: intend, intense, extension.", example: "The intension of 'bachelor' includes the properties unmarried and male, regardless of which specific people it happens to apply to." },
{ level: 9, word: "Kerygma", pronunciation: "/kəˈrɪɡmə/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "An authoritative proclamation or core announcement, particularly used of the apostolic preaching of the gospel.", etymology: "Greek kerygma (a proclamation), from kerysein (to herald) → kerygma. Root keryx- means 'herald'. Rare root confined to this term.", example: "Bultmann argued the modern church must restate the ancient kerygma in terms intelligible to a contemporary audience." },
