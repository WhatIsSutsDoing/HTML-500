  { level: 7, word: "Fungible", pronunciation: "/ˈfʌndʒɪb(ə)l/", partOfSpeech: "adjective", category: "Intelligence", definition: "Interchangeable; (of goods or people) able to replace or be replaced by another identical item.", etymology: "Latin fungi (to perform, to enjoy) → fungibilis → fungible. Root fung- means 'to perform/discharge'. Also in: function, defunct (no longer functioning), perfunctory (performed merely as duty), fungicide.", example: "In his view, employees were fungible — each person just a replaceable unit performing a defined task." },
  { level: 7, word: "Persiflage", pronunciation: "/ˈpɜːsɪflɑːʒ/", partOfSpeech: "noun", category: "Social", definition: "Light and slightly contemptuous mockery or banter; frivolous, empty talk.", etymology: "French persifler (to banter, to mock) from per- (through) + siffler (to whistle, to hiss) from Latin sibilare (to hiss) → persiflage. Root sibil- means 'to hiss'. Also in: sibilant (a hissing sound), sibilance.", example: "The dinner was enjoyable enough, though two hours of persiflage left her slightly empty — not a serious thought all evening." },
  { level: 7, word: "Divagate", pronunciation: "/ˈdʌɪvəɡeɪt/", partOfSpeech: "verb", category: "Intelligence", definition: "To stray from a subject; to wander or digress; to roam mentally.", etymology: "Latin di- (apart) + vagari (to wander) → divagatus → divagate. Root vag- means 'to wander'. Also in: vagrant, vague (wandering without fixity), extravagant (wandering beyond bounds), vagabond.", example: "The lecture had a tendency to divagate into unrelated anecdote — delightful, but the reading list remained uncovered." },
  { level: 7, word: "Recherché", pronunciation: "/rəˈʃɛʃeɪ/", partOfSpeech: "adjective", category: "Intelligence", definition: "Rare, exotic, or obscure; overly far-fetched or unusual to be of wide interest.", etymology: "French recherché (carefully sought out) from re- (again) + chercher (to seek) from Latin circare (to go round) → recherché. Root circum-/charch- means 'to go around/seek'. Also in: circle, search, research.", example: "His tastes ran to the recherché — wines from a single Slovenian hillside, operas performed once per decade." },
  { level: 7, word: "Fulgent", pronunciation: "/ˈfʌldʒ(ə)nt/", partOfSpeech: "adjective", category: "Perception", definition: "Gleaming brilliantly; radiantly and dazzlingly bright.", etymology: "Latin fulgere (to flash, to shine) → fulgens → fulgent. Root fulg- means 'to flash/shine'. Also in: fulgurant (lightning-like), effulge (to shine out), refulgent (shining back), fulguration.", example: "The fulgent dome caught the last sun of the day and blazed above the darkening rooftops like a second star." },

  // ── ORIGINAL LEVEL 8 ─────────────────────────────────────────────────────
  { level: 8, word: "Panegyric", pronunciation: "/ˌpænɪˈdʒɪrɪk/", partOfSpeech: "noun", category: "Social", definition: "A public speech or text in praise of someone or something; an elaborate compliment.", etymology: "Greek pan- (all) + agyris (assembly) → panegyris (a public festival) → panegyrikos (speech for a public assembly) → panegyric. Root pan- means 'all'. Also in: pandemic, panorama, panacea, pantheon.", example: "The retirement dinner was pleasant, but the panegyric from his deputy went on for forty-five uncomfortable minutes." },
  { level: 8, word: "Parsimonious", pronunciation: "/ˌpɑːsɪˈməʊniəs/", partOfSpeech: "adjective", category: "Character", definition: "Unwilling to spend money or use resources; extremely frugal to the point of meanness.", etymology: "Latin parcere (to spare, be sparing) → parsimonia (economy, frugality) → parsimonious. Root parc-/pars- means 'to spare'. Also in: parse (to spare apart/analyse), sparingly. In logic, 'parsimony' is economy of explanation.", example: "He was so parsimonious that he reused tea bags and turned off light switches before leaving the room." },
  { level: 8, word: "Mnemonic", pronunciation: "/nɪˈmɒnɪk/", partOfSpeech: "adjective/noun", category: "Intelligence", definition: "A system or pattern intended to assist memory; assisting or intended to assist the memory.", etymology: "Greek mnemonikos (of memory) from mnemon (mindful) from mnasthai (to remember) → mnemonic. Root mne- means 'memory'. Also in: amnesia (a- = without + mnesia = memory), Mnemosyne (Greek goddess of memory).", example: "'Every Good Boy Deserves Football' is a mnemonic for the lines of the treble clef." },
  { level: 8, word: "Sesquipedalian", pronunciation: "/ˌsɛskwɪpɪˈdeɪliən/", partOfSpeech: "adjective", category: "Intelligence", definition: "Relating to or characterised by long words; given to using long words.", etymology: "Latin sesqui- (one and a half) + pedalis (of a foot) → sesquipedalis (a foot and a half long) → sesquipedalian. Root sesqui- is a precise fraction; ped- means 'foot'. Also in: pedal, pedestrian, expedite (to free the feet), impede.", example: "His academic papers were famously sesquipedalian — students joked that you needed a dictionary just to read the abstract." },
  { level: 8, word: "Threnody", pronunciation: "/ˈθrɛnədi/", partOfSpeech: "noun", category: "Emotions", definition: "A lament; a song or poem of mourning.", etymology: "Greek threnos (lament, wailing) + oide (song) → threnodia → threnody. Root oid- means 'song'. Also in: ode, melody (melos + oide), comedy (komos + oide = revel-song), tragedy (tragos + oide = goat-song), rhapsody.", example: "The string quartet played a threnody for the victims — spare, bleak, and devastatingly right." },
  { level: 8, word: "Acumen", pronunciation: "/ˈækjʊmɛn/", partOfSpeech: "noun", category: "Intelligence", definition: "The ability to make good judgments and take quick decisions; sharpness of mind.", etymology: "Latin acuere (to sharpen) → acumen (a point, sharpness). Root acu- means 'sharp'. Also in: acute, acupuncture, acid, acrimony, exacerbate — all from the same 'sharp' sense.", example: "Her business acumen was evident from the first meeting — she saw the gap in the market instantly." },
  { level: 8, word: "Palliative", pronunciation: "/ˈpæliətɪv/", partOfSpeech: "adjective/noun", category: "Character", definition: "Relieving pain without treating the cause; (noun) a medicine or measure that relieves without curing.", etymology: "Latin pallium (a cloak) → palliare (to cloak, to conceal) → palliativus → palliative. Root palli- means 'cloak'. Also in: palliate, pallium. The word captures the idea of 'covering over' pain without removing it.", example: "The committee offered palliative measures — enough to quiet the protests but not to fix the underlying problem." },
  { level: 8, word: "Crepitate", pronunciation: "/ˈkrɛpɪteɪt/", partOfSpeech: "verb", category: "Nature", definition: "To make a crackling or rattling sound; to crackle.", etymology: "Latin crepare (to crack, rattle, creak) → crepitare → crepitate. Root crep- means 'to crack/rattle'. Also in: decrepit (worn down, crackling with age).", example: "The dry logs crepitated satisfyingly in the hearth as the room slowly warmed." },
  { level: 8, word: "Solecism", pronunciation: "/ˈsɒlɪsɪz(ə)m/", partOfSpeech: "noun", category: "Social", definition: "A grammatical mistake; an error in etiquette or a social blunder.", etymology: "Greek Soloi — a city in Cilicia (modern Turkey) whose inhabitants were thought to speak corrupt Greek → soloikismos → solecism. A place-name that became a category of error. Like 'malapropism' (from Mrs Malaprop).", example: "Using 'literally' to mean 'figuratively' has gone from solecism to accepted usage in a single generation." },
  { level: 8, word: "Apothegm", pronunciation: "/ˈæpəθɛm/", partOfSpeech: "noun", category: "Intelligence", definition: "A short, pithy, and instructive saying or formulation; a maxim.", etymology: "Greek apo- (from) + phthengesthai (to speak out) → apophthegma → apothegm. Root phtheg- means 'to utter clearly'. Also in: diphthong (di = two + phthong = sound). The apo- prefix means 'away from'.", example: "Franklin's apothegms — 'time is money', 'an ounce of prevention' — have outlasted most of his longer writings." },
  // ── NEW LEVEL 8 ──────────────────────────────────────────────────────────
  { level: 8, word: "Apocope", pronunciation: "/əˈpɒkəpi/", partOfSpeech: "noun", category: "Intelligence", definition: "The loss or omission of one or more sounds or letters at the end of a word.", etymology: "Greek apo- (away from) + koptein (to cut) → apokopē → apocope. Root kop-/cop- means 'to cut'. Also in: syncope (cutting in the middle of a word), apostrophe (cutting away).", example: "'Gym' for 'gymnasium' and 'ad' for 'advertisement' are apocope — the word trimmed from the tail." },
  { level: 8, word: "Eponymous", pronunciation: "/ɪˈpɒnɪməs/", partOfSpeech: "adjective", category: "Intelligence", definition: "Of or relating to the person after whom something is named; giving one's own name to something.", etymology: "Greek epi- (upon) + onyma/onoma (name) → eponymos → eponymous. Root onom-/onym- means 'name'. Also in: anonymous (without a name), synonym (same name), pseudonym (false name), patronymic.", example: "The eponymous hero of the novel appears only on page one and page four hundred — a ghost in his own story." },
  { level: 8, word: "Hyperbole", pronunciation: "/hʌɪˈpɜːbəli/", partOfSpeech: "noun", category: "Art", definition: "Exaggerated statements not meant to be taken literally; deliberate overstatement for rhetorical effect.", etymology: "Greek hyper- (over, beyond) + ballein (to throw) → hyperbolē → hyperbole. Root bol-/bal- means 'to throw'. Also in: parabola (thrown alongside), symbol (thrown together), metabolism (thrown beyond), problem (thrown before).", example: "Saying the queue at the post office was 'a thousand years long' is hyperbole, but she wasn't entirely wrong." },
  { level: 8, word: "Hiraeth", pronunciation: "/ˈhɪraɪθ/", partOfSpeech: "noun", category: "Emotions", definition: "A Welsh concept: homesickness for a home one cannot return to, or which may never have existed; grief for lost places.", etymology: "Welsh hir (long) + aeth (pain, grief, departure) → hiraeth. Root hir- means 'long'; aeth suggests departure or loss. A Welsh loanword adopted into English for a particular quality of longing without exact equivalent.", example: "The emigrant felt hiraeth so acutely that every landscape reminded him of the one he had left behind." },
  { level: 8, word: "Frangible", pronunciation: "/ˈfrandʒɪb(ə)l/", partOfSpeech: "adjective", category: "Perception", definition: "Fragile; easily broken; capable of being shattered or destroyed.", etymology: "Latin frangere (to break) → frangibilis → frangible. Root frang-/fract- means 'to break'. Also in: fragment, fracture, fraction, infraction (a breaking of a rule), refractory (breaking back against control), refraction.", example: "The frangible bone china was packed in so much tissue that the box weighed more than its contents." },
  { level: 8, word: "Diapason", pronunciation: "/ˌdʌɪəˈpeɪz(ə)n/", partOfSpeech: "noun", category: "Art", definition: "The full compass of a musical instrument or voice; a rich, swelling burst of harmonious sound.", etymology: "Greek dia (through) + pason (all, feminine genitive plural of pas) → dia pason chordon (through all the strings) → diapason. Root pas-/pan- means 'all'. Also in: pandemic, panorama, panacea.", example: "When the organ reached full diapason, the stone walls of the cathedral seemed to vibrate in sympathetic resonance." },
  { level: 8, word: "Vellichor", pronunciation: "/ˈvɛlɪkɔː/", partOfSpeech: "noun", category: "Emotions", definition: "The strange wistfulness of used bookshops; the sense that a book contains a whole life that will outlast its reader.", etymology: "Coined by John Koenig (Dictionary of Obscure Sorrows). Possibly from vellum (scraped sheepskin — writing material) + ichor (the fluid of the gods in Greek myth). Root vell- relates to skin and writing.", example: "She spent three hours in the shop suffering vellichor — every spine a life she could enter, none of them hers." },
  { level: 8, word: "Heterodoxy", pronunciation: "/ˈhɛtərədɒksi/", partOfSpeech: "noun", category: "Intelligence", definition: "The holding of opinions at variance with accepted or established doctrine; the state of being unorthodox.", etymology: "Greek heteros (other, different) + doxa (opinion, glory) → heterodoxia → heterodoxy. Root heter- means 'other'. Also in: heterogeneous, heterodox. Root dox- means 'opinion'. Also in: orthodox (right opinion), paradox, doxology.", example: "Her heterodoxy on urban planning was mocked at conferences and implemented in five cities a decade later." },

  // ── ORIGINAL LEVEL 9 ─────────────────────────────────────────────────────
  { level: 9, word: "Pleonasm", pronunciation: "/ˈpliːəˌnæz(ə)m/", partOfSpeech: "noun", category: "Intelligence", definition: "The use of more words than necessary to convey meaning; redundancy of expression.", etymology: "Greek pleon (more) + nasmós (the act of filling) from pleonazein (to be excessive) → pleonasmus → pleonasm. Root ple-/pleo- means 'more/full'. Also in: plethora (over-fullness), plenum, plenty, complement, complete.", example: "'A free gift' and 'end result' are classic pleonasms — one word in each phrase does all the work." },
  { level: 9, word: "Apophenia", pronunciation: "/ˌæpəˈfiːniə/", partOfSpeech: "noun", category: "Intelligence", definition: "The tendency to perceive meaningful connections between unrelated things.", etymology: "Greek apo- (away from) + phainein (to show) + -ia (condition) → apophenia. Coined by Klaus Conrad (1958). Root phain- means 'to show/appear'. Also in: phenomenon, fantasy, emphasis, diaphanous, sycophant.", example: "Seeing faces in clouds or patterns in random noise is apophenia — the brain hunting for signal in static." },
  { level: 9, word: "Desiderata", pronunciation: "/dɪˌzɪdəˈrɑːtə/", partOfSpeech: "noun (plural)", category: "Character", definition: "Things that are needed or wanted; essential requirements.", etymology: "Latin desiderare (to long for, to miss) → desideratum (thing desired) → desiderata (plural). Root desider- means 'to long for'. Possibly from de- + sidus, sideris (star) — 'to long for one's lost star'. Also in: consider, desire.", example: "The job listing ran to two pages of desiderata, most of which contradicted the others." },
  { level: 9, word: "Kakistocracy", pronunciation: "/ˌkækɪˈstɒkrəsi/", partOfSpeech: "noun", category: "Social", definition: "Government by the worst or least qualified citizens.", etymology: "Greek kakistos (worst, superlative of kakos = bad) + kratos (rule, power) → kakistocracy. Root kak- means 'bad'. Also in: cacophony (kak + phone = bad sound). Root krat- means 'power/rule'. Also in: democracy, aristocracy.", example: "Critics called it a kakistocracy — every competent official had been replaced with loyalists of no relevant experience." },
  { level: 9, word: "Logomachy", pronunciation: "/lɒˈɡɒməki/", partOfSpeech: "noun", category: "Social", definition: "An argument about words; a dispute turning on a point of terminology rather than substance.", etymology: "Greek logos (word, reason) + makhē (battle, fight) → logomachy. Root log- means 'word/reason'. Also in: logic, logarithm, monologue, prologue. Root makh- means 'battle'.", example: "The committee's debate about whether the document was a 'policy' or a 'framework' was pure logomachy." },
  { level: 9, word: "Otiose", pronunciation: "/ˈəʊʃiəʊs/", partOfSpeech: "adjective", category: "Character", definition: "Serving no practical purpose; pointless; or (of a person) idle and indolent.", etymology: "Latin otium (leisure, idleness) → otiosus → otiose. Root oti- means 'leisure'. Also in: negotium (neg- = not + otium = not-leisure = business) → negotiate. Otium was the Romans' word for leisure.", example: "Three of the report's recommendations were otiose — they described what was already happening." },
  { level: 9, word: "Anamnesis", pronunciation: "/ˌænæmˈniːsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "Recollection, especially of a supposed previous existence; the medical history of a patient.", etymology: "Greek ana- (again, back) + mnesis (memory) from mnasthai (to remember) → anamnesis. Root mne- means 'memory' (same root as mnemonic). Also in: amnesia (a- = without + mnesia).", example: "The philosopher argued that great art works by anamnesis — not teaching us new things but revealing what we already knew." },
  { level: 9, word: "Casuistry", pronunciation: "/ˈkæʒjʊɪstri/", partOfSpeech: "noun", category: "Intelligence", definition: "The use of clever but false reasoning to justify actions; moral hair-splitting.", etymology: "Latin casus (a case, a falling, an event) from cadere (to fall) → casus + -istry → casuistry. Root cad-/cas- means 'to fall'. Also in: case, casual, occasion, accident, cadence, chance.", example: "The memo was a masterpiece of casuistry — technically correct and morally bankrupt in every line." },
  { level: 9, word: "Tmesis", pronunciation: "/ˈtmiːsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "The insertion of a word or words into the middle of another word, as in 'abso-bloody-lutely'.", etymology: "Greek tmesis (cutting) from temnein (to cut) → tmesis. Root tem-/tom- means 'to cut'. Also in: anatomy (ana + tomy = cutting up), appendectomy, atom (a- + tomos = un-cuttable), epitome.", example: "The footballer's post-match interview was famous for its creative tmesis — unprintable but linguistically fascinating." },
  { level: 9, word: "Noctilucent", pronunciation: "/ˌnɒktɪˈluːs(ə)nt/", partOfSpeech: "adjective", category: "Nature", definition: "Shining or luminous at night; specifically of the highest-altitude clouds visible in deep twilight.", etymology: "Latin nox, noctis (night) + lucere (to shine) → noctilucent. Root noct- means 'night'. Also in: nocturnal, equinox (aequi + nox = equal night). Root luc- means 'light' (see lucid, pellucid, elucidate).", example: "On summer nights at high latitudes, noctilucent clouds glow electric blue long after the sun has set." },
  { level: 9, word: "Synecdoche", pronunciation: "/sɪˈnɛkdəki/", partOfSpeech: "noun", category: "Intelligence", definition: "A figure of speech in which a part is used to represent the whole, or vice versa.", etymology: "Greek syn- (together) + ekdoche (interpretation) from ek- (out) + dekhesthai (to receive) → synekdoche → synecdoche. Root dech-/doc- means 'to receive/understand'. Also in: orthodox (right-receiving), paradox.", example: "'All hands on deck' uses synecdoche — 'hands' for the sailors to whom those hands belong." },
  // ── NEW LEVEL 9 ──────────────────────────────────────────────────────────
  { level: 9, word: "Pareidolia", pronunciation: "/ˌpærɪˈdəʊliə/", partOfSpeech: "noun", category: "Intelligence", definition: "The tendency to perceive a specific, often meaningful image in a random or ambiguous visual pattern.", etymology: "Greek para- (beside, alongside) + eidolon (image, form) from eidos (form) → pareidolia. Root eid-/id- means 'form/image'. Also in: idol, eidetic (relating to memory images), kaleidoscope (beautiful form-viewer).", example: "Pareidolia explains the Virgin Mary in toast, the man in the moon, and every face glimpsed in a wood-grain panel." },
  { level: 9, word: "Quiddity", pronunciation: "/ˈkwɪdɪti/", partOfSpeech: "noun", category: "Intelligence", definition: "The essential nature of something; what makes a thing what it is; a trifling point or quibble.", etymology: "Medieval Latin quidditas (whatness) from Latin quid (what) → quiddity. Root quid means 'what'. Also in: quid pro quo (what for what), quibble (an evasion), quodlibet (what pleases — a philosophical disputation).", example: "The philosopher spent a career on the quiddity of redness — what makes a thing red rather than seeming red." },
  { level: 9, word: "Enchiridion", pronunciation: "/ˌɛnkɪˈrɪdiən/", partOfSpeech: "noun", category: "Intelligence", definition: "A handbook or manual; a small reference book for use at hand.", etymology: "Greek en- (in) + kheir (hand) + -idion (diminutive) → enkheirdion → enchiridion. Root kheir- means 'hand'. Also in: chirography (handwriting), chiropractor (hand-practitioner), surgery (kheir + ergon = hand-work).", example: "Epictetus's Enchiridion distils Stoic philosophy into fifty-three short passages — a handbook for enduring whatever arrives." },
  { level: 9, word: "Syzygy", pronunciation: "/ˈsɪzɪdʒi/", partOfSpeech: "noun", category: "Nature", definition: "A straight-line configuration of three celestial bodies; the conjunction or opposition of the moon with the sun.", etymology: "Greek syn- (together) + zygon (yoke) → syzygia → syzygy. Root zyg- means 'yoke'. Also in: zygote (yoked cells), zygoma (cheekbone — the yoking bone), azygous (without a yoke — unpaired).", example: "At syzygy the tidal forces are at their greatest — sun and moon aligned, pulling the sea into its highest reach." },
  { level: 9, word: "Velleity", pronunciation: "/vɛˈliːɪti/", partOfSpeech: "noun", category: "Emotions", definition: "A wish or inclination not strong enough to lead to action; the very lowest degree of volition.", etymology: "Latin velle (to wish, to will) → velleitatem → velleity. Root vel-/vol- means 'to will/wish'. Also in: volunteer, benevolent, malevolent, volition (the stronger form of this very impulse).", example: "He had a velleity to learn Japanese every January, which faded by February without a single lesson taken." },
  { level: 9, word: "Tergiversate", pronunciation: "/ˈtɜːdʒɪvəseɪt/", partOfSpeech: "verb", category: "Character", definition: "To make evasive or conflicting statements; to change sides repeatedly; to be deliberately ambiguous.", etymology: "Latin tergum (the back) + vertere (to turn) → tergiversari (to turn the back on, to evade) → tergiversate. Root terg- means 'back'; vers- means 'to turn'. Also in: verse, divert, revert, perverse, avert.", example: "The minister tergiversated so thoroughly through the interview that journalists filed three contradictory stories from the same quotes." },
  { level: 9, word: "Nescience", pronunciation: "/ˈnɛsiəns/", partOfSpeech: "noun", category: "Intelligence", definition: "Lack of knowledge or awareness; ignorance; the philosophical position that nothing can be known.", etymology: "Latin ne- (not) + scire (to know) → nescientia → nescience. Root sci- means 'to know'. Also in: science, conscience (knowing with oneself), omniscient (knowing everything), prescient (knowing before).", example: "His nescience of the city's street layout was absolute — he handed strangers his phone and asked them to type the address." },
  { level: 9, word: "Hendiadys", pronunciation: "/hɛnˈdʌɪədɪs/", partOfSpeech: "noun", category: "Art", definition: "A figure of speech in which two words joined by a conjunction express a single idea, where one modifies the other.", etymology: "Greek hen dia duoin (one through two) from hen (one) + dia (through) + duo (two) → hendiadys. Root du-/di- means 'two'. Also in: dual, duplicate, duel, binary, diploma (two-tablet document).", example: "'Nice and warm' is hendiadys for 'nicely warm' — Shakespeare used it constantly, 'sound and fury' being the most famous example." },
  { level: 9, word: "Limerence", pronunciation: "/ˈlɪmərəns/", partOfSpeech: "noun", category: "Emotions", definition: "The involuntary, obsessive state of being romantically infatuated with another person; consuming one-directional longing.", etymology: "Coined by psychologist Dorothy Tennov (1979) from an invented stem; no classical etymology. Rhymes with adherence and deference — a modern psychological coinage without ancient roots but widely adopted by scholars.", example: "What she had felt for him for two years was not love exactly but limerence — consuming, one-directional, and fading the moment he actually called." },

  // ── ORIGINAL LEVEL 10 ────────────────────────────────────────────────────
  { level: 10, word: "Apophatic", pronunciation: "/ˌæpəˈfætɪk/", partOfSpeech: "adjective", category: "Intelligence", definition: "Relating to a way of describing something by saying what it is not rather than what it is.", etymology: "Greek apo- (away from) + phanai (to speak) → apophatikos → apophatic. Root phan-/phat- means 'to speak'. Also in: prophet (pro + phat = speaking before), emphatic, aphasia (loss of speech).", example: "Apophatic theology holds that God can only be described by negation — not finite, not temporal, not comprehensible." },
  { level: 10, word: "Palingenesis", pronunciation: "/ˌpælɪnˈdʒɛnɪsɪs/", partOfSpeech: "noun", category: "Time", definition: "Rebirth or regeneration; the recurrence of ancestral characteristics.", etymology: "Greek palin (again) + genesis (origin, birth) → palingenesis. Root palin- means 'again/back' (also in palindrome, palimpsest). Root gen- means 'birth/origin'. Also in: genesis, generate, genus, gene.", example: "Some political movements promise national palingenesis — a rebirth of former greatness through collective will." },
  { level: 10, word: "Apotropaic", pronunciation: "/ˌæpətrəˈpeɪɪk/", partOfSpeech: "adjective", category: "Perception", definition: "Supposedly having the power to avert evil influences or bad luck.", etymology: "Greek apo- (away from) + trepein (to turn) → apotropaios → apotropaic. Root trep-/trop- means 'to turn'. Also in: trope, trophy (turning the enemy), entropy (en + trope = a turning inward), heliotrope.", example: "The carved masks above the temple door were apotropaic — their grotesque expressions meant to frighten demons away." },
  { level: 10, word: "Parapraxis", pronunciation: "/ˌpærəˈpraksɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "A slip of the tongue or pen, or a small forgetting, seen as revealing unconscious wishes.", etymology: "Greek para- (beside, amiss) + praxis (action, doing) from prassein (to do) → parapraxis. Root prax- means 'action'. Also in: practice, practical, chiropractic (kheir = hand + praxis = action).", example: "He called his new boss by his ex-wife's name — a parapraxis the whole room pretended not to notice." },
  { level: 10, word: "Catachresis", pronunciation: "/ˌkætəˈkriːsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "The use of a word in a way that is not correct; an extension of a word's meaning beyond its proper application.", etymology: "Greek kata- (against, wrongly) + khresthai (to use) → katakhresis → catachresis. Root khre-/chre- means 'to use/need'. Also in: Euchrasia (good use), catechism (to sound down — kata + echo).", example: "'The leg of a table' is catachresis — a leg belongs to a living creature, but we borrowed the word anyway." },
  { level: 10, word: "Heterodox", pronunciation: "/ˈhɛtərədɒks/", partOfSpeech: "adjective", category: "Intelligence", definition: "Not conforming with accepted or orthodox standards or beliefs; holding unorthodox opinions.", etymology: "Greek heteros (other, different) + doxa (opinion, glory) → heterodoxos → heterodox. Root heter- means 'other'. Also in: heterogeneous, heterosexual. Root dox- means 'opinion'. Also in: orthodox (ortho = right), paradox.", example: "Her heterodox views on urban planning were mocked at conferences and implemented in five cities a decade later." },
  { level: 10, word: "Prolepsis", pronunciation: "/prəˈlɛpsɪs/", partOfSpeech: "noun", category: "Time", definition: "The anticipation and answering of objections before they are raised; or representing a future event as already complete.", etymology: "Greek pro- (before) + lepsis (a taking) from lambanein (to take) → prolepsis. Root lep-/lab- means 'to take/seize'. Also in: epilepsy (a seizing upon), catalepsy, syllable (syl + labe = taking together).", example: "His opening argument used prolepsis brilliantly — he dismantled the opposing case before opposing counsel had spoken." },
  { level: 10, word: "Aposiopesis", pronunciation: "/ˌæpəˌsaɪəˈpiːsɪs/", partOfSpeech: "noun", category: "Social", definition: "A rhetorical device in which a sentence is deliberately broken off and left incomplete for dramatic effect.", etymology: "Greek apo- (away from) + siope (silence) → aposiopesis. Root siop- means 'silence'. An isolated root found almost only in this word. The device is the moment when language literally stops.", example: "He raised his hand to speak, then saw the child's face, and his sentence ended in aposiopesis — some things couldn't be said." },
  { level: 10, word: "Kenosis", pronunciation: "/kɪˈnəʊsɪs/", partOfSpeech: "noun", category: "Character", definition: "The relinquishment of divine attributes by Christ in the Incarnation; by extension: a deliberate self-emptying of ego.", etymology: "Greek kenoo (to empty) from kenos (empty) + -sis (process of) → kenosis. Root ken-/keno- means 'empty'. Also in: cenotaph (keno + taphos = empty tomb), kenophobia (fear of empty spaces).", example: "The great artists often describe a kenosis before creation — emptying the self so something true can enter." },
  { level: 10, word: "Apocatastasis", pronunciation: "/ˌæpəˌkætəˈsteɪsɪs/", partOfSpeech: "noun", category: "Time", definition: "The restoration of all things to their original state; universal reconciliation at the end of time.", etymology: "Greek apo- (away, back) + kathistanai (to establish, restore) from kata- (down) + histanai (to stand) → apokatastasis. Root sta-/stasis means 'to stand'. Also in: static, stable, statue, establish, ecstasy, apostasy.", example: "Origen taught apocatastasis — that even the devils would eventually be reconciled to God, nothing finally lost." },
  // ── NEW LEVEL 10 ─────────────────────────────────────────────────────────
  { level: 10, word: "Kenopsia", pronunciation: "/kɛˈnɒpsiə/", partOfSpeech: "noun", category: "Emotions", definition: "The eerie, unsettling atmosphere of a place that is usually busy but is now empty — an abandoned school, a shuttered park.", etymology: "Greek kenos (empty) + opsis (sight, appearance) → kenopsia. Coined by John Koenig. Root ken-/keno- means 'empty'. Also in: cenotaph (empty tomb), kenosis (self-emptying). Root ops- means 'sight'. Also in: synopsis, autopsy.", example: "Walking through the exam hall after everyone had left, she felt kenopsia sharply — the desks still warm, the silence total." },
  { level: 10, word: "Haecceity", pronunciation: "/hɛkˈsiːɪti/", partOfSpeech: "noun", category: "Intelligence", definition: "The property that makes something the particular individual that it is; the 'thisness' of a thing as opposed to its qualities.", etymology: "Medieval Latin haecceitas (thisness) from Latin haec (this — feminine), coined by Duns Scotus. Root haec means 'this'. A scholastic philosophical coinage designed to be unique, with no wider root family.", example: "The haecceity of a person is what remains when all describable qualities are subtracted — the pure fact of being that one." },
  { level: 10, word: "Enantiodromia", pronunciation: "/ɪˌnæntiəˈdrəʊmiə/", partOfSpeech: "noun", category: "Time", definition: "The tendency of things to change into their opposites, especially in psychology; the principle that extremes flip.", etymology: "Greek enantios (opposite) + dromos (running, course) → enantiodromia. Root enanti- means 'opposite'. Root drom- means 'running'. Also in: dromedary (built for running), velodrome, hippodrome (horse-running).", example: "Jung saw enantiodromia everywhere — the rigid moralist who becomes a libertine, the zealot who loses faith entirely." },
  { level: 10, word: "Mimesis", pronunciation: "/mɪˈmiːsɪs/", partOfSpeech: "noun", category: "Art", definition: "Imitative representation of the world in art and literature; the action of mimicking; the fundamental artistic impulse.", etymology: "Greek mimesis (imitation) from mimeisthai (to imitate) from mimos (mime, imitator) → mimesis. Root mim- means 'to imitate'. Also in: mime, mimic, mimicry, onomatopoeia (sound-making mimesis).", example: "Aristotle held that mimesis was the basis of all art — that humans are the most imitative of animals and learn by copying." },
  { level: 10, word: "Phronesis", pronunciation: "/frɒˈniːsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "Practical wisdom; the Aristotelian virtue of knowing how to act well in a particular situation — wisdom in action, not in theory.", etymology: "Greek phronein (to think, to be minded) → phronesis. Root phron- means 'mind/practical thought'. Also in: phrenology (skull-thought study — same root, different ambition), schizophrenia (split-mind).", example: "Aristotle distinguished phronesis from theoretical wisdom — you might know all moral philosophy and still not know what to do right now." },
  { level: 10, word: "Paracosm", pronunciation: "/ˈpærəkɒz(ə)m/", partOfSpeech: "noun", category: "Intelligence", definition: "A detailed imaginary world created by a child; an elaborate private universe with its own geography, history, and inhabitants.", etymology: "Greek para- (beside, alongside) + kosmos (order, world) → paracosm. Coined by Ben Vincent (1976). Root kos-/cosm- means 'world/order'. Also in: cosmos, cosmopolitan, microcosm, cosmology.", example: "The Brontë children's paracosm — the shared world of Gondal — fed their writing for decades into adulthood." },
  { level: 10, word: "Apophasis", pronunciation: "/əˈpɒfəsɪs/", partOfSpeech: "noun", category: "Art", definition: "A rhetorical device in which one draws attention to something by claiming not to mention it; raising a subject by denying it.", etymology: "Greek apo- (away, off) + phanai (to speak) → apophasis. Root phan-/phat- means 'to speak'. Also in: apophatic (defining by negation), prophet (speaking before), aphasia (speechlessness), emphasis.", example: "'I won't even mention the emails' is apophasis — the speaker has, of course, just mentioned them with full effect." },
  { level: 10, word: "Plerosis", pronunciation: "/plɪˈrəʊsɪs/", partOfSpeech: "noun", category: "Intelligence", definition: "The process of filling in or completing; in philosophy, the realisation of potentiality into actuality.", etymology: "Greek plērōsis (filling, fullness) from plēroun (to fill) from plērēs (full) → plerosis. Root plēr- means 'full'. Also in: plethora (over-fullness), plenary (fully attended), replenish, complete, complement.", example: "The director saw the final cut not as a finished object but as a plerosis — the gradual filling of a shape she'd seen from the start." },

{ level: 9, word: "Aporia", pronunciation: "/əˈpɔːriə/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A state of puzzlement or impasse, especially an irresolvable internal contradiction in a text or argument.", etymology: "Greek a- (without) + poros (passage) → aporia (impassable path, puzzlement). Root por- means 'passage/way through'. Also in: pore, emporium (a place of passage for trade), poriferous.", example: "The dialogue ends not in a clean answer but in aporia, leaving Socrates and his interlocutor at a genuine loss." },
{ level: 9, word: "Haecceity", pronunciation: "/hɛkˈsiːɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The discrete qualities, properties, or characteristics of a thing which make it a particular 'this' rather than any other.", etymology: "Latin haec (this, feminine) coined by Duns Scotus as haecceitas, 'thisness'. Root hic/haec/hoc means 'this'. Contrast with quiddity (whatness) below.", example: "Twins share every general property, yet philosophers insist each still has its own haecceity, its irreducible thisness." },
{ level: 9, word: "Quiddity", pronunciation: "/ˈkwɪdɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The inherent nature or essence of a thing; 'whatness' as opposed to particular existence.", etymology: "Latin quid (what) → quidditas, 'whatness'. Root quid- means 'what'. Also in: quiddity's opposite-but-paired term haecceity, and in quid pro quo.", example: "The scholastic debate concerned the quiddity of a chair — what makes any chair a chair, regardless of its specific form." },
{ level: 8, word: "Hypostasis", pronunciation: "/haɪˈpɒstəsɪs/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The underlying or essential reality beneath a phenomenon; in theology, a person of the Trinity; in medicine, a settling of fluid.", etymology: "Greek hypo- (under) + stasis (standing) → hypostasis, 'that which stands under'. Root sta- means 'to stand'. Also in: stasis, ecstasy, substance (Latin calque of the same idea).", example: "Theologians argued over whether Christ's two natures shared a single hypostasis or remained distinct." },
{ level: 8, word: "Hypostatize", pronunciation: "/haɪˈpɒstətaɪz/", partOfSpeech: "verb", category: "Metaphysics & Ontology", definition: "To treat or represent an abstract concept as though it were a concrete, independently existing thing.", etymology: "From hypostasis (see above) + verb suffix -ize. Root sta- 'to stand' again underlies the sense of 'making something stand as real'.", example: "Critics accused the economist of hypostatizing 'the market' as if it were a conscious agent with intentions." },
{ level: 9, word: "Reify", pronunciation: "/ˈreɪɪfaɪ/", partOfSpeech: "verb", category: "Metaphysics & Ontology", definition: "To regard or treat an abstraction as if it were a concrete material thing.", etymology: "Latin res (thing) + -fy (to make) → reify, 'to make into a thing'. Root res- means 'thing/matter'. Also in: real, reality, republic (res publica, 'public thing').", example: "Marx argued that capitalism tends to reify human relationships into mere relationships between commodities." },
{ level: 9, word: "Supervenience", pronunciation: "/ˌsuːpərˈviːniəns/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A relation in which higher-level properties depend on and are determined by lower-level properties, without being reducible to them.", etymology: "Latin super- (above) + venire (to come) → supervenire, 'to come upon/follow'. Root ven- means 'to come'. Also in: convene, intervene, advent.", example: "Many philosophers hold that mental states exhibit supervenience on brain states: change the mind, and the brain must have changed too." },
{ level: 9, word: "Epiphenomenon", pronunciation: "/ˌɛpɪfɪˈnɒmɪnən/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A secondary effect or by-product that arises from a process but does not itself causally influence that process.", etymology: "Greek epi- (upon, in addition) + phainomenon (that which appears) → epiphenomenon. Root phain- means 'to show/appear'. Also in: phenomenon, phantom, diaphanous.", example: "Some theorists controversially claim consciousness is merely an epiphenomenon of neural activity, with no causal power of its own." },
{ level: 9, word: "Teleology", pronunciation: "/ˌtɛliˈɒlədʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The explanation of phenomena by their purpose or end goal rather than by prior causes.", etymology: "Greek telos (end, purpose) + logos (study) → teleologia. Root tel- means 'end/purpose'. Also in: telos, teleport (end-point), entelechy.", example: "Aristotle's biology is shot through with teleology: an acorn exists, in his view, for the sake of becoming an oak." },
{ level: 8, word: "Deontology", pronunciation: "/ˌdiːɒnˈtɒlədʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "An ethical theory holding that actions are right or wrong based on rules and duties rather than their consequences.", etymology: "Greek deon (duty, that which is binding) + logos (study) → deontologia. Root de- here means 'binding/necessary'. Also in: deontic (logic of obligation).", example: "Under deontology, lying is wrong even if it produces a better outcome, because duty itself forbids it." },
{ level: 7, word: "Ontology", pronunciation: "/ɒnˈtɒlədʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The branch of philosophy concerned with the nature of being and existence.", etymology: "Greek on/ont- (being, present participle of 'to be') + logos (study). Root es-/ont- means 'to be'. Also in: essence, ontogeny, entity.", example: "Her dissertation in ontology asked what it means for numbers to exist at all." },
{ level: 8, word: "Epistemology", pronunciation: "/ɪˌpɪstɪˈmɒlədʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The branch of philosophy concerned with the nature, sources, and limits of knowledge.", etymology: "Greek episteme (knowledge) + logos (study). Root epi- (upon) + histanai (to set/stand) gives 'standing firmly upon' i.e. sure knowledge. Also in: epistemic.", example: "Epistemology asks not just what we know, but how we can ever be justified in claiming to know it." },
{ level: 8, word: "Phenomenology", pronunciation: "/fɪˌnɒmɪˈnɒlədʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The philosophical study of structures of consciousness and experience as they present themselves to the experiencing subject.", etymology: "Greek phainomenon (appearance) + logos (study). Root phain- means 'to appear'. Also in: phenomenon, epiphenomenon, diaphanous.", example: "Husserl's phenomenology asks us to bracket our assumptions and describe experience exactly as it appears to consciousness." },
{ level: 8, word: "Hermeneutics", pronunciation: "/ˌhɜːrməˈnjuːtɪks/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The theory and methodology of interpretation, especially of texts, scripture, or human action.", etymology: "Greek hermeneuein (to interpret), linked folk-etymologically to Hermes, messenger of the gods. Also in: hermeneutic, hermeneutical circle.", example: "Biblical hermeneutics tries to recover what an ancient text meant to its original audience before asking what it means today." },
{ level: 8, word: "Dialectic", pronunciation: "/ˌdaɪəˈlɛktɪk/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A method of argument proceeding through contradiction and resolution, often via thesis, antithesis, and synthesis.", etymology: "Greek dia- (through, between) + legein (to speak) → dialektike (the art of discussion). Root leg- means 'to speak/gather'. Also in: dialogue, lexicon, logic.", example: "Hegel's dialectic treats history as a process in which each idea generates its own opposite, then a higher synthesis." },
{ level: 9, word: "Noesis", pronunciation: "/noʊˈiːsɪs/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "In phenomenology, the act of perceiving or thinking, the intentional mental act directed at an object.", etymology: "Greek noesis (thought, intelligence), from nous (mind). Root nous- means 'mind/intellect'. Also in: noema, paranoia (mind beside itself).", example: "Husserl distinguishes noesis, the act of perceiving, from noema, the content perceived." },
{ level: 9, word: "Noema", pronunciation: "/noʊˈiːmə/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "In phenomenology, the intended object or content of a mental act, as opposed to the act itself.", etymology: "Greek noema (thought, the thing thought), from nous (mind). Root nous- means 'mind'. Paired conceptually with noesis above.", example: "The noema of my perception of the tree is the tree as-meant, not the physical tree itself." },
{ level: 9, word: "Anamnesis", pronunciation: "/ˌænæmˈniːsɪs/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The recollection or recalling of things from a supposed previous existence; in Plato, the theory that learning is remembering.", etymology: "Greek ana- (back, again) + mnesis (memory) → anamnesis. Root mne- means 'memory'. Also in: amnesia (loss of memory), mnemonic.", example: "For Plato, learning geometry is really an act of anamnesis, the soul recovering truths it knew before birth." },
{ level: 9, word: "Autopoiesis", pronunciation: "/ˌɔːtoʊpɔɪˈiːsɪs/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The capacity of a system, especially a living organism, to maintain and reproduce itself by regenerating its own components.", etymology: "Greek autos (self) + poiesis (making) → autopoiesis, 'self-making'. Root poi- means 'to make'. Also in: poem, poet, poetry.", example: "Maturana and Varela coined autopoiesis to describe how a cell continually rebuilds its own boundaries and structure." },
{ level: 9, word: "Hylomorphism", pronunciation: "/ˌhaɪloʊˈmɔːrfɪzəm/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "Aristotle's theory that every physical object is a compound of matter (hyle) and form (morphe).", etymology: "Greek hyle (matter, wood) + morphe (form) → hylomorphism. Root hyl- means 'matter/wood'; morph- means 'form/shape'. Also in: hylozoism, morphology, metamorphosis.", example: "Under hylomorphism, a bronze statue is matter (bronze) given a particular form (the shape of a horse)." },
{ level: 9, word: "Entelechy", pronunciation: "/ɛnˈtɛləki/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The realization of potential into actuality; a vital force directing growth toward fulfillment of an inherent purpose.", etymology: "Greek en- (in) + telos (end) + echein (to have) → entelecheia, 'having one's end within'. Root tel- means 'end/purpose'. Also in: teleology.", example: "Aristotle described the soul as the entelechy of the body, its actualized purpose and organizing principle." },
{ level: 8, word: "Immanence", pronunciation: "/ˈɪmənəns/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The quality of existing or operating within, rather than beyond, the physical world or a given system.", etymology: "Latin in- (in) + manere (to remain) → immanere, 'to remain within'. Root man- means 'to remain/stay'. Also in: permanent, remain, mansion.", example: "Spinoza's God has pure immanence, existing wholly within nature rather than standing apart from it." },
{ level: 8, word: "Transcendence", pronunciation: "/trænˈsɛndəns/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The quality of existing above or beyond the limits of the physical world or ordinary experience.", etymology: "Latin trans- (across, beyond) + scandere (to climb) → transcendere, 'to climb beyond'. Root scand- means 'to climb'. Also in: ascend, descend, scandal (a stumbling block).", example: "Many religious traditions place God's transcendence in tension with the desire for an immanent, present deity." },
{ level: 9, word: "Intentionality", pronunciation: "/ɪnˌtɛnʃəˈnælɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The property of mental states by which they are directed toward or about objects, events, or states of affairs.", etymology: "Latin intendere (to stretch toward, aim at), from in- + tendere (to stretch). Root tend- means 'to stretch'. Also in: intend, extend, tension.", example: "Belief and desire both exhibit intentionality: a belief is always a belief about something." },
{ level: 9, word: "Noumenon", pronunciation: "/ˈnuːmɪnɒn/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "In Kantian philosophy, a thing as it is in itself, independent of perception, as opposed to how it appears to an observer.", etymology: "Greek nooumenon (that which is thought), from noein (to think). Root nous- means 'mind'. Contrast with phenomenon below.", example: "Kant argued the noumenon, the thing-in-itself, remains forever beyond the reach of human knowledge." },
{ level: 7, word: "Phenomenon", pronunciation: "/fɪˈnɒmɪnən/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A fact, occurrence, or thing as it appears to and is perceived by an observer.", etymology: "Greek phainomenon (that which appears), from phainein (to show). Root phain- means 'to appear/show'. Also in: phenomenology, epiphenomenon, fantasy.", example: "Kant restricted human knowledge to the phenomenon, the world as it appears, never the thing itself." },
{ level: 8, word: "Solipsism", pronunciation: "/ˈsɒlɪpsɪzəm/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The view that the self is all that can be known to exist, and that nothing outside one's own mind is certain.", etymology: "Latin solus (alone) + ipse (self) → solipsism, 'self alone'. Root sol- means 'alone'; ipse- means 'self'. Also in: solitary, solo, ipseity.", example: "Pushed to its extreme, Descartes' doubt risks collapsing into solipsism, in which only one's own mind is certain to exist." },
{ level: 9, word: "Panpsychism", pronunciation: "/pænˈsaɪkɪzəm/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The view that mind or a mind-like quality is a fundamental and ubiquitous feature of all physical matter.", etymology: "Greek pan- (all) + psyche (soul, mind) → panpsychism. Root psych- means 'soul/mind'. Also in: psychology, psyche, pandemic.", example: "Panpsychism suggests that even electrons possess some primitive form of experience, however faint." },
{ level: 9, word: "Eliminativism", pronunciation: "/ɪˌlɪmɪˈneɪtɪvɪzəm/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The position that certain common-sense mental concepts, such as beliefs and desires, do not actually exist and should be eliminated from scientific explanation.", etymology: "Latin eliminare (to expel, e- 'out' + limen 'threshold') → eliminate + -ivism. Root lim- means 'threshold'. Also in: liminal, subliminal, preliminary.", example: "Eliminativism predicts that neuroscience will one day discard 'belief' and 'desire' the way chemistry discarded 'phlogiston'." },
{ level: 9, word: "Mereology", pronunciation: "/ˌmɛriˈɒlədʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The formal study of part-whole relationships and how parts compose larger wholes.", etymology: "Greek meros (part) + logos (study) → mereology. Root mer- means 'part/share'. Also in: mereological, mereotopology, polymer.", example: "Mereology asks under what conditions several scattered objects ever compose a single, larger whole." },
{ level: 9, word: "Mereological", pronunciation: "/ˌmɛriəˈlɒdʒɪkəl/", partOfSpeech: "adjective", category: "Metaphysics & Ontology", definition: "Relating to mereology, the study of part-whole relationships.", etymology: "From mereology (see above) + -ical. Root mer- means 'part'.", example: "Whether a heap of sand survives the removal of one grain is a classic mereological puzzle." },
{ level: 8, word: "Individuation", pronunciation: "/ˌɪndɪˌvɪdʒuˈeɪʃən/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The process or principle by which a thing is distinguished from other things of the same kind as a distinct individual.", etymology: "Latin individuus (indivisible), in- (not) + dividuus (divisible) → individuation. Root div- means 'to divide'. Also in: divide, individual, dividend.", example: "Scholastics debated whether matter alone could account for the individuation of two otherwise identical objects." },
{ level: 7, word: "Universals", pronunciation: "/ˌjuːnɪˈvɜːrsəlz/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "Properties or qualities that can be instantiated by multiple distinct particular things, such as redness or roundness.", etymology: "Latin universalis, from universus (whole, entire), unus (one) + versus (turned) → 'turned into one'. Root vert-/vers- means 'to turn'. Also in: universe, diverse, convert.", example: "The medieval problem of universals asked whether 'redness' exists independently or only in particular red things." },
{ level: 8, word: "Particularity", pronunciation: "/pərˌtɪkjʊˈlærɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The quality of being a single, distinct individual instance rather than a general type or category.", etymology: "Latin particula (small part), diminutive of pars (part) → particularis. Root part- means 'part'. Also in: particle, partial, party.", example: "A novel's strength often lies in its attention to particularity, the unrepeatable texture of one character's life." },
{ level: 7, word: "Contingency", pronunciation: "/kənˈtɪndʒənsi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The status of a fact or event as possible but not necessary; something that could have been otherwise.", etymology: "Latin con- (together) + tangere (to touch) → contingere, 'to happen, befall' (literally 'to touch on all sides'). Root tang- means 'to touch'. Also in: tangent, contact, tangible.", example: "It is a mere contingency that humans evolved with five fingers; evolutionary history could easily have gone otherwise." },
{ level: 7, word: "Necessity", pronunciation: "/nɪˈsɛsɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The status of being unable to be otherwise; that which must be the case in all possible circumstances.", etymology: "Latin necesse (unavoidable), possibly ne- (not) + cedere (to withdraw) → 'that which cannot be withdrawn from'. Root ced- means 'to yield/go'. Also in: cede, proceed, exceed.", example: "Logicians distinguish necessity, truths that hold in every possible world, from mere contingency." },
{ level: 7, word: "Modality", pronunciation: "/moʊˈdælɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A category expressing necessity, possibility, or related qualifications of truth, such as 'must', 'can', or 'might'.", etymology: "Latin modus (measure, manner) + -ality → modality. Root mod- means 'measure/manner'. Also in: mode, model, moderate.", example: "Modal logic studies the modality of statements, classifying them as necessary, possible, or impossible." },
{ level: 7, word: "Essence", pronunciation: "/ˈɛsəns/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The intrinsic nature or indispensable quality that determines what a thing fundamentally is.", etymology: "Latin esse (to be) → essentia, coined as a noun form of 'being'. Root es- means 'to be'. Also in: essential, interest (inter-esse, 'to be between'), present.", example: "Sartre famously claimed that for humans, existence precedes essence: we exist first and define our essence after." },
{ level: 8, word: "Substratum", pronunciation: "/ˈsʌbstrɑːtəm/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "An underlying layer or substance that supports or gives rise to the properties of something built upon it.", etymology: "Latin sub- (under) + stratum (something laid down, from sternere, to spread) → substratum. Root ster-/stra- means 'to spread/lay'. Also in: street, stratosphere, strategy.", example: "Locke posited an unknowable substratum beneath a thing's observable qualities, a bare 'something I know not what'." },
{ level: 9, word: "Facticity", pronunciation: "/fækˈtɪsɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The brute, given conditions of one's existence — body, history, situation — that one did not choose but must live within.", etymology: "Latin factum (thing done, fact), from facere (to make/do) → facticity. Root fac- means 'to make/do'. Also in: fact, factory, manufacture.", example: "Existentialists distinguish freedom from facticity: I can choose my future, but not the body and history I was born into." },
{ level: 9, word: "Alterity", pronunciation: "/ɔːlˈtɛrɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The state or quality of being radically other or different, especially in relation to the self.", etymology: "Latin alter (other) → alteritas. Root alt- means 'other'. Also in: alter, alternative, altruism.", example: "Levinas argued that ethics begins in the encounter with the alterity of another's face, which resists being reduced to sameness." },
{ level: 9, word: "Ipseity", pronunciation: "/ɪpˈsiːɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "Selfhood; the quality of being a distinct, continuous individual self.", etymology: "Latin ipse (self, itself) → ipseitas. Root ips- means 'self'. Also in: solipsism (combining solus + ipse).", example: "Phenomenologists ask whether ipseity, the felt sense of being a self, survives radical changes in memory or body." },
{ level: 9, word: "Aseity", pronunciation: "/eɪˈsiːɪti/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "The property of existing entirely from oneself, independent of any external cause; self-existence, traditionally attributed to God.", etymology: "Latin a se (from oneself) → aseitas. Root se- means 'self/oneself'. Also in: se- prefix in 'separate', 'secure' (without care).", example: "Classical theism holds that God alone possesses aseity, existing by the necessity of his own nature rather than by another's causing." },
{ level: 9, word: "Apodictic", pronunciation: "/ˌæpəˈdɪktɪk/", partOfSpeech: "adjective", category: "Metaphysics & Ontology", definition: "Clearly demonstrated or necessarily and incontrovertibly true; beyond rational dispute.", etymology: "Greek apo- (from) + deiknynai (to show) → apodeiktikos, 'demonstrative'. Root deik- means 'to show'. Also in: paradigm, indicate, dictionary (different root but related sense of 'showing/telling').", example: "Kant treated mathematical truths as apodictic, certain beyond any possibility of empirical refutation." },
{ level: 9, word: "Eidetic", pronunciation: "/aɪˈdɛtɪk/", partOfSpeech: "adjective", category: "Metaphysics & Ontology", definition: "Relating to mental images of unusual vividness and detail; in phenomenology, pertaining to the essential structure (eidos) of a thing.", etymology: "Greek eidos (form, that which is seen) → eidetikos. Root eid-/id- means 'to see/form'. Also in: idea, idol, kaleidoscope.", example: "Husserl's eidetic reduction strips away accidental detail to grasp the essential eidos of an experience." },
{ level: 8, word: "Propaedeutic", pronunciation: "/ˌproʊpiːˈdjuːtɪk/", partOfSpeech: "adjective", category: "Metaphysics & Ontology", definition: "Serving as a preliminary instruction or introduction to a subject of more advanced study.", etymology: "Greek pro- (before) + paideuein (to teach), from pais (child) → propaideutikos. Root paid- means 'child/teaching'. Also in: pedagogy, pediatric, encyclopedia.", example: "Kant considered the Critique of Pure Reason propaedeutic, clearing the ground before any future metaphysics could be built." },
{ level: 9, word: "Parousia", pronunciation: "/pəˈruːziə/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "Presence or arrival, especially the theological doctrine of the Second Coming of Christ; in philosophy, full presence to oneself.", etymology: "Greek para- (beside) + ousia (being, essence) → parousia, 'being-beside, presence'. Root es-/ous- means 'to be'. Also in: ousia, essence.", example: "Derrida criticized the entire Western tradition for privileging parousia, the metaphysics of full presence." },
{ level: 9, word: "Apophatic", pronunciation: "/ˌæpəˈfætɪk/", partOfSpeech: "adjective", category: "Metaphysics & Ontology", definition: "Describing or approaching the divine by negation, stating what it is not rather than what it is.", etymology: "Greek apo- (away from) + phanai (to speak) → apophatikos, 'denying'. Root pha- means 'to speak'. Also in: cataphatic (its opposite), phone, blasphemy.", example: "Apophatic theology insists God cannot be positively described, only approached through statements of what God is not." },
{ level: 9, word: "Cataphatic", pronunciation: "/ˌkætəˈfætɪk/", partOfSpeech: "adjective", category: "Metaphysics & Ontology", definition: "Describing or approaching the divine through positive affirmations and attributes.", etymology: "Greek kata- (down, according to) + phanai (to speak) → kataphatikos, 'affirming'. Root pha- means 'to speak'. Contrast with apophatic above.", example: "Where apophatic theology denies, cataphatic theology speaks confidently of God as good, wise, and loving." },
{ level: 9, word: "Syzygy", pronunciation: "/ˈsɪzɪdʒi/", partOfSpeech: "noun", category: "Metaphysics & Ontology", definition: "A conjunction or alignment of paired opposites into a unified whole; in astronomy, the alignment of three celestial bodies.", etymology: "Greek syn- (together) + zygon (yoke) → syzygia, 'yoked together'. Root zyg- means 'yoke'. Also in: zygote, conjugate, jugular (the 'yoke' of muscles in the neck).", example: "Jung described psychic wholeness as a syzygy, a union of the masculine and feminine principles within the self." },

{ level: 8, word: "Abduction", pronunciation: "/æbˈdʌkʃən/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A form of logical inference that seeks the simplest and most likely explanation for an observation.", etymology: "Latin ab- (away) + ducere (to lead) → abducere, 'to lead away'. Root duc- means 'to lead'. Also in: deduction, induction, conduct.", example: "Seeing wet streets, you might use abduction to infer it rained, even though sprinklers remain a less likely alternative." },
{ level: 7, word: "Deduction", pronunciation: "/dɪˈdʌkʃən/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "Reasoning from general premises to a specific, logically certain conclusion.", etymology: "Latin de- (down, from) + ducere (to lead) → deducere, 'to lead down/away'. Root duc- means 'to lead'. Also in: induct, conduct, aqueduct.", example: "From the premises that all mammals breathe air and whales are mammals, deduction guarantees whales breathe air." },
{ level: 7, word: "Induction", pronunciation: "/ɪnˈdʌkʃən/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "Reasoning from specific observations to a general conclusion, which is probable but not logically certain.", etymology: "Latin in- (into) + ducere (to lead) → inducere, 'to lead into'. Root duc- means 'to lead'. Also in: deduce, conductor, viaduct.", example: "Having seen a thousand white swans, early naturalists used induction to conclude, wrongly, that all swans are white." },
{ level: 8, word: "Syllogism", pronunciation: "/ˈsɪlədʒɪzəm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A form of deductive reasoning consisting of a major premise, a minor premise, and a conclusion.", etymology: "Greek syn- (together) + logizesthai (to reason), from logos (reason) → syllogismos, 'a reckoning together'. Root leg-/log- means 'to speak/reason'. Also in: logic, dialogue, analogy.", example: "The classic syllogism runs: all men are mortal, Socrates is a man, therefore Socrates is mortal." },
{ level: 9, word: "Enthymeme", pronunciation: "/ˈɛnθɪmiːm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A syllogism in which one premise is left unstated because it is assumed to be obvious.", etymology: "Greek en- (in) + thymos (mind) → enthymema, 'something in the mind'. Root thym- means 'mind/spirit'. Also in: enthymematic.", example: "'He's a politician, so don't trust him' is an enthymeme, leaving unstated the premise that politicians are untrustworthy." },
{ level: 7, word: "Tautology", pronunciation: "/tɔːˈtɒlədʒi/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A statement that is true by virtue of its logical form alone, often through needless repetition of the same idea.", etymology: "Greek tauto (the same) + logos (word) → tautologia, 'saying the same thing'. Root taut- means 'same'; log- means 'word'. Also in: tautonym, logic.", example: "'Either it will rain tomorrow or it will not' is a tautology, true no matter what the weather does." },
{ level: 9, word: "Antinomy", pronunciation: "/ænˈtɪnəmi/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A contradiction between two principles or conclusions that both seem rationally compelled.", etymology: "Greek anti- (against) + nomos (law) → antinomia, 'against the law'. Root nom- means 'law/custom'. Also in: autonomy, economy, antinomian.", example: "Kant's antinomies show reason arriving at equally valid proofs both that the universe had a beginning and that it did not." },
{ level: 7, word: "Paradox", pronunciation: "/ˈpærədɒks/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A statement or situation that seems self-contradictory or absurd yet may express an underlying truth.", etymology: "Greek para- (contrary to) + doxa (opinion) → paradoxon, 'contrary to expectation'. Root dok-/dox- means 'opinion/belief'. Also in: orthodox, doctrine, dogma.", example: "The liar's paradox, 'this sentence is false,' resists any consistent assignment of truth or falsity." },
{ level: 7, word: "Axiom", pronunciation: "/ˈæksiəm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A statement accepted as self-evidently true without proof, used as a starting point for further reasoning.", etymology: "Greek axioma (that which is thought fitting), from axios (worthy) → axioma. Root ag- means 'to weigh/lead', underlying 'worth'. Also in: axiomatic, axiology.", example: "Euclid built all of plane geometry from just five axioms, including the famous parallel postulate." },
{ level: 8, word: "Corollary", pronunciation: "/ˈkɒrəlɛri/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A proposition that follows readily from one already proved, requiring little or no additional proof.", etymology: "Latin corollarium (a gratuity, garland given as a bonus), from corolla (small garland). Root cor- (related to corona, 'crown') gives the sense of an added 'extra'. Also in: corolla, corona.", example: "It is a direct corollary of the Pythagorean theorem that the hypotenuse is always the longest side of a right triangle." },
{ level: 8, word: "Lemma", pronunciation: "/ˈlɛmə/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A subsidiary or intermediate proposition proved as a stepping stone toward a more significant theorem.", etymology: "Greek lemma (something taken or assumed), from lambanein (to take) → lemma. Root lab-/lem- means 'to take/grasp'. Also in: dilemma (two things taken/assumed), syllable.", example: "The proof of the main theorem relies on a technical lemma established several pages earlier." },
{ level: 8, word: "Isomorphism", pronunciation: "/ˌaɪsoʊˈmɔːrfɪzəm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A structure-preserving one-to-one correspondence between two mathematical systems or objects.", etymology: "Greek isos (equal) + morphe (form) → isomorphism, 'equal form'. Root morph- means 'form/shape'. Also in: morphology, metamorphosis, homomorphism.", example: "There is an isomorphism between the additive group of integers and the group of even integers under addition." },
{ level: 8, word: "Homomorphism", pronunciation: "/ˌhoʊmoʊˈmɔːrfɪzəm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A structure-preserving map between two algebraic systems that need not be one-to-one.", etymology: "Greek homos (same) + morphe (form) → homomorphism, 'same form'. Root morph- means 'form'. Also in: homogeneous, homonym, isomorphism.", example: "Every isomorphism is a homomorphism, but not every homomorphism is invertible enough to be called an isomorphism." },
{ level: 8, word: "Bijection", pronunciation: "/baɪˈdʒɛkʃən/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A function between two sets that is both one-to-one (injective) and onto (surjective), pairing every element exactly once.", etymology: "Latin bi- (two) + jacere (to throw) → 'a two-way throw'. Root jac-/ject- means 'to throw'. Also in: project, inject, surjection.", example: "Cantor used a bijection between the natural numbers and the even numbers to show both sets have the same size." },
{ level: 8, word: "Surjection", pronunciation: "/sərˈdʒɛkʃən/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A function in which every element of the target set is mapped to by at least one element of the source set.", etymology: "French sur- (over, onto) + Latin jacere (to throw) → surjection, 'a throw onto'. Root ject- means 'to throw'. Also in: project, eject, bijection.", example: "A surjection from students to grades ensures every possible grade is actually given to someone." },
{ level: 8, word: "Injection", pronunciation: "/ɪnˈdʒɛkʃən/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A function that maps distinct elements of the source set to distinct elements of the target set, with no two inputs sharing an output.", etymology: "Latin in- (into) + jacere (to throw) → injicere, 'to throw into'. Root ject- means 'to throw'. Also in: project, reject, surjection.", example: "An injection guarantees no two different students are assigned the same locker number." },
{ level: 8, word: "Idempotence", pronunciation: "/ˌaɪdəmˈpoʊtəns/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of an operation such that applying it multiple times produces the same result as applying it once.", etymology: "Latin idem (the same) + potens (powerful, able) → idempotent, 'having the same power'. Root pot- means 'power/able'. Also in: potent, potential, omnipotent.", example: "Taking the absolute value twice has idempotence, since |x| applied again just returns |x|." },
{ level: 8, word: "Commutativity", pronunciation: "/kəˌmjuːtəˈtɪvɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of an operation whereby changing the order of the operands does not change the result.", etymology: "Latin com- (together) + mutare (to change) → commutare, 'to interchange'. Root mut- means 'to change'. Also in: mutate, mutual, transmute.", example: "Addition has commutativity, since 3 + 5 yields the same result as 5 + 3." },
{ level: 8, word: "Associativity", pronunciation: "/əˌsoʊsiəˈtɪvɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of an operation whereby the grouping of operands does not affect the result.", etymology: "Latin ad- (to) + socius (companion) → associare, 'to join with'. Root soc- means 'companion'. Also in: associate, society, social.", example: "Because multiplication has associativity, (2 × 3) × 4 equals 2 × (3 × 4)." },
{ level: 8, word: "Distributivity", pronunciation: "/dɪˌstrɪbjʊˈtɪvɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property whereby one operation distributes over another, as multiplication distributes over addition.", etymology: "Latin dis- (apart) + tribuere (to allot) → distribuere, 'to deal out'. Root trib- means 'to allot/give'. Also in: tribute, contribute, attribute.", example: "Distributivity lets us rewrite 2 × (3 + 4) as (2 × 3) + (2 × 4)." },
{ level: 8, word: "Reflexivity", pronunciation: "/rɪˌflɛkˈsɪvɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of a relation whereby every element relates to itself.", etymology: "Latin re- (back) + flectere (to bend) → reflexivus, 'bending back'. Root flect-/flex- means 'to bend'. Also in: reflect, flexible, deflect.", example: "Equality has reflexivity, since every number is always equal to itself." },
{ level: 7, word: "Symmetry", pronunciation: "/ˈsɪmɪtri/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A balanced correspondence between parts, or in logic, a relation where if A relates to B, then B relates to A.", etymology: "Greek syn- (together) + metron (measure) → symmetria, 'common measure'. Root metr- means 'measure'. Also in: metric, geometry, asymmetry.", example: "Equality has symmetry: if a equals b, then b must equal a." },
{ level: 7, word: "Asymmetry", pronunciation: "/eɪˈsɪmɪtri/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The lack of balanced correspondence; in logic, a relation where if A relates to B, B cannot relate to A.", etymology: "Greek a- (not) + symmetria (symmetry) → asymmetria. Root metr- means 'measure'. Also in: symmetry, metric, perimeter.", example: "'Greater than' exhibits asymmetry: if 5 is greater than 3, 3 cannot be greater than 5." },
{ level: 8, word: "Transitivity", pronunciation: "/trænˈzɪtɪvɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of a relation whereby if A relates to B and B relates to C, then A relates to C.", etymology: "Latin trans- (across) + ire (to go) → transire, 'to go across'. Root i- means 'to go'. Also in: transit, transition, exit.", example: "Because of transitivity, if Alice is taller than Bob and Bob is taller than Carl, Alice must be taller than Carl." },
{ level: 9, word: "Decidability", pronunciation: "/dɪˌsaɪdəˈbɪlɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of a problem or system whereby an algorithm exists to determine, in finite time, whether any given statement is true.", etymology: "Latin de- (off) + caedere (to cut) → decidere, 'to cut off, decide'. Root caed-/cid- means 'to cut'. Also in: decide, incision, suicide.", example: "Gödel's results showed that arithmetic lacks full decidability: some true statements can never be proven within the system." },
{ level: 9, word: "Computability", pronunciation: "/kəmˌpjuːtəˈbɪlɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of a function or problem whereby it can be solved by a well-defined algorithm in a finite number of steps.", etymology: "Latin com- (together) + putare (to reckon) → computare, 'to calculate'. Root put- means 'to think/reckon'. Also in: compute, dispute, reputation.", example: "Turing's halting problem demonstrates a clear limit to computability: no algorithm can decide, in general, whether a program will halt." },
{ level: 8, word: "Cardinality", pronunciation: "/ˌkɑːrdɪˈnælɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The measure of the number of elements in a set, including infinite sets of differing sizes.", etymology: "Latin cardo (hinge) → cardinalis (principal, on which something hinges) → cardinality. Root card- means 'hinge'. Also in: cardinal, cardinal number.", example: "Cantor proved that the cardinality of the real numbers is strictly greater than that of the natural numbers." },
{ level: 8, word: "Ordinality", pronunciation: "/ˌɔːrdɪˈnælɪti/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The property of numbers or sets concerned with order or rank rather than quantity.", etymology: "Latin ordo (order, row) → ordinalis → ordinality. Root ord- means 'order/row'. Also in: order, ordinal, coordinate.", example: "First, second, and third express ordinality, while one, two, and three express mere cardinality." },
{ level: 8, word: "Infinitesimal", pronunciation: "/ˌɪnfɪnɪˈtɛsɪməl/", partOfSpeech: "adjective", category: "Logic, Math & Epistemology", definition: "Extremely or immeasurably small, especially a quantity closer to zero than any positive real number yet not itself zero.", etymology: "Latin in- (not) + finitus (finished, bounded) → infinitus (unbounded) + -esimal (ordinal suffix as in 'centesimal') → infinitesimal. Root fin- means 'end/boundary'. Also in: finite, define, finish.", example: "Leibniz built his calculus on the controversial notion of the infinitesimal, a quantity smaller than any finite number but greater than zero." },
{ level: 8, word: "Asymptote", pronunciation: "/ˈæsɪmptoʊt/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A line that a curve approaches ever more closely but never actually meets.", etymology: "Greek a- (not) + syn- (together) + piptein (to fall) → asymptotos, 'not falling together'. Root pet-/pt- means 'to fall'. Also in: symptom, asymptotic.", example: "As x grows larger, the curve hugs its horizontal asymptote but never quite touches it." },
{ level: 9, word: "Eigenvalue", pronunciation: "/ˈaɪɡənˌvæljuː/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A scalar associated with a linear transformation that indicates how much an eigenvector is stretched or shrunk by that transformation.", etymology: "German eigen (own, characteristic) + English value → eigenvalue. Root eigen- means 'own/characteristic'. Also in: eigenvector, eigenstate.", example: "A matrix's eigenvalue tells you the factor by which it scales its corresponding eigenvector, without changing its direction." },
{ level: 9, word: "Eigenvector", pronunciation: "/ˈaɪɡənˌvɛktər/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A nonzero vector that changes only by a scalar factor when a particular linear transformation is applied to it.", etymology: "German eigen (own, characteristic) + Latin vector (carrier, from vehere, to carry) → eigenvector. Root eigen- means 'own'; veh- means 'to carry'. Also in: vehicle, convey, eigenvalue.", example: "In Google's PageRank algorithm, the ranking of web pages comes from the dominant eigenvector of a giant link matrix." },
{ level: 8, word: "Manifold", pronunciation: "/ˈmænɪfoʊld/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A topological space that locally resembles ordinary Euclidean space near each point, though it may be globally curved or complex.", etymology: "Old English manig (many) + feald (fold) → manigfeald, 'many folds'. Root man- (many) + fald- (fold). Also in: fold, twofold, threshold.", example: "The surface of the Earth is a manifold: locally it looks flat, even though globally it curves into a sphere." },
{ level: 8, word: "Topology", pronunciation: "/təˈpɒlədʒi/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "The branch of mathematics concerned with properties of space that are preserved under continuous deformation, such as stretching or bending.", etymology: "Greek topos (place) + logos (study) → topologia. Root top- means 'place'. Also in: utopia (no-place), topic, topography.", example: "To a topologist, a coffee cup and a doughnut are equivalent, since each has exactly one hole." },
{ level: 9, word: "Homeomorphism", pronunciation: "/ˌhoʊmiəˈmɔːrfɪzəm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "A continuous, invertible function between two topological spaces with a continuous inverse, establishing topological equivalence.", etymology: "Greek homoios (similar) + morphe (form) → homeomorphism, 'similar form'. Root morph- means 'form'. Also in: homomorphism, isomorphism, metamorphosis.", example: "A homeomorphism between a square and a circle shows they share the same essential topological structure." },
{ level: 8, word: "Morphism", pronunciation: "/ˈmɔːrfɪzəm/", partOfSpeech: "noun", category: "Logic, Math & Epistemology", definition: "In category theory, a structure-preserving map between two mathematical objects.", etymology: "Greek morphe (form) + -ism → morphism. Root morph- means 'form/shape'. Also in: isomorphism, metamorphosis, amorphous.", example: "Category theory treats objects and the morphisms between them as more fundamental than the objects' internal structure." },
