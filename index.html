{ level: 9, word: "Logomachy", pronunciation: "/loʊˈɡɒməki/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A dispute over words or their meaning, especially one in which the underlying substantive issue is trivial or merely verbal.", etymology: "Greek logos (word) + makhe (battle) → logomachia, 'a battle of words'. Root leg-/log- means 'word'; makh- means 'battle'. Also in: logic, naumachia (mock naval battle).", example: "What seemed like a deep philosophical dispute turned out to be mere logomachy, two sides using the same word differently." },
{ level: 9, word: "Logology", pronunciation: "/loʊˈɒlədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The study of words and language as a self-contained system; also, in theology, discourse concerning the divine Logos.", etymology: "Greek logos (word) + logos (study, redoubled) → logology. Root leg-/log- means 'word/reason'. Also in: logic, dialogue, etymology.", example: "Kenneth Burke's logology examines how language itself shapes and constrains human thought and motive." },
{ level: 8, word: "Logos", pronunciation: "/ˈloʊɡɒs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "Reasoned discourse or rational principle; in rhetoric, appeal to logic; in theology, the divine creative Word.", etymology: "Greek logos (word, reason, account), from legein (to speak, gather, reckon). Root leg-/log- means 'to speak/reason'. Also in: logic, dialogue, biology.", example: "Aristotle's three modes of persuasion are ethos, pathos, and logos, the last appealing directly to reason." },
{ level: 9, word: "Metanoia", pronunciation: "/ˌmɛtəˈnɔɪə/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A profound transformative change of mind, heart, or spiritual orientation, often involving repentance.", etymology: "Greek meta- (change) + nous (mind) → metanoia, 'a change of mind'. Root nous- means 'mind'. Also in: paranoia, noesis, noema.", example: "The novel's climax hinges on the protagonist's metanoia, a wrenching reversal of his entire moral outlook." },
{ level: 9, word: "Metaxy", pronunciation: "/mɛˈtæksi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The in-between state of human existence, situated between the divine and the mortal, ignorance and knowledge, as described in Platonic philosophy.", etymology: "Greek metaxy (between, in the middle). Root meta- means 'between/after'. Rare root confined mostly to Platonic scholarship.", example: "Plato's Symposium describes Eros as dwelling in the metaxy, the tensed middle ground between wisdom and ignorance." },
{ level: 9, word: "Methexis", pronunciation: "/mɛˈθɛksɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Platonic philosophy, the relationship by which particular things participate in or share the nature of an eternal Form.", etymology: "Greek metekhein (to partake, share), from meta- (with) + ekhein (to have) → methexis, 'participation'. Root ekh- means 'to have/hold'. Rare root confined to Platonic terminology.", example: "Plato's theory of methexis explains how a beautiful object relates to the eternal Form of Beauty by partaking in it." },
{ level: 9, word: "Monadology", pronunciation: "/ˌmoʊnəˈdɒlədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "Leibniz's metaphysical theory that reality is composed of indivisible, simple, soul-like substances called monads.", etymology: "Greek monas (unit, from monos, alone) + logos (study) → monadology, title of Leibniz's 1714 treatise. Root mon- means 'one/alone'. Also in: monism, monastery, monad.", example: "Leibniz's monadology proposes that the universe consists of countless monads, each reflecting the whole from its own unique perspective." },
{ level: 9, word: "Monogenesis", pronunciation: "/ˌmɒnoʊˈdʒɛnɪsɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The theory that all members of a category, such as human languages or species, descend from a single common origin.", etymology: "Greek monos (one) + genesis (origin, birth) → monogenesis, 'single origin'. Root gen- means 'birth/origin'. Also in: genetics, generate, polygenesis.", example: "Most linguists now favor monogenesis for the world's language families, tracing them back to a small number of ancestral tongues." },
{ level: 9, word: "Multivocity", pronunciation: "/ˌmʌltɪˈvɒsɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The quality of having multiple distinct meanings or senses, especially when applied to the same term across different contexts.", etymology: "Latin multi- (many) + vox/voc- (voice) → multivocity, 'many voices'. Root voc- means 'voice'. Also in: vocal, univocity, equivocation.", example: "The multivocity of the word 'love' makes it difficult to pin down what exactly a given philosopher means by it." },
{ level: 9, word: "Noetics", pronunciation: "/noʊˈɛtɪks/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The branch of philosophy or psychology concerned with the intellect and the activity of pure thought or intuitive understanding.", etymology: "Greek nous (mind) + -ics (study) → noetics. Root nous- means 'mind/intellect'. Also in: noesis, noema, paranoia.", example: "Noetics explores how the mind grasps abstract, non-sensory truths directly through pure intellectual insight." },
{ level: 9, word: "Nomothetic", pronunciation: "/ˌnɒmoʊˈθɛtɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to the formulation of general scientific laws applicable across many cases, as opposed to studying individual instances.", etymology: "Greek nomos (law) + tithenai (to place, establish) → nomothetikos, 'law-giving'. Root the- means 'to place'; nom- means 'law'. Also in: idiographic (contrast), thesis, antithesis.", example: "Physics is a paradigmatically nomothetic science, seeking universal laws that hold across every individual case." },
{ level: 9, word: "Noology", pronunciation: "/noʊˈɒlədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The study of mind, intellect, and the nature of thought as a distinct philosophical domain.", etymology: "Greek nous (mind) + logos (study) → noology. Root nous- means 'mind'. Also in: noetics, noema, paranoia.", example: "Kant's noology investigates the categories the mind necessarily brings to bear on any possible experience." },
{ level: 9, word: "Ontogeny", pronunciation: "/ɒnˈtɒdʒəni/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The development of an individual organism from its earliest stage to maturity.", etymology: "Greek on/ont- (being) + genesis (origin, birth) → ontogeny, 'origin of being'. Root es-/ont- means 'to be'; gen- means 'birth'. Also in: ontology, genetics, phylogeny.", example: "The famous, now largely discredited slogan 'ontogeny recapitulates phylogeny' claimed individual development mirrors evolutionary history." },
{ level: 9, word: "Ontogenesis", pronunciation: "/ˌɒntoʊˈdʒɛnɪsɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The process by which an organism originates and develops, synonymous with ontogeny but emphasizing the originating process itself.", etymology: "Greek on/ont- (being) + genesis (origin) → ontogenesis. Root ont- means 'being'; gen- means 'origin'. Also in: ontogeny, genesis, genetics.", example: "Developmental biology studies ontogenesis at the cellular level, tracing how a single fertilized egg becomes a complex organism." },
{ level: 9, word: "Ontotheology", pronunciation: "/ˌɒntoʊθiˈɒlədʒi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A term, often critical, for metaphysics that treats God as the highest being among beings rather than as Being itself.", etymology: "Greek on/ont- (being) + theos (god) + logos (study) → ontotheology, term used by Kant and especially Heidegger. Root ont- means 'being'; the- means 'god'.", example: "Heidegger criticized the entire Western metaphysical tradition as ontotheology, reducing God to merely the supreme entity among others." },
{ level: 9, word: "Ousia", pronunciation: "/ˈuːsiə/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "Being or essence in Greek philosophy, the underlying substance or reality of a thing.", etymology: "Greek ousia (being, essence), present participle of einai (to be). Root es-/ous- means 'to be'. Also in: parousia, homoousios, essence.", example: "Aristotle's central metaphysical question concerns ousia: what does it mean for something to be a substance at all?" },
{ level: 9, word: "Overdetermination", pronunciation: "/ˌoʊvərdɪˌtɜːrmɪˈneɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A situation in which an event has more independently sufficient causes than necessary to bring it about.", etymology: "Latin super- (over) + de- (completely) + terminare (to limit) → overdetermination. Root term- means 'boundary/limit'. Also in: determine, terminal, underdetermination.", example: "If two snipers fire simultaneously and either shot alone would have been fatal, the death is a case of overdetermination." },
{ level: 8, word: "Pareidolia", pronunciation: "/ˌpærɪˈdoʊliə/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The tendency to perceive a specific, often meaningful pattern, such as a face, in random or ambiguous visual stimuli.", etymology: "Greek para- (beside, faulty) + eidolon (image, from eidos, form) → pareidolia, 'faulty image'. Root eid-/id- means 'to see/form'. Also in: idol, eidetic, eidolon.", example: "Seeing a face in the front grille of a car is a common instance of pareidolia." },
{ level: 9, word: "Perlocution", pronunciation: "/ˌpɜːrloʊˈkjuːʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The actual effect produced on a listener by an utterance, such as persuading, frightening, or inspiring them, as distinct from the act of saying it.", etymology: "Latin per- (through) + loqui (to speak) → perlocution, term coined by J. L. Austin. Root loqu- means 'to speak'. Also in: illocution, locution, eloquent.", example: "Whether a warning actually scares someone into compliance is its perlocution, distinct from the illocutionary act of warning itself." },
{ level: 9, word: "Perlocutionary", pronunciation: "/ˌpɜːrloʊˈkjuːʃəneri/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to the actual effect an utterance has on its listener, beyond the act of merely saying it.", etymology: "From perlocution (see above) + -ary. Root loqu- means 'to speak'.", example: "Persuading someone to change their vote is the perlocutionary effect of a political speech, separate from its illocutionary force as an argument." },
{ level: 9, word: "Locutionary", pronunciation: "/loʊˈkjuːʃəneri/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to the basic act of producing a meaningful utterance, the literal saying of words with sense and reference.", etymology: "Latin loqui (to speak) → locutio (a speaking) → locutionary, term used by J. L. Austin. Root loqu- means 'to speak'. Also in: illocutionary, eloquent, soliloquy.", example: "The locutionary content of 'the door is open' is simply the literal claim that the door is open, regardless of why it was said." },
{ level: 9, word: "Performative", pronunciation: "/pərˈfɔːrmətɪv/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Describing an utterance that performs the very action it names, such as 'I promise' or 'I apologize', rather than merely describing it.", etymology: "Latin per- (through) + formare (to form) → performare → performative, term coined by J. L. Austin. Root form- means 'to form'. Also in: perform, formula, constative.", example: "Saying 'I christen this ship' is performative: the utterance itself accomplishes the act of naming, rather than reporting on it." },
{ level: 9, word: "Constative", pronunciation: "/kənˈsteɪtɪv/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Describing an utterance that merely states or describes a fact and can be assessed as true or false, as opposed to a performative utterance.", etymology: "Latin constare (to stand together, be evident), from con- + stare (to stand) → constative, coined by J. L. Austin. Root sta- means 'to stand'. Also in: constant, instant, performative.", example: "'It is raining' is a constative statement, capable of being true or false, unlike the performative 'I promise to bring an umbrella.'" },
{ level: 8, word: "Polysemy", pronunciation: "/pəˈlɪsɪmi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The coexistence of multiple related meanings within a single word or phrase.", etymology: "Greek poly- (many) + sema (sign) → polysemia, 'many signs'. Root sem- means 'sign'. Also in: semantics, semiotics, sememe.", example: "The word 'bright' shows polysemy, covering both luminous light and quick intelligence in closely related senses." },
{ level: 9, word: "Prehension", pronunciation: "/prɪˈhɛnʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In process philosophy, the basic way an entity grasps and incorporates aspects of other entities into its own experience.", etymology: "Latin prehendere (to seize, grasp) → prehensio → prehension. Root hend-/prehend- means 'to seize/grasp'. Also in: comprehend, apprehend, prehensile.", example: "Whitehead's process philosophy treats prehension as the basic relational act by which every event takes account of past events." },
{ level: 9, word: "Preterition", pronunciation: "/ˌprɛtəˈrɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A rhetorical device drawing attention to something by claiming to pass over or ignore it; in theology, the passing-over of the non-elect in predestination.", etymology: "Latin praeter- (past, beyond) + ire (to go) → praeteritio, 'a passing by' → preterition. Root i- means 'to go'. Also in: preterite (past tense), itinerary.", example: "Calvinist theology distinguishes reprobation from mere preterition, the simple passing-over of those not chosen for salvation." },
{ level: 9, word: "Prohairesis", pronunciation: "/proʊhaɪˈriːsɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Stoic and Aristotelian ethics, the faculty of deliberate moral choice that defines a person's character and is held to be fully within their control.", etymology: "Greek pro- (before) + hairesis (a choosing, taking), from haireisthai (to choose) → prohairesis, 'a choosing beforehand'. Root hair- means 'to take/choose'. Also in: heresy (a choosing of belief).", example: "Epictetus taught that one's prohairesis, the capacity for deliberate moral choice, is the one thing truly within a person's power." },
{ level: 9, word: "Prolepsis", pronunciation: "/proʊˈlɛpsɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A rhetorical or narrative technique of anticipating and addressing an objection before it is raised, or flashing forward to a future event in a narrative.", etymology: "Greek pro- (before) + lambanein (to take) → prolepsis, 'a taking beforehand, anticipation'. Root lab-/lep- means 'to take'. Also in: epilepsy, catalepsy.", example: "The novel's opening chapter uses prolepsis, briefly revealing the protagonist's eventual death before circling back to her childhood." },
{ level: 9, word: "Protasis", pronunciation: "/ˈproʊtəsɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The clause expressing the condition in a conditional sentence, typically introduced by 'if'.", etymology: "Greek pro- (before) + teinein (to stretch) → protasis, 'a stretching forth, premise'. Root ten- means 'to stretch'. Also in: apodosis (the consequence clause), tension.", example: "In 'if it rains, we'll stay home', the protasis is 'if it rains', and the apodosis is 'we'll stay home'." },
{ level: 9, word: "Pseudepigraphy", pronunciation: "/ˌsuːdɪˈpɪɡrəfi/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The practice of falsely attributing a text to an author other than its true writer, often a revered or ancient figure.", etymology: "Greek pseudes (false) + epigraphein (to inscribe) → pseudepigraphos, 'falsely titled' → pseudepigraphy. Root graph- means 'to write'. Also in: pseudonym, epigraph, autograph.", example: "Several New Testament epistles are widely suspected by scholars of being products of pseudepigraphy, written under a famous apostle's name." },
{ level: 7, word: "Qualia", pronunciation: "/ˈkwɑːliə/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The subjective, felt qualities of conscious experience, such as the redness of red or the painfulness of pain.", etymology: "Latin qualis (of what kind) → qualia, plural of quale. Root qual- means 'of what kind'. Also in: quality, quale, qualify.", example: "Philosophers debate whether qualia, the raw feel of experience, could ever be fully captured by a physical description of the brain." },
{ level: 9, word: "Quatenus", pronunciation: "/ˈkweɪtɪnəs/", partOfSpeech: "adverb", category: "Specialized Philosophy & Logic", definition: "A Latin scholastic term meaning 'insofar as' or 'to the extent that', used to qualify the precise respect in which a claim applies.", etymology: "Latin quatenus (how far, to what extent), from quam (how) + tenus (as far as) → quatenus. Root ten- relates to 'extent/stretch'. Rare root confined to scholastic Latin.", example: "Scholastics often specified that a substance is good quatenus it actualizes its proper form, not in every respect indiscriminately." },
{ level: 8, word: "Reductio", pronunciation: "/rɪˈdʌktioʊ/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A method of argument, short for reductio ad absurdum, that disproves a claim by showing it leads to an absurd or contradictory conclusion.", etymology: "Latin reducere (to lead back) → reductio, 'a leading back' → reductio ad absurdum, 'leading back to absurdity'. Root duc- means 'to lead'. Also in: reduce, deduce, induce.", example: "She offered a quick reductio: if his principle were true, it would justify obviously monstrous conclusions, so the principle must be false." },
{ level: 9, word: "Retroduction", pronunciation: "/ˌrɛtroʊˈdʌkʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A form of reasoning, closely related to abduction, that infers the most plausible hypothesis capable of explaining an observed fact.", etymology: "Latin retro- (backward) + ducere (to lead) → retroduction, 'a leading back'. Root duc- means 'to lead'. Also in: abduction, deduction, induction.", example: "Charles Peirce sometimes used retroduction interchangeably with abduction to describe inference to the best explanation." },
{ level: 8, word: "Sapience", pronunciation: "/ˈseɪpiəns/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "Wisdom, deep understanding, or the capacity for higher-order rational thought characteristic of humans.", etymology: "Latin sapere (to taste, be wise) → sapientia → sapience. Root sap- means 'to taste/know'. Also in: sapient, Homo sapiens, savor.", example: "The term Homo sapiens itself appeals to humanity's distinguishing sapience, our capacity for wise, reflective thought." },
{ level: 9, word: "Scholion", pronunciation: "/ˈskoʊliɒn/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "An explanatory note or marginal comment on a classical or scholarly text, especially from ancient or medieval manuscripts.", etymology: "Greek skholion, diminutive of skhole (leisure, school) → scholion. Root skhol- means 'leisure/school'. Also in: scholastic, school, scholar.", example: "A medieval scholion preserved in the manuscript margin offers a crucial clue to how ancient readers understood the passage." },
{ level: 9, word: "Semiosis", pronunciation: "/ˌsiːmiˈoʊsɪs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The process by which signs function to produce or convey meaning.", etymology: "Greek semeion (sign) → semeiosis, 'sign-process'. Root sem- means 'sign'. Also in: semiotics, sememe, semaphore.", example: "Peirce described semiosis as an irreducibly triadic process, involving a sign, an object, and an interpreting mind." },
{ level: 9, word: "Semiosphere", pronunciation: "/ˈsiːmiəsfɪər/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The entire interconnected system of signs and meaning-making within a given culture or living system.", etymology: "Greek semeion (sign) + sphaira (sphere) → semiosphere, term coined by Juri Lotman. Root sem- means 'sign'; sphair- means 'sphere'. Also in: semiotics, atmosphere, biosphere.", example: "Lotman's semiosphere describes the totality of cultural sign systems within which any individual act of meaning-making takes place." },
{ level: 8, word: "Sophistry", pronunciation: "/ˈsɒfɪstri/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The use of clever but fallacious or misleading arguments, especially with the intent to deceive.", etymology: "Greek sophos (wise) → sophistes (a wise man, professional teacher) → sophistry. Root soph- means 'wise'. Also in: philosophy, sophisticated, sophomore.", example: "What sounded like a profound argument was, on closer inspection, mere sophistry designed to confuse rather than persuade." },
{ level: 8, word: "Sorites", pronunciation: "/səˈraɪtiːz/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A paradox arising from the vagueness of a predicate, showing that a series of seemingly valid small steps leads to an absurd conclusion, as in the paradox of the heap.", etymology: "Greek soros (heap) → soreites, 'pertaining to a heap'. Root sor- means 'heap'. Also in: soritical.", example: "The sorites paradox asks: if one grain of sand never makes the difference between a heap and a non-heap, when exactly does a heap stop being one?" },
{ level: 9, word: "Sublation", pronunciation: "/sʌˈbleɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In Hegelian philosophy, the process by which a concept is simultaneously negated, preserved, and elevated into a higher synthesis.", etymology: "Latin sub- (under) + ferre/latum (to carry) → sublatus → sublation, English rendering of Hegel's German Aufhebung. Root lat- means 'carried'. Also in: translation, relation, elation.", example: "In Hegel's dialectic, sublation describes how thesis and antithesis are both cancelled and preserved within a higher synthesis." },
{ level: 8, word: "Substantiation", pronunciation: "/səbˌstænʃiˈeɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The act of providing solid evidence to confirm or prove a claim or assertion.", etymology: "Latin sub- (under) + stare (to stand) → substantia (substance) → substantiation. Root sta- means 'to stand'. Also in: substantiate, substance, stable.", example: "Without further substantiation, the report's headline conclusion remains little more than speculation." },
{ level: 9, word: "Subsumption", pronunciation: "/səbˈsʌmpʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The classification of a specific case as falling under a more general rule, category, or principle.", etymology: "Latin sub- (under) + sumere (to take) → subsumere, 'to take under' → subsumption. Root sum- means 'to take'. Also in: assume, consume, presume.", example: "Legal reasoning often proceeds by subsumption, fitting the particular facts of a case under the relevant general statute." },
{ level: 9, word: "Subvenient", pronunciation: "/səbˈviːniənt/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Describing properties or facts that underlie and determine higher-level properties through a relation of supervenience.", etymology: "Latin sub- (under) + venire (to come) → subvenire, 'to come under' → subvenient. Root ven- means 'to come'. Also in: supervenient, convene, intervene.", example: "Physical brain states are typically considered the subvenient base on which mental states are said to supervene." },
{ level: 9, word: "Supervenient", pronunciation: "/ˌsuːpərˈviːniənt/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Describing higher-level properties that depend on and are determined by lower-level properties without being reducible to them.", etymology: "Latin super- (above) + venire (to come) → supervenire, 'to come upon' → supervenient. Root ven- means 'to come'. Also in: supervenience, subvenient, advent.", example: "If mental states are supervenient on brain states, no two people could differ mentally without some difference in their brains too." },
{ level: 8, word: "Constitutive", pronunciation: "/kənˈstɪtjʊtɪv/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Forming an essential part of something, such that without it the thing would not exist or be what it is.", etymology: "Latin con- (together) + statuere (to set up) → constituere (to establish) → constitutive. Root sta- means 'to stand'. Also in: constitute, statute, institute.", example: "Following the rules of chess is constitutive of playing the game at all, not merely a helpful guideline." },
{ level: 9, word: "Constitutivism", pronunciation: "/kənˌstɪtjʊˈtɪvɪzəm/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The metaethical view that the standards of practical reason or morality are grounded in features constitutive of agency itself.", etymology: "From constitutive (see above) + -ism. Root sta- means 'to stand'.", example: "Constitutivism argues that the demands of rationality bind us simply because they are built into what it means to act as an agent at all." },
{ level: 9, word: "Nonidentity", pronunciation: "/ˌnɒnaɪˈdɛntɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The state of not being the same entity over time or across descriptions; in ethics, the puzzle of how actions can harm people who would not have existed otherwise.", etymology: "Latin non- (not) + idem (the same) → identitas (identity) → nonidentity. Root idem- means 'the same'. Also in: identity, identical, identify.", example: "The nonidentity problem asks how a policy can wrong future people whose very existence depended on that same policy being adopted." },
{ level: 8, word: "Defeasibility", pronunciation: "/dɪˌfiːzəˈbɪlɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The capacity for a rule, claim, or right to be overridden or annulled by subsequent or contrary evidence and conditions.", etymology: "Old French defaire (to undo), from Latin dis- + facere (to make/do) → defeasible + -ility. Root fac- means 'to make/do'. Also in: defeat, feasible, infeasible.", example: "Legal rights often exhibit defeasibility, since they can be overridden under specific exceptional circumstances laid out in advance." },
{ level: 8, word: "Defeasible", pronunciation: "/dɪˈfiːzəbəl/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Capable of being annulled, overridden, or rendered void by subsequent facts or conditions.", etymology: "Old French defaire (to undo) → defeasible. Root fac- means 'to make/do'. Also in: defeasibility, defeat, feasible.", example: "A defeasible claim to knowledge can be overturned by new evidence that wasn't available at the time it was made." },
{ level: 9, word: "Underivability", pronunciation: "/ˌʌndɪˌraɪvəˈbɪlɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The property of a statement or value that cannot be logically derived from a given set of premises or principles.", etymology: "Latin de- (down) + rivus (stream) → derivare (to draw off, as in irrigation) → derive + un- + -ability. Root riv- means 'stream'. Also in: derive, rival, river.", example: "Hume highlighted the underivability of 'ought' statements from purely descriptive 'is' statements, a gap critics still debate." },
{ level: 8, word: "Overgeneration", pronunciation: "/ˌoʊvərˌdʒɛnəˈreɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A flaw in a theory or grammar by which it permits forms or conclusions that are actually unacceptable or invalid.", etymology: "Latin super- (over) + generare (to beget) → overgeneration. Root gen- means 'to beget/produce'. Also in: generate, generation, undergeneration.", example: "Critics faulted the grammar for overgeneration, since it predicted as valid several sentence structures native speakers find clearly ungrammatical." },
{ level: 8, word: "Undergeneration", pronunciation: "/ˌʌndərˌdʒɛnəˈreɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A flaw in a theory or grammar by which it fails to permit forms or conclusions that should actually be valid.", etymology: "Latin sub- (under) + generare (to beget) → undergeneration. Root gen- means 'to beget'. Also in: generate, overgeneration.", example: "The revised rule fixed the original's overgeneration problem but introduced undergeneration, now ruling out some perfectly valid sentences." },
{ level: 9, word: "Lexicalism", pronunciation: "/ˈlɛksɪkəlɪzəm/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A linguistic theory holding that word formation occurs primarily in the lexicon rather than through syntactic rules.", etymology: "Greek lexis (word) → lexicon + -alism → lexicalism. Root lex- means 'word'. Also in: lexeme, lexicon, dialect.", example: "Lexicalism predicts that complex words are built and stored in the mental lexicon, separate from the rules governing sentence structure." },
{ level: 9, word: "Compositionality", pronunciation: "/kəmˌpɒzɪʃəˈnælɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The principle that the meaning of a complex expression is determined by the meanings of its constituent parts and the rules used to combine them.", etymology: "Latin com- (together) + ponere (to place) → componere (to compose) → compositionality. Root pon-/posit- means 'to place'. Also in: compose, composite, position.", example: "The principle of compositionality explains why we can understand entirely novel sentences we've never heard before." },
{ level: 8, word: "Iconicity", pronunciation: "/aɪˌkɒnˈɪsɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The degree to which a sign or word resembles or directly reflects the thing it represents, as opposed to relying purely on arbitrary convention.", etymology: "Greek eikon (image, likeness) → icon + -icity → iconicity. Root eik- means 'likeness/image'. Also in: icon, iconic, iconoclast.", example: "Onomatopoeic words like 'buzz' and 'hiss' display iconicity, their sound directly imitating the thing they describe." },
{ level: 8, word: "Markedness", pronunciation: "/ˈmɑːrkɪdnəs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A linguistic property whereby one member of a paired set of forms is treated as the basic, default option and the other as a special, marked deviation.", etymology: "Germanic mark (a sign, boundary) + -ed + -ness → markedness, term from Prague School linguistics. Germanic root.", example: "In English, 'actor' is the unmarked term while 'actress' carries markedness, signaling gender explicitly." },
{ level: 8, word: "Unmarkedness", pronunciation: "/ʌnˈmɑːrkɪdnəs/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The status of being the basic, default, or more general form in a linguistic opposition, lacking the special features of the marked alternative.", etymology: "Un- (negation) + markedness (see above). Germanic root mark- means 'sign'.", example: "The unmarkedness of the singular form means it can sometimes stand in for the general category, as in 'how many dog do you have?' being corrected to 'dogs'." },
{ level: 8, word: "Grammaticality", pronunciation: "/ɡrəˌmætɪˈkælɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The property of a sentence conforming to the syntactic rules of a given language, regardless of whether it is meaningful.", etymology: "Greek gramma (letter) → grammatikos (of letters) → grammar + -icality. Root gram- means 'letter/writing'. Also in: grammar, diagram, telegram.", example: "Chomsky's sentence 'colorless green ideas sleep furiously' demonstrates grammaticality without any coherent meaning." },
{ level: 8, word: "Acceptability", pronunciation: "/əkˌsɛptəˈbɪlɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In linguistics, the degree to which native speakers judge a sentence to sound natural, distinct from strict grammatical correctness.", etymology: "Latin ad- (to) + capere (to take) → accipere (to receive) → acceptable + -ility. Root cap-/cep- means 'to take'. Also in: accept, capture, except.", example: "Some sentences pass every formal grammaticality test yet still feel off in terms of acceptability to native speakers." },
{ level: 8, word: "Felicity", pronunciation: "/fɪˈlɪsɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In speech act theory, the set of contextual conditions that must hold for a performative utterance to succeed; more generally, happiness or appropriateness.", etymology: "Latin felix (happy, fruitful) → felicitas → felicity. Root fel- means 'happy/fruitful'. Also in: felicitous, infelicity.", example: "A wedding vow lacks felicity if spoken by an actor onstage rather than by genuinely consenting parties in a real ceremony." },
{ level: 8, word: "Deontic", pronunciation: "/diˈɒntɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to obligation, permission, and duty, especially in a branch of logic that formalizes such concepts.", etymology: "Greek deon (that which is binding, duty) → deontikos → deontic. Root de- means 'binding/necessary'. Also in: deontology.", example: "Deontic logic formalizes statements like 'it is obligatory that' and 'it is permissible that' using special modal operators." },
{ level: 8, word: "Epistemic", pronunciation: "/ˌɛpɪˈstiːmɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to knowledge or degrees of belief, especially the conditions under which a claim counts as known or justified.", etymology: "Greek episteme (knowledge) → epistemikos → epistemic. Root sta- means 'to stand', underlying 'sure knowledge'. Also in: epistemology, episteme.", example: "Epistemic modal logic studies expressions like 'it might be the case that', reflecting a speaker's uncertainty rather than the world's facts." },
{ level: 9, word: "Alethic", pronunciation: "/əˈliːθɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to truth, especially modal logic concerned with necessity, possibility, and contingency.", etymology: "Greek aletheia (truth), from a- (not) + lethe (forgetfulness, concealment) → alethic. Root leth- means 'forgetting/hiding'. Also in: Lethe (river of forgetfulness).", example: "Alethic modal logic studies the formal properties of necessity and possibility, the truth-related modalities." },
{ level: 9, word: "Bouletic", pronunciation: "/buːˈlɛtɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to a modal sense expressing desire or wish, as in 'I want it to be the case that...'", etymology: "Greek boulesthai (to wish, will) → bouletikos → bouletic. Root boul- means 'to wish/will'. Rare root largely confined to this modal-logic term.", example: "Linguists classify 'hopefully' as introducing a bouletic modality, expressing the speaker's desired outcome." },
{ level: 9, word: "Doxastic", pronunciation: "/dɒkˈsæstɪk/", partOfSpeech: "adjective", category: "Specialized Philosophy & Logic", definition: "Relating to belief, especially in formal logical systems that model what an agent believes to be true.", etymology: "Greek doxa (opinion, belief) → doxastikos → doxastic. Root dok-/dox- means 'opinion/belief'. Also in: orthodox, paradox, doctrine.", example: "Doxastic logic formalizes reasoning about belief, including the puzzle of whether agents must believe all logical consequences of what they already believe." },
{ level: 9, word: "Axiomaticity", pronunciation: "/ˌæksioʊməˈtɪsɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The quality or status of being an axiom, a self-evident starting point accepted without need of further proof.", etymology: "Greek axios (worthy) → axioma → axiomatic + -ity → axiomaticity. Root ag- means 'to weigh/lead'. Also in: axiom, axiology.", example: "Logicians sometimes dispute the axiomaticity of certain principles long assumed to be self-evidently true." },
{ level: 9, word: "Inferentiality", pronunciation: "/ˌɪnfərɛnʃiˈælɪti/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "The quality of being derived through inference rather than direct observation or assertion.", etymology: "Latin inferre (to bring in, conclude) → inferential + -ity → inferentiality. Root fer- means 'to carry'. Also in: infer, transfer, inferentialism.", example: "Some languages grammatically mark inferentiality, distinguishing claims based on direct evidence from those reached through inference alone." },
{ level: 9, word: "Inexistence", pronunciation: "/ˌɪnɪɡˈzɪstəns/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "In philosophy of mind, the property by which mental states are directed toward an object even if that object does not actually exist.", etymology: "Latin in- (in) + existere (to exist) → inexistence, term used by Franz Brentano in a technical sense distinct from mere nonexistence. Root sta-/sist- means 'to stand'. Also in: exist, intentionality.", example: "Brentano used intentional inexistence to describe how a thought about a unicorn can be directed at the unicorn even though none exist." },
{ level: 9, word: "Superordination", pronunciation: "/ˌsuːpərɔːrdɪˈneɪʃən/", partOfSpeech: "noun", category: "Specialized Philosophy & Logic", definition: "A semantic or logical relationship in which one category or term encompasses and is more general than another.", etymology: "Latin super- (above) + ordinare (to arrange) → superordinare, 'to arrange above' → superordination. Root ord- means 'order/rank'. Also in: subordinate, ordinal, order.", example: "'Animal' stands in a relation of superordination to 'dog', encompassing it along with countless other species." },
  
{ level: 8, word: "Anamnesis", pronunciation: "/ˌænæmˈniːsɪs/", partOfSpeech: "noun", category: "Philosophy & Psychology", definition: "The recollection of innate knowledge; in medicine, a patient's medical history.", etymology: "Greek ana- (again) + mnēsis (memory). Root mne- also appears in mnemonic and amnesia.", example: "Plato described learning as anamnesis rather than acquiring entirely new knowledge." },

 { level: 8, word: "Aporia", pronunciation: "/əˈpɔːriə/", partOfSpeech: "noun", category: "Philosophy", definition: "A state of puzzlement or philosophical doubt arising from equally plausible but contradictory arguments.", etymology: "Greek a- (without) + poros (passage, way), literally 'without a way through'.", example: "The dialogue ended in aporia, leaving every participant uncertain." },

 { level: 8, word: "Cathexis", pronunciation: "/kəˈθɛksɪs/", partOfSpeech: "noun", category: "Psychology", definition: "The investment of emotional or mental energy in a person, object, or idea.", etymology: "Greek kathexis (holding fast), from katechein (to hold firmly).", example: "His emotional cathexis toward the project made criticism difficult to accept." },

 { level: 8, word: "Chrematistics", pronunciation: "/ˌkrɛməˈtɪstɪks/", partOfSpeech: "noun", category: "Economics", definition: "The art or practice of acquiring wealth, especially for its own sake.", etymology: "Greek chrēmatistikē, from chrēma (wealth, property).", example: "Aristotle distinguished economics from mere chrematistics." },

 { level: 8, word: "Consubstantiation", pronunciation: "/ˌkɒnsəbˌstænʃiˈeɪʃən/", partOfSpeech: "noun", category: "Theology", definition: "The doctrine that Christ's body and blood coexist with bread and wine in the Eucharist.", etymology: "Latin con- (together) + substantia (substance).", example: "The debate over consubstantiation shaped several Reformation controversies." },

 { level: 8, word: "Deontic", pronunciation: "/diˈɒntɪk/", partOfSpeech: "adjective", category: "Logic", definition: "Relating to duty, obligation, or permission in formal logic.", etymology: "Greek deon (duty, what is necessary).", example: "Deontic logic models rules about what agents ought to do." },

 { level: 8, word: "Eidetic", pronunciation: "/aɪˈdɛtɪk/", partOfSpeech: "adjective", category: "Psychology", definition: "Relating to exceptionally vivid mental imagery or memory.", etymology: "Greek eidos (form, image).", example: "She claimed to possess an eidetic memory for maps." },

 { level: 8, word: "Entelechy", pronunciation: "/ɛnˈtɛlɪki/", partOfSpeech: "noun", category: "Metaphysics", definition: "The realization of potential into actual existence or fulfillment.", etymology: "Greek entelecheia, meaning 'having its end within itself'.", example: "The acorn's entelechy is to become an oak." },

 { level: 8, word: "Epiphenomenon", pronunciation: "/ˌɛpɪfəˈnɒmɪnən/", partOfSpeech: "noun", category: "Philosophy of Mind", definition: "A secondary effect that accompanies but does not influence a primary process.", etymology: "Greek epi- (upon) + phenomenon (appearance).", example: "Some theories regard consciousness as an epiphenomenon of neural activity." },

 { level: 8, word: "Eristic", pronunciation: "/ɪˈrɪstɪk/", partOfSpeech: "adjective", category: "Rhetoric", definition: "Characterized by argument intended to defeat an opponent rather than discover truth.", etymology: "Greek eristikos, from eris (strife).", example: "The debate devolved into eristic point-scoring." },

 { level: 8, word: "Facticity", pronunciation: "/fækˈtɪsɪti/", partOfSpeech: "noun", category: "Existentialism", definition: "The concrete details and conditions that define a person's situation.", etymology: "Latin factum (deed, fact).", example: "Existentialists distinguish freedom from facticity." },

 { level: 8, word: "Haecceity", pronunciation: "/hækˈsiːɪti/", partOfSpeech: "noun", category: "Metaphysics", definition: "The unique quality that makes an individual thing exactly itself.", etymology: "Latin haecceitas, from haec (this).", example: "Its haecceity cannot be reduced to general properties." },

 { level: 8, word: "Henosis", pronunciation: "/hɪˈnoʊsɪs/", partOfSpeech: "noun", category: "Mysticism", definition: "Mystical union with the divine or ultimate reality.", etymology: "Greek henosis, from hen (one).", example: "Neoplatonists sought henosis through contemplation." },

 { level: 8, word: "Hylozoism", pronunciation: "/haɪˈloʊzoʊˌɪzəm/", partOfSpeech: "noun", category: "Philosophy", definition: "The doctrine that all matter possesses life.", etymology: "Greek hylē (matter) + zōē (life).", example: "Ancient hylozoism blurred the distinction between living and nonliving matter." },

 { level: 8, word: "Illocution", pronunciation: "/ˌɪləˈkjuːʃən/", partOfSpeech: "noun", category: "Linguistics", definition: "The intended communicative force of an utterance.", etymology: "Latin in- + locutio (speaking).", example: "The illocution of the statement was a polite request." },

 { level: 8, word: "Incommensurable", pronunciation: "/ˌɪnkəˈmɛnʃərəbəl/", partOfSpeech: "adjective", category: "Philosophy of Science", definition: "Impossible to compare using a common standard.", etymology: "Latin in- (not) + commensurare (to measure together).", example: "The paradigms were considered incommensurable." },

 { level: 8, word: "Irenic", pronunciation: "/aɪˈrɛnɪk/", partOfSpeech: "adjective", category: "Theology", definition: "Promoting peace or reconciliation, especially in religious disputes.", etymology: "Greek eirēnē (peace).", example: "The conference adopted an irenic tone." },

 { level: 8, word: "Kairos", pronunciation: "/ˈkaɪrɒs/", partOfSpeech: "noun", category: "Rhetoric", definition: "The opportune or decisive moment for action.", etymology: "Greek kairos (critical moment).", example: "The speaker recognized the kairos for reform." },

 { level: 8, word: "Kenosis", pronunciation: "/kɪˈnoʊsɪs/", partOfSpeech: "noun", category: "Theology", definition: "The voluntary self-emptying of divine privilege.", etymology: "Greek kenosis, from kenoun (to empty).", example: "Kenosis is central to several Christian doctrines." },

 { level: 8, word: "Logomachy", pronunciation: "/ləˈɡɒməki/", partOfSpeech: "noun", category: "Rhetoric", definition: "A dispute over words rather than substantive issues.", etymology: "Greek logos (word) + machē (battle).", example: "The committee wasted hours in logomachy." },

 { level: 8, word: "Merism", pronunciation: "/ˈmɛrɪzəm/", partOfSpeech: "noun", category: "Literature", definition: "A figure of speech referring to a whole by naming opposite parts.", etymology: "Greek merismos (division).", example: "He searched 'high and low,' a classic merism." },

 { level: 8, word: "Metanoia", pronunciation: "/ˌmɛtəˈnɔɪə/", partOfSpeech: "noun", category: "Theology", definition: "A profound change of mind, heart, or spiritual direction.", etymology: "Greek meta- (change) + nous (mind).", example: "His metanoia transformed both his beliefs and actions." },

 { level: 8, word: "Mimesis", pronunciation: "/mɪˈmiːsɪs/", partOfSpeech: "noun", category: "Aesthetics", definition: "The imitation or representation of reality in art.", etymology: "Greek mimēsis (imitation).", example: "Classical tragedy was often discussed in terms of mimesis." },

 { level: 8, word: "Noesis", pronunciation: "/noʊˈiːsɪs/", partOfSpeech: "noun", category: "Phenomenology", definition: "The act of thinking or the intentional process of consciousness.", etymology: "Greek noēsis, from nous (mind).", example: "Husserl paired noesis with its intentional object." },

 { level: 8, word: "Numinous", pronunciation: "/ˈnjuːmɪnəs/", partOfSpeech: "adjective", category: "Religion", definition: "Having a mysterious, awe-inspiring spiritual quality.", etymology: "Latin numen (divine presence).", example: "The ancient forest felt strangely numinous." },

 { level: 8, word: "Ontic", pronunciation: "/ˈɒntɪk/", partOfSpeech: "adjective", category: "Ontology", definition: "Relating to concrete entities or existence itself.", etymology: "Greek on (being).", example: "The discussion shifted from ontological to ontic questions." },

 { level: 8, word: "Ousia", pronunciation: "/ˈuːziə/", partOfSpeech: "noun", category: "Metaphysics", definition: "Essential being, substance, or essence.", etymology: "Greek ousia (being, essence).", example: "Aristotle treated ousia as the foundation of metaphysics." },

 { level: 8, word: "Palimpsest", pronunciation: "/ˈpælɪmpsɛst/", partOfSpeech: "noun", category: "Literature", definition: "Something bearing traces of earlier forms beneath later layers.", etymology: "Greek palin (again) + psēstos (scraped).", example: "The city became a cultural palimpsest." },

 { level: 8, word: "Panegyric", pronunciation: "/ˌpænɪˈdʒɪrɪk/", partOfSpeech: "noun", category: "Rhetoric", definition: "A formal speech or piece of writing praising someone.", etymology: "Greek panēgyrikos (public assembly speech).", example: "The biography often reads like a panegyric." },

 { level: 8, word: "Parousia", pronunciation: "/pəˈruːziə/", partOfSpeech: "noun", category: "Theology", definition: "The anticipated second coming of Christ.", etymology: "Greek parousia (presence, arrival).", example: "Early Christians expected the Parousia within their lifetimes." },

 { level: 8, word: "Perichoresis", pronunciation: "/ˌpɛrɪkəˈriːsɪs/", partOfSpeech: "noun", category: "Theology", definition: "The mutual indwelling of the persons of the Trinity.", etymology: "Greek peri- (around) + chorein (to contain or make room).", example: "Perichoresis emphasizes divine unity without confusion." },

 { level: 8, word: "Perlocution", pronunciation: "/ˌpɜːrləˈkjuːʃən/", partOfSpeech: "noun", category: "Linguistics", definition: "The effect an utterance has on a listener.", etymology: "Latin per- (through) + locutio (speech).", example: "The warning's perlocution was immediate compliance." },

 { level: 8, word: "Prolegomenon", pronunciation: "/proʊlɪˈɡɒmɪnɒn/", partOfSpeech: "noun", category: "Scholarship", definition: "A critical introductory discussion preceding a detailed work.", etymology: "Greek pro- (before) + legein (to say).", example: "The prolegomenon outlined the book's methodology." },

 { level: 8, word: "Prosopopoeia", pronunciation: "/prɒˌsɒpəpəˈiːə/", partOfSpeech: "noun", category: "Rhetoric", definition: "A figure of speech in which an absent, imaginary, or inanimate entity is given a voice.", etymology: "Greek prosōpon (face, person) + poiein (to make).", example: "The poem uses prosopopoeia to let Death narrate the story." },

// ═══════════════════════════════════════════════════════
//  CONFIG — level labels and colours
// ═══════════════════════════════════════════════════════
const COLORS = {1:"#6B9E78",2:"#5B8FA8",3:"#A67C52",4:"#7B6FA0",5:"#C97B4B",6:"#3D7A6A",7:"#7A3D5C",8:"#4D6FA8",9:"#8A4D3D",10:"#2E2E2E"};
const LABELS = {1:"Foundational",2:"Developing",3:"Expanding",4:"Intermediate",5:"Proficient",6:"Advanced",7:"Scholarly",8:"Erudite",9:"Arcane",10:"Lexical Mastery"};

// ═══════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════
let S = {
  level:"All", mode:"browse",
  cards:[], idx:0, flipped:false, etymOpen:false,
  qPhase:"q", qOpts:[], qAns:null,
  score:{c:0,t:0}, streak:0, best:0, done:false
};

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const $  = id => document.getElementById(id);
const sh = (id, v) => $(id).classList.toggle("hidden", !v);
function shuffle(a){ return [...a].sort(()=>Math.random()-.5) }
function pool(){ return S.level==="All" ? WORDS : WORDS.filter(w=>w.level===+S.level) }
function col(){ return S.level==="All" ? "#2E2E2E" : (COLORS[+S.level]||"#2E2E2E") }
function cardCol(w){ return COLORS[w.level]||"#999" }

// ═══════════════════════════════════════════════════════
//  BUILD HOME
// ═══════════════════════════════════════════════════════
function buildHome(){
  $("hdr-count").textContent = WORDS.length + " Words · 10 Levels · Etymology";
  const list = $("lvl-list");
  list.innerHTML = "";
  const levels = [...new Set(WORDS.map(w=>w.level))].sort((a,b)=>a-b);
  // Show all 10 level slots; grey out empty ones
  for(let lvl=1;lvl<=10;lvl++){
    const c   = COLORS[lvl];
    const cnt = WORDS.filter(w=>w.level===lvl).length;
    const empty = cnt===0;
    const card = document.createElement("div");
    card.className = "lvl-card";
    card.style.borderLeft = `4px solid ${empty?"#DDD":c}`;
    card.innerHTML = `
      <div class="lvl-top">
        <div>
          <div class="lvl-eye" style="color:${empty?"#CCC":c}">Level ${lvl}</div>
          <div class="lvl-name" style="color:${empty?"#CCC":"inherit"}">${LABELS[lvl]}</div>
        </div>
        <span class="lvl-cnt">${cnt} word${cnt!==1?"s":""}</span>
      </div>
      <div class="row">
        <button class="btn-fl" style="border-color:${empty?"#DDD":c+"33"};color:${empty?"#CCC":c};background:${empty?"transparent":c+"11"}"
          ${empty?"disabled":""} onclick="start(${lvl},'browse')">📖 Flashcards</button>
        <button class="btn-qz" style="background:${empty?"#DDD":c};${empty?"cursor:not-allowed":""}"
          ${empty?"disabled":""} onclick="start(${lvl},'quiz')">⚡ Quiz</button>
      </div>`;
    list.appendChild(card);
  }
}

// ═══════════════════════════════════════════════════════
//  SESSION CONTROL
// ═══════════════════════════════════════════════════════
function start(lvl, mode){
  if(lvl!=="All" && WORDS.filter(w=>w.level===+lvl).length===0) return;
  S.level=lvl; S.mode=mode; S.best=0;
  reset();
  show("learn");
}

function reset(){
  S.cards=shuffle(pool());
  S.idx=0; S.flipped=false; S.etymOpen=false;
  S.qPhase="q"; S.qOpts=[]; S.qAns=null;
  S.score={c:0,t:0}; S.streak=0; S.done=false;
  render();
}

function switchMode(m){
  if(S.mode===m) return;
  S.mode=m; reset();
}

function goHome(){ show("home"); buildHome(); }

// ═══════════════════════════════════════════════════════
//  SCREEN SWITCH
// ═══════════════════════════════════════════════════════
function show(name){
  sh("s-home",  name==="home");
  sh("s-learn", name==="learn");
  if(name==="learn") render();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  // header
  $("l-title").textContent = S.level==="All"
    ? `All Words` : `Level ${S.level} — ${LABELS[+S.level]}`;
  $("st-streak").textContent = S.streak;
  $("st-best").textContent   = S.best;

  // mode buttons
  $("mb-browse").classList.toggle("on", S.mode==="browse");
  $("mb-quiz").classList.toggle("on",   S.mode==="quiz");

  // panels
  sh("score-screen", S.done);
  sh("prog",         !S.done);
  sh("fc-area",  !S.done && S.mode==="browse");
  sh("qz-area",  !S.done && S.mode==="quiz");

  if(S.done){ renderScore(); return; }

  // progress
  const n = S.cards.length, i = S.idx+1;
  $("prog-lbl").textContent  = `${i} / ${n}`;
  $("prog-fill").style.width = (i/n*100)+"%";
  $("prog-fill").style.background = col();
  const ps = $("prog-score");
  if(S.mode==="quiz"){
    ps.classList.remove("hidden");
    ps.textContent  = `${S.score.c}/${S.score.t} correct`;
    ps.style.color  = col();
  } else {
    ps.classList.add("hidden");
  }

  if(S.mode==="browse") renderFC();
  else                  renderQZ();
}

// ─── FLASHCARD ───────────────────────────────────────
function renderFC(){
  const w   = S.cards[S.idx];
  if(!w) return;
  const c   = cardCol(w);

  // colour bars + badges
  ["fc-front-bar","fc-back-bar"].forEach(id=>$(id).style.background=c);
  ["fc-badge","fc-badge2"].forEach(id=>{
    $(id).textContent = `Lv ${w.level}`;
    $(id).style.background = c+"22";
    $(id).style.color = c;
  });

  // front
  $("fc-word").textContent = w.word;
  $("fc-pron").textContent = w.pronunciation;
  $("fc-pos").textContent  = w.partOfSpeech;

  // back
  $("fc-bword").textContent = w.word;
  $("fc-def").textContent   = w.definition;
  $("fc-ex").textContent    = `"${w.example}"`;
  $("fc-ex").style.borderLeftColor = c;

  // flip
  $("card-inner").classList.toggle("flipped", S.flipped);

  // etymology
  sh("etym-wrap", S.flipped);
  if(S.flipped){
    $("etym-btn").textContent = S.etymOpen ? "▲ Hide Etymology" : "🌱 Show Etymology & Roots";
    $("etym-btn").style.borderColor = c+"55";
    $("etym-btn").style.color       = c;
    $("etym-btn").style.background  = c+"0D";
    $("etym-eye").style.color       = c;
    $("etym-txt").textContent       = w.etymology;
    sh("etym-panel", S.etymOpen);
    if(S.etymOpen){
      $("etym-panel").style.background  = c+"0D";
      $("etym-panel").style.borderColor = c+"44";
    }
  }

  // nav
  $("btn-prev").disabled   = S.idx===0;
  $("btn-next").textContent = S.idx+1<S.cards.length ? "Next →" : "Finish";
}

function flip(){
  if(S.mode!=="browse") return;
  S.flipped = !S.flipped;
  if(!S.flipped) S.etymOpen=false;
  render();
}
function toggleEtym(){ S.etymOpen=!S.etymOpen; render(); }
function prev(){ if(S.idx>0){S.idx--;S.flipped=false;S.etymOpen=false;render();} }
function next(){
  if(S.idx+1>=S.cards.length){ S.done=true; render(); }
  else{ S.idx++;S.flipped=false;S.etymOpen=false;S.qPhase="q";S.qOpts=[];S.qAns=null;render(); }
}

// ─── QUIZ ────────────────────────────────────────────
function renderQZ(){
  const w = S.cards[S.idx];
  if(!w) return;
  const c = cardCol(w);

  $("qprompt-bar").style.background = c;
  $("q-def").textContent = w.definition;

  // generate options once per card
  if(S.qPhase==="q" && S.qOpts.length===0){
    const p  = pool();
    const others = shuffle(p.filter(x=>x.word!==w.word)).slice(0,3);
    S.qOpts = shuffle([w,...others]);
  }

  // render options
  const container = $("qopts");
  container.innerHTML = "";
  const letters = ["A","B","C","D"];
  S.qOpts.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "qopt";
    if(S.qPhase==="result"){
      btn.classList.add("answered");
      if(opt.word===w.word)               btn.classList.add("correct");
      else if(S.qAns&&opt.word===S.qAns.word) btn.classList.add("wrong");
    }
    btn.innerHTML=`<span class="qletter">${letters[i]}</span>${opt.word}`;
    btn.addEventListener("click",()=>answer(opt));
    container.appendChild(btn);
  });

  // result panel
  sh("qresult", S.qPhase==="result");
  if(S.qPhase==="result"){
    const ok = S.qAns && S.qAns.word===w.word;
    $("qfb").className    = "qfb "+(ok?"correct":"wrong");
    $("qfb-lbl").textContent = ok ? "✓ Correct!" : `✗ The answer was "${w.word}"`;
    $("qfb-ex").textContent  = `"${w.example}"`;
    $("qetym").style.background  = c+"0D";
    $("qetym").style.borderColor = c+"44";
    $("qetym-lbl").style.color   = c;
    $("qetym-txt").textContent   = w.etymology;
    $("btn-nw").textContent = S.idx+1<S.cards.length ? "Next Word →" : "See Results";
  }
}

function answer(opt){
  if(S.qPhase==="result") return;
  S.qAns   = opt;
  S.qPhase = "result";
  const ok = opt.word===S.cards[S.idx].word;
  S.streak = ok ? S.streak+1 : 0;
  S.best   = Math.max(S.best, S.streak);
  S.score.t++;
  if(ok) S.score.c++;
  render();
}

// ─── SCORE ───────────────────────────────────────────
function renderScore(){
  const {c,t} = S.score;
  const ratio  = t>0 ? c/t : 0;
  const browse = S.mode==="browse";
  $("sc-emoji").textContent = browse ? "✨" : (ratio>=.8 ? "🏆" : "📚");
  $("sc-num").textContent   = browse ? "All Done!" : `${c} / ${t}`;
  $("sc-msg").textContent   = browse
    ? `You reviewed ${S.cards.length} words.`
    : (ratio>=.8 ? "Excellent — your lexicon is growing." : "Keep reviewing and the patterns will stick.");
  const sl = $("sc-streak");
  if(!browse && S.best>1){
    sl.classList.remove("hidden");
    sl.textContent  = `Best streak: ${S.best} in a row 🔥`;
    sl.style.color  = col();
  } else { sl.classList.add("hidden"); }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
buildHome();
</script>
